name: OpenWRT Packages Updater

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  push:
    paths:
      - '.github/diy/Update.sh'
      - '.github/workflows/OpenWRT_Packages_Updater.yml'
      - '.github/diy/openwrt-packages/patches/**/*.patch'
      - '.github/diy/openwrt-packages/core'
      - '.github/diy/openwrt-packages/*.sh'
      - '.github/diy/openwrt-packages/readme-template.md'
  watch:
    types: started
  workflow_dispatch:

jobs:
  update:
    # if: github.event.repository.owner.id == github.event.sender.id || github.event.sender.type == 'Bot'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target: [main,qt6,mt798x,qualcommax]

    name: 更新 ${{ matrix.target }} 分支

    steps:
      - name: 签出代码
        uses: actions/checkout@main

      - name: 初始化环境
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"
          ( sudo -E apt-get -qq install rename ) &

          # 写入 Job Summary 头部
          echo "# 🔄 OpenWRT Packages Updater" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: \`${{matrix.target}}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **触发方式**: \`${{github.event_name}}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **运行时间**: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: 克隆代码
        run: |
          cd $GITHUB_WORKSPACE
          chmod +x .github/diy/openwrt-packages/*.sh
          git clone -b ${{matrix.target}} https://github.com/solarflows/openwrt-packages.git ${{matrix.target}}
          cd ${{matrix.target}}
          git rm -r --cache * >/dev/null 2>&1 &
          # 删除除diy目录以外的文件夹
          # rm -rf `find ./* -maxdepth 0 -type d ! -name "diy"` >/dev/null 2>&1
          rm -rf ./* >/dev/null 2>&1
          bash $GITHUB_WORKSPACE/.github/diy/openwrt-packages/${{matrix.target}}.sh

      - name: 修改代码
        run: |
          cd $GITHUB_WORKSPACE/${{matrix.target}}
          bash $GITHUB_WORKSPACE/.github/diy/openwrt-packages/convert_translation.sh
          bash $GITHUB_WORKSPACE/.github/diy/openwrt-packages/create_acl_for_luci.sh -a
          bash $GITHUB_WORKSPACE/.github/diy/openwrt-packages/modify.sh

      - name: 生成插件来源摘要
        if: always()
        run: |
          cd $GITHUB_WORKSPACE/${{matrix.target}}
          SCRIPT="$GITHUB_WORKSPACE/.github/diy/openwrt-packages/${{matrix.target}}.sh"

          echo "## 📦 ${{matrix.target}} 分支插件来源摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 插件/包 | 来源仓库 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|:--------|:---------|:-----|" >> $GITHUB_STEP_SUMMARY

          # 解析脚本中的 format_git_clone_output 和 checkout_partial_code 调用
          grep -E "^\s*(format_git_clone_output|checkout_partial_code)" "$SCRIPT" | while IFS= read -r line; do
            # 提取仓库 URL
            repo_url=$(echo "$line" | grep -oP '(?<=-r )https://github.com/[^ ]+' | sed 's/\.git$//')
            if [ -z "$repo_url" ]; then
              continue
            fi

            # 提取分支
            branch=$(echo "$line" | grep -oP '(?<=-b )\S+' | head -1)
            repo_display=$(echo "$repo_url" | sed 's|https://github.com/||')

            # 提取包名（从 checkout_partial_code 的路径参数）
            pkg_name=""
            if echo "$line" | grep -q "checkout_partial_code"; then
              # 获取 -r 后面的参数（跳过 URL）
              parts=$(echo "$line" | sed 's/.*-r [^ ]* //' | xargs)
              pkg_name=$(echo "$parts" | awk '{print $NF}' | sed 's|.*/||')
            elif echo "$line" | grep -q "format_git_clone_output"; then
              # 从 URL 提取仓库名
              pkg_name=$(echo "$repo_url" | sed 's|.*/||')
            fi

            if [ -n "$pkg_name" ] && [ -n "$repo_display" ]; then
              if [ -n "$branch" ]; then
                echo "| \`$pkg_name\` | [$repo_display]($repo_url) | 分支: \`$branch\` |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| \`$pkg_name\` | [$repo_display]($repo_url) | |" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📌 完整插件列表请查看 [README.md](https://github.com/${{github.repository}}#-插件来源)" >> $GITHUB_STEP_SUMMARY

      - name: 应用补丁
        run: |
          cd $GITHUB_WORKSPACE/${{matrix.target}}

          # 应用补丁（temp* 前缀的补丁失败仅警告，不中断）
          PATCH_DIR="$GITHUB_WORKSPACE/.github/diy/openwrt-packages/patches/${{matrix.target}}"
          find "$PATCH_DIR" -type f -name '*.patch' ! -name 'temp*' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%' | patch -d './' -p1 -E --forward --no-backup-if-mismatch" || exit 1
          find "$PATCH_DIR" -type f -name 'temp*.patch' -print0 | sort -z | while IFS= read -r -d '' f; do
            echo "应用临时补丁: $f"
            patch -d './' -p1 -E --forward --no-backup-if-mismatch < "$f" || echo "::warning::临时补丁应用失败 (忽略): $f"
          done

      - name: 应用全局补丁
        run: |
          cd $GITHUB_WORKSPACE/${{matrix.target}}

          # 应用全局补丁（temp* 前缀的补丁失败仅警告，不中断）
          rm -rf v2ray-geodata >/dev/null 2>&1
          PATCH_DIR="$GITHUB_WORKSPACE/.github/diy/openwrt-packages/patches"
          find "$PATCH_DIR" -maxdepth 1 -type f -name '*.patch' ! -name 'temp*' -print0 | sort -z | xargs -I % -t -0 -n 1 sh -c "cat '%' | patch -d './' -p1 -E --forward --no-backup-if-mismatch" || exit 1
          find "$PATCH_DIR" -maxdepth 1 -type f -name 'temp*.patch' -print0 | sort -z | while IFS= read -r -d '' f; do
            echo "应用临时补丁: $f"
            patch -d './' -p1 -E --forward --no-backup-if-mismatch < "$f" || echo "::warning::临时补丁应用失败 (忽略): $f"
          done

      - name: 生成 README (仅 main 分支)
        if: matrix.target == 'main'
        run: |
          TEMPLATE="$GITHUB_WORKSPACE/.github/diy/openwrt-packages/readme-template.md"
          UPDATE_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          SCRIPTS_DIR="$GITHUB_WORKSPACE/.github/diy/openwrt-packages"
          OUTPUT="$GITHUB_WORKSPACE/${{matrix.target}}/README.md"

          # 解析单个脚本，输出 "包名|仓库URL|分支" 行
          parse_script() {
            local script="$1"
            local target_branch="$2"
            grep -E "^\s*(format_git_clone_output|checkout_partial_code)" "$script" | while IFS= read -r line; do
              repo_url=$(echo "$line" | grep -oP '(?<=-r )https://github.com/[^ ]+' | sed 's/\.git$//')
              [ -z "$repo_url" ] && continue
              repo_display=$(echo "$repo_url" | sed 's|https://github.com/||')
              pkg_name=""
              if echo "$line" | grep -q "checkout_partial_code"; then
                parts=$(echo "$line" | sed 's/.*-r [^ ]* //' | xargs)
                pkg_name=$(echo "$parts" | awk '{print $NF}' | sed 's|.*/||')
              else
                pkg_name=$(echo "$repo_url" | sed 's|.*/||')
              fi
              [ -n "$pkg_name" ] && [ -n "$repo_display" ] && echo "${pkg_name}|${repo_display}|${repo_url}|${target_branch}"
            done
          }

          # 解析所有分支脚本，合并去重
          ALL_ENTRIES=$(
            for t in main qt6 mt798x qualcommax; do
              parse_script "$SCRIPTS_DIR/${t}.sh" "$t"
            done | sort -t'|' -k1,1
          )

          # 生成插件表 Markdown 文件
          TABLE_FILE=$(mktemp)
          echo "| 插件 | 来源 | 分支 |" > "$TABLE_FILE"
          echo "|:-----|:-----|:-----|" >> "$TABLE_FILE"

          CURRENT_PKG=""
          CURRENT_ROW=""
          while IFS='|' read -r pkg repo url branches; do
            if [ "$pkg" = "$CURRENT_PKG" ]; then
              CURRENT_ROW="${CURRENT_ROW}, \`${branches}\`"
            else
              [ -n "$CURRENT_PKG" ] && echo "$CURRENT_ROW" >> "$TABLE_FILE"
              CURRENT_PKG="$pkg"
              CURRENT_ROW="| \`${pkg}\` | [${repo}](${url}) | \`${branches}\`"
            fi
          done <<< "$ALL_ENTRIES"
          [ -n "$CURRENT_PKG" ] && echo "$CURRENT_ROW" >> "$TABLE_FILE"

          # 用 awk 替换模板中的占位符
          awk -v time="$UPDATE_TIME" -v tbl="$TABLE_FILE" '
            {
              if (/{{LAST_UPDATE}}/) { gsub(/\{\{LAST_UPDATE\}\}/, time) }
              if (/{{PLUGIN_TABLE}}/) {
                while ((getline line < tbl) > 0) { print line }
                close(tbl)
                next
              }
              print
            }
          ' "$TEMPLATE" > "$OUTPUT"

          rm -f "$TABLE_FILE"
          echo "✅ README.md 已生成 (更新时间: $UPDATE_TIME)"

      - name: 提交代码
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE/${{matrix.target}}
          if [ "${{ github.event_name }}" == "schedule" ]; then
            commit_message="⏲ Schedule update-$(TZ='Asia/Shanghai' date -d now)"
          else
            commit_message="🔗 Trigger update-$(TZ='Asia/Shanghai' date -d now)"
          fi
          # 添加文件到工作区
          git add .

          # 检查是否有需要提交的更改
          if [ -n "$(git status --porcelain)" ]; then
            # 统计变更
            added=$(git diff --cached --numstat | awk '{s+=$1} END {print s}')
            removed=$(git diff --cached --numstat | awk '{s+=$2} END {print s}')
            files_changed=$(git diff --cached --numstat | wc -l)

            # 提交更改
            git commit -m "$commit_message"
            echo "Commit successful. Pushing changes to the repository."
            git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/solarflows/openwrt-packages.git" HEAD:${{matrix.target}}

            # 输出统计到 Summary
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ✅ 提交成功" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **分支**: \`${{matrix.target}}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **变更文件数**: $files_changed" >> $GITHUB_STEP_SUMMARY
            echo "- **新增行数**: +$added" >> $GITHUB_STEP_SUMMARY
            echo "- **删除行数**: -$removed" >> $GITHUB_STEP_SUMMARY
            echo "- **提交信息**: $commit_message" >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes to commit. Skipping the push step."
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ℹ️ 无变更" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "本次运行未检测到任何变更，跳过提交。" >> $GITHUB_STEP_SUMMARY
          fi
