name: 同步并推送

# 防止并发运行导致推送冲突 (cannot lock ref 错误)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  push:
      paths:
        - '.github/workflows/Sync_Push.yml'
        - '.github/diy/lede/patches/*/*.patch'
        - '.github/diy/luci/patches/*/*.patch'
        - '.github/diy/packages/patches/*/*.patch'  # 当workflow文件有改变时触发
  watch:
    types: [started]
  workflow_dispatch:
  # 手动触发

jobs:
  sync_lede:
    name: 同步 lean 仓库
    if: github.event.repository.owner.id == github.event.sender.id  || ! github.event.sender.id
    runs-on: ubuntu-latest
    env:
      TARGETS: "lean openwrt-snapshot dg741a immortalwrt hanwckf"
      UPSTREAMS: "https://github.com/coolsnowwolf/lede.git https://github.com/openwrt/openwrt.git https://github.com/dg741a/lede.git https://github.com/immortalwrt/immortalwrt.git https://github.com/hanwckf/immortalwrt-mt798x.git"

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 配置环境
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 克隆仓库并设置上游
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/solarflows/lede.git temp_rep
          cd temp_rep

          index=1
          for target in $TARGETS; do
            upstream=$(echo $UPSTREAMS | cut -d' ' -f$index)
            echo "Target: $target  Upstream: $upstream"
            git remote add $target $upstream
            ((index++))
          done

          git fetch --all --no-tags

      - name: 拉取上游代码并打补丁
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -e
          cd $GITHUB_WORKSPACE/temp_rep

          # 推送函数：先fetch确保本地ref最新，避免浅克隆导致的 cannot lock ref 错误
          retry_push() {
            local remote_url="$1"
            local refspec="$2"
            local max_retries=3
            local retry_delay=10
            for i in $(seq 1 $max_retries); do
              # 先拉取目标分支最新状态，避免浅克隆+不同推送URL导致old-value过期
              git fetch "$remote_url" "${refspec#*:}" --no-tags 2>/dev/null || true
              if git push "$remote_url" -f "$refspec" 2>&1; then
                return 0
              fi
              if [[ $i -lt $max_retries ]]; then
                echo "::warning::推送失败，${retry_delay}秒后重试 ($i/$max_retries)..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              fi
            done
            return 1
          }

          overall_patch_failed=false
          for target in $TARGETS; do
            echo "Target: $target"

            if [[ $target == "hanwckf" ]]; then
              git checkout -B $target $target/openwrt-21.02
            else
              git checkout -B $target $target/master
            fi

            if [ -d "$GITHUB_WORKSPACE/.github/diy/lede/patches/$target" ]; then
              patch_failed=false
              while IFS= read -r -d '' patch_file; do
                echo "应用补丁中: $patch_file"
                if git apply --whitespace=nowarn "$patch_file"; then
                  git add .
                  git commit -m "Applying $(basename "$patch_file")."
                else
                  if [[ "$(basename "$patch_file")" == temp* ]]; then
                    echo "::warning::临时补丁应用失败 (忽略): $patch_file"
                  else
                    echo "::error::应用补丁时出错: $patch_file"
                    patch_failed=true
                    overall_patch_failed=true
                  fi
                fi
              done < <(find "$GITHUB_WORKSPACE/.github/diy/lede/patches/$target" -type f -name '*.patch' -print0)
              if [ "$patch_failed" = true ]; then
                echo "::error::$target 补丁应用失败，跳过推送。"
                continue
              fi
            fi

            if [ -d .github ]; then
                rm -rf .github
                git add .
                git commit -m "Removing workflows files."
            fi
            retry_push "https://${{ secrets.ACCESS_TOKEN }}@github.com/solarflows/lede.git" "HEAD:$target" || {
              echo "::error::推送 $target 失败（已重试）"
              overall_patch_failed=true
            }

          done
          if [ "$overall_patch_failed" = true ]; then exit 1; fi

