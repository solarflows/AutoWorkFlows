  sync_and_tag:
    name: 同步VIKINGYFY仓库并打标签
    if: github.event.repository.owner.id == github.event.sender.id  || ! github.event.sender.id
    runs-on: ubuntu-latest
    # env:
    #   TARGETS: "VIKINGYFY"
    #   UPSTREAMS: "https://github.com/VIKINGYFY/immortalwrt.git"

    steps:
      - name: 检出目标仓库
        uses: actions/checkout@v6
        with:
          repository: solarflows/ImmortalWRT-QualcommAX
          ref: VIKINGYFY-main
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: 配置环境
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"

      - name: 添加上游仓库并拉取
        run: |
          git remote add upstream https://github.com/VIKINGYFY/immortalwrt.git
          git fetch upstream main

      - name: 检测上游是否有更新
        id: check
        run: |
          # 获取当前分支 HEAD 的 commit SHA
          CURRENT_COMMIT=$(git rev-parse HEAD)
          # 获取上游 main 分支的最新 commit SHA
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)

          echo "当前跟踪提交: $CURRENT_COMMIT"
          echo "上游最新提交: $UPSTREAM_COMMIT"

          if [ "$CURRENT_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "🟢 上游无新提交，无需同步。"
            echo "has_update=false" >> $GITHUB_OUTPUT
          else
            echo "🔵 检测到上游更新，准备同步。"
            echo "has_update=true" >> $GITHUB_OUTPUT
          fi

      - name: 尝试变基
        if: steps.check.outputs.has_update == 'true'
        id: rebase
        continue-on-error: true
        run: |
          echo "::group::尝试将 VIKINGYFY-main 变基到上游 main"
          if git rebase upstream/main; then
            echo "rebase_success=true" >> $GITHUB_OUTPUT
            echo "✅ 变基成功"
          else
            echo "rebase_success=false" >> $GITHUB_OUTPUT
            echo "❌ 变基失败，将回退到上游状态"
          fi
          echo "::endgroup::"

      - name: 变基失败时强制重置为上游状态
        if: steps.check.outputs.has_update == 'true' && steps.rebase.outputs.rebase_success == 'false'
        run: |
          echo "::warning::变基失败，中止变基并强制重置分支为上游 main 的最新提交。"
          git rebase --abort || true
          git reset --hard upstream/main

      - name: 推送更新到目标仓库
        if: steps.check.outputs.has_update == 'true'
        id: push
        continue-on-error: true
        run: |
          set -e
          retry_push() {
            local remote_url="$1"
            local refspec="$2"
            local max_retries=3
            local retry_delay=10
            for i in $(seq 1 $max_retries); do
              git fetch "$remote_url" "${refspec#*:}" --no-tags 2>/dev/null || true
              if git push "$remote_url" -f "$refspec" 2>&1; then
                return 0
              fi
              if [[ $i -lt $max_retries ]]; then
                echo "::warning::推送失败，${retry_delay}秒后重试 ($i/$max_retries)..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              fi
            done
            return 1
          }
          echo "::group::推送 VIKINGYFY-main 到远程仓库"
          if retry_push origin VIKINGYFY-main; then
            echo "push_success=true" >> $GITHUB_OUTPUT
            echo "✅ 已推送分支 VIKINGYFY-main"
          else
            echo "::warning::推送失败（已重试），将尝试继续。"
          fi
          echo "::endgroup::"

      - name: 推送失败警告
        if: steps.check.outputs.has_update == 'true' && steps.push.outputs.push_success != 'true'
        run: |
          echo "::error::推送 VIKINGYFY-main 失败，跳过创建标签。"

      - name: 创建日期标签
        if: steps.check.outputs.has_update == 'true' && steps.push.outputs.push_success == 'true'
        run: |
          set -e
          retry_push() {
            local remote_url="$1"
            local refspec="$2"
            local max_retries=3
            local retry_delay=10
            for i in $(seq 1 $max_retries); do
              git fetch "$remote_url" "${refspec#*:}" --no-tags 2>/dev/null || true
              if git push "$remote_url" "$refspec" 2>&1; then
                return 0
              fi
              if [[ $i -lt $max_retries ]]; then
                echo "::warning::推送失败，${retry_delay}秒后重试 ($i/$max_retries)..."
                sleep $retry_delay
                retry_delay=$((retry_delay * 2))
              fi
            done
            return 1
          }
          TAG_NAME=$(git log -1 --format=%cd --date=format:'%Y%m%d' upstream/main)
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️ 标签 $TAG_NAME 已存在，跳过创建。"
          else
            git tag $TAG_NAME
            retry_push origin "$TAG_NAME"
            echo "✅ 已创建标签: $TAG_NAME"
          fi

  del_runs:
    name: 删除旧运行记录
    if: github.event.repository.owner.id == github.event.sender.id  || ! github.event.sender.id
    needs: [sync_lede, sync_luci, sync_packages, sync_and_tag]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 4
