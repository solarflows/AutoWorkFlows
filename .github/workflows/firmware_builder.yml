name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择构建目标'
        required: true
        default: 'both'
        type: choice
        options:
          - 'mt798x'
          - 'qualcommax'
          - 'both'
      release:
        description: '是否发布到 Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_ccache:
        description: '是否启用 ccache 编译缓存'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      force_rebuild:
        description: '强制重新编译（忽略所有缓存，用于修复工具链损坏）'
        required: false
        default: false
        type: boolean
      free_disk_space:
        description: '清理磁盘空间（编译仅需约30G，Runner默认约89G可用，通常无需开启）'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * 3,6'  # 每周三、六 UTC 3:00

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== 构建矩阵（从 targets.json 读取） ==========
  define-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          sparse-checkout: openwrt-configs/immortalwrt/targets.json
          path: AutoWorkFlows

      - id: set-matrix
        run: |
          TARGET_FILTER="${{ github.event.inputs.target || 'both' }}"
          JSON_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/targets.json"
          echo "📋 加载构建目标: $JSON_FILE"
          echo "🎯 过滤条件: $TARGET_FILTER"

          # 先过滤目标，再为缺失字段补默认值
          FILTERED=$(if [ "$TARGET_FILTER" = "both" ]; then
            jq -c '.targets' "$JSON_FILE"
          else
            jq -c --arg t "$TARGET_FILTER" '[.targets[] | select(.target == $t)]' "$JSON_FILE"
          fi)

          MATRIX=$(echo "$FILTERED" | jq -c 'map(. + {
            packages_branch:   (.packages_branch   // .target),
            release_repo:     (.release_repo     // .repo),
            passwall_tag:     (.passwall_tag     // "passwall-\(.target)"),
            release_tag_prefix: (.release_tag_prefix // "")
          })')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "✅ 矩阵: $MATRIX"

  # ========== 构建任务（矩阵并行） ==========
  build:
    name: Build ${{ matrix.target }}
    needs: define-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          path: openwrt
          fetch-depth: 0

      # ---------- 变化检测 ----------
      - name: Get current commit SHA
        id: current_sha
        run: echo "sha=$(git -C openwrt rev-parse HEAD)" >> $GITHUB_OUTPUT

      # ---------- 计算工具链指纹（仅基于 tools/ 和 toolchain/ 目录的变更）----------
      - name: Compute toolchain fingerprint
        id: toolchain_hash
        run: |
          HASH=$(git -C openwrt log --pretty=tformat:"%h" -n1 tools toolchain 2>/dev/null || echo "unknown")
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "🔧 工具链指纹: $HASH"

      - name: Restore last built SHA from cache
        id: cache_sha
        uses: actions/cache/restore@v5
        with:
          path: .last_sha_${{ matrix.target }}
          key: last-sha-${{ matrix.target }}-${{ runner.os }}

      - name: Check if source changed
        id: check
        run: |
          CURRENT="${{ steps.current_sha.outputs.sha }}"
          LAST_FILE=".last_sha_${{ matrix.target }}"
          if [ -f "$LAST_FILE" ]; then LAST=$(cat "$LAST_FILE"); else LAST=""; fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$CURRENT" != "$LAST" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "🔵 定时触发且源码有更新，继续构建。"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "⏭️ 定时触发但源码无变化，跳过构建。"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🟢 手动触发或其他事件，强制构建。"
          fi

      - name: Free Disk Space
        if: steps.check.outputs.changed == 'true' && github.event.inputs.free_disk_space == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Environment Prepare
        if: steps.check.outputs.changed == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt update
          sudo -E apt -y full-upgrade
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E apt-get -qq install libfuse-dev
          sudo timedatectl set-timezone "$TZ"
          # curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo -E apt-get -qq install nodejs

      - name: Show build environment
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "🖥️ 构建环境:"
          echo "  CPU: $(nproc) 核 | $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
          echo "  内存: $(free -h | awk '/^Mem:/ {print $2}') | 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"
          echo "  系统: $(uname -r)"

      # ---------- 缓存工具链（始终启用，除非 force_rebuild）----------
      - name: Restore toolchain cache
        if: steps.check.outputs.changed == 'true' && github.event.inputs.force_rebuild != 'true'
        id: cache-tc
        uses: actions/cache/restore@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-

      # ---------- ccache 编译缓存（由 use_ccache 输入控制）----------
      - name: Restore ccache
        if: steps.check.outputs.changed == 'true' && github.event.inputs.use_ccache != 'false' && github.event.inputs.force_rebuild != 'true'
        id: cache-cc
        uses: actions/cache/restore@v5
        with:
          path: openwrt/.ccache
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-

      - name: Refresh toolchain stamps after cache restore
        if: steps.check.outputs.changed == 'true' && steps.cache-tc.outputs.cache-hit == 'true'
        run: |
          find openwrt/staging_dir/host* openwrt/staging_dir/tool* -type d -name "stamp" 2>/dev/null | while read -r d; do
            find "$d" -type f -exec touch {} +
          done
          mkdir -p openwrt/tmp && echo "1" > openwrt/tmp/.build
          echo "✅ 工具链缓存命中！"
        continue-on-error: true

      # ---------- 构建 ----------
      - name: Update feeds
        if: steps.check.outputs.changed == 'true'
        run: |
          cd openwrt
          git clone --depth 1 https://github.com/solarflows/openwrt-packages.git package/solarflows -b ${{ matrix.packages_branch }}
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Apply Configuration
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd openwrt
          SEED_DIR="../AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          echo "📄 合并种子配置: $SEED_DIR"
          find "$SEED_DIR" -type f -name '*.seed' | sort | while read -r f; do
            echo "  + $(basename "$f")" >&2
            [ -s "$f" ] && cat "$f" || echo "    ⚠️ 跳过空文件" >&2
            echo
          done > .config
          # 确保 .config 为 LF 换行符（防止 Windows CRLF 导致 Make 解析失败）
          sed -i 's/\r$//' .config
          echo "✅ 已生成 .config ($(wc -l < .config) 行)"
          echo "📋 ======== 种子配置内容 ========"
          cat .config
          echo "📋 ======== 种子配置结束 ========"
          make defconfig
          echo "📋 ======== defconfig 后 .config 前 50 行 ========"
          head -50 .config
          echo "📋 ======== defconfig 后 .config 尾部 20 行 ========"
          tail -20 .config

      - name: Download packages
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          cd openwrt
          make download -j8
          echo "📦 清理下载不完整的小文件（<1KB）..."
          find dl -size -1024c -print -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      - name: Build Firmware
        if: steps.check.outputs.changed == 'true'
        id: build
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd openwrt
          # -k: 遇错不停止，全速编译所有能编的包；失败目标留给单线程重试
          set +o pipefail
          make -j$(($(nproc) + 1)) -k 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          if [ "$MAKE_EXIT" -ne 0 ]; then
            echo "⚠️ 有编译错误（退出码: $MAKE_EXIT，其余已全速编译），单线程重试失败目标..."
            make -j1 V=sc 2>&1 | tee -a build.log || {
              echo "💥 构建彻底失败，请查看 build.log 分析原因。"
              exit 1
            }
          fi
          END_TIME=$(date +%s)
          echo "duration=$((END_TIME - START_TIME))" >> $GITHUB_OUTPUT

      # ---------- 上传构建失败日志 ----------
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build-log
          path: openwrt/build.log
          retention-days: 7
          if-no-files-found: ignore

      # ---------- 保存 SHA 记录 ----------
      - name: Save current SHA for next run
        if: steps.check.outputs.changed == 'true' && success()
        run: |
          echo "${{ steps.current_sha.outputs.sha }}" > .last_sha_${{ matrix.target }}

      - name: Cache last SHA
        if: steps.check.outputs.changed == 'true' && success()
        uses: actions/cache/save@v5
        with:
          path: .last_sha_${{ matrix.target }}
          key: last-sha-${{ matrix.target }}-${{ runner.os }}

      # ---------- 保存工具链缓存 ----------
      - name: Save toolchain cache
        if: steps.check.outputs.changed == 'true' && success()
        uses: actions/cache/save@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}

      # ---------- 保存 ccache（由 use_ccache 输入控制）----------
      - name: Check ccache content
        if: steps.check.outputs.changed == 'true' && success() && github.event.inputs.use_ccache != 'false'
        id: ccache-check
        run: |
          if [ -d openwrt/.ccache ] && [ "$(find openwrt/.ccache -type f 2>/dev/null | head -1)" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ .ccache 有内容，准备保存。"
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⏭️ .ccache 不存在或为空，跳过保存。"
          fi

      - name: Save ccache
        if: steps.ccache-check.outputs.ready == 'true'
        uses: actions/cache/save@v5
        with:
          path: openwrt/.ccache
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}

      # ---------- 打包产物 ----------
      - name: Prepare artifacts
        if: steps.check.outputs.changed == 'true'
        run: |
          cd openwrt
          mkdir -p release/firmware
          # 收集 bin/targets 下所有固件文件（.bin/.itb/.img/.manifest/.buildinfo/sha256sums/profiles.json 等）
          # 排除 packages/ 子目录（含 kmod 包，非固件）
          find bin/targets -type f -not -path "*/packages/*" \
            -exec cp {} release/firmware/ \; 2>/dev/null || true
          echo "📦 固件文件列表："
          ls -la release/firmware/ 2>/dev/null || echo "  (无固件文件)"
          # passwall ipk 和 apk 均支持（mt798x 旧版用 ipk，qualcommax 新版用 apk）
          mkdir -p release/passwall
          find bin/packages -name "*passwall*.ipk" -o -name "*passwall*.apk" -exec cp {} release/passwall/ \; 2>/dev/null || true
          DEPS=(chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadowsocksr simple-obfs sing-box tcping xray-core)
          for dep in "${DEPS[@]}"; do
            find bin/packages \( -name "*${dep}*.ipk" -o -name "*${dep}*.apk" \) -exec cp {} release/passwall/ \; 2>/dev/null || true
          done
          echo ""
          echo "📦 Passwall 包列表："
          ls -la release/passwall/ 2>/dev/null || echo "  (无 passwall 包)"
          echo ""
          echo "📊 产物汇总："
          echo "  固件: $(find release/firmware -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/firmware 2>/dev/null | cut -f1)"
          echo "  Passwall: $(find release/passwall -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/passwall 2>/dev/null | cut -f1)"
          cd release && tar czf ../${{ matrix.target }}-release.tar.gz .

      # ---------- 构建信息 JSON（独立 artifact） ----------
      - name: Generate build info artifact
        if: steps.check.outputs.changed == 'true'
        run: |
          NOW=$(date +'%Y-%m-%d %H:%M:%S')
          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "branch": "${{ matrix.ref }}",
            "duration": "${{ steps.build.outputs.duration }}",
            "cache_hit": "${{ steps.cache-tc.outputs.cache-hit }}",
            "config": "${{ matrix.config }}",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_tag_prefix": "${{ matrix.release_tag_prefix }}",
            "timestamp": "${NOW}"
          }
          JSONEOF

      - name: Upload firmware artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: openwrt/${{ matrix.target }}-release.tar.gz
          retention-days: 7

      - name: Upload passwall artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-passwall
          path: openwrt/release/passwall
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build info artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build-info
          path: build-info.json
          retention-days: 7

  # ========== 发布任务 ==========
  publish:
    name: Publish Releases
    needs: build
    if: |
      !cancelled() &&
      needs.build.result != 'skipped' &&
      (github.event.inputs.release != 'false' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'

      - name: Remove failed build logs
        run: rm -rf artifacts/*-build-log 2>/dev/null || true

      - name: Publish all targets
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # ============================================================
          # 通用发布函数：固件 Release + Passwall 固定 Release
          # ============================================================
          publish_target() {
            local TARGET="$1"

            local INFO_FILE="artifacts/${TARGET}-build-info/build-info.json"
            if [ ! -f "$INFO_FILE" ]; then
              echo "⏭️  [${TARGET}] 未找到构建产物，跳过发布。"
              return 0
            fi

            # -------- 从 build-info.json 读取所有参数 --------
            local TARGET_NAME BRANCH DURATION CACHE_HIT CONFIG TIMESTAMP
            local RELEASE_REPO PASSWALL_TAG TAG_PREFIX
            TARGET_NAME=$(jq -r '.target'              "$INFO_FILE")
            BRANCH=$(jq -r '.branch'                   "$INFO_FILE")
            DURATION=$(jq -r '.duration'               "$INFO_FILE")
            CACHE_HIT=$(jq -r '.cache_hit'             "$INFO_FILE")
            CONFIG=$(jq -r '.config'                   "$INFO_FILE")
            TIMESTAMP=$(jq -r '.timestamp'             "$INFO_FILE")
            RELEASE_REPO=$(jq -r '.release_repo'        "$INFO_FILE")
            PASSWALL_TAG=$(jq -r '.passwall_tag'        "$INFO_FILE")
            TAG_PREFIX=$(jq -r '.release_tag_prefix'    "$INFO_FILE")

            # -------- 生成版本 Tag --------
            local DATE_TAG TAG TITLE
            DATE_TAG="v$(date +'%Y%m%d-%H%M')"
            TAG="${TAG_PREFIX}${DATE_TAG}"
            TITLE="${TAG_PREFIX}Build ${DATE_TAG}"
            echo "🏷️  [${TARGET}] 版本: $TAG → $RELEASE_REPO"

            # -------- 解包固件 --------
            local RELEASE_TAR="artifacts/${TARGET}-release/${TARGET}-release.tar.gz"
            if [ -f "$RELEASE_TAR" ]; then
              tar xzf "$RELEASE_TAR" -C "artifacts/${TARGET}-release/"
            fi

            # -------- 发布固件 --------
            local FW_DIR="artifacts/${TARGET}-release/firmware"
            local FW_COUNT
            FW_COUNT=$(find "$FW_DIR" -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -d "$FW_DIR" ] && [ -n "$FW_COUNT" ]; then
              cat > /tmp/release_body.md <<RELEOF
          ### 构建信息
          - **目标**: ${TARGET_NAME}
          - **分支**: ${BRANCH}
          - **配置文件**: ${CONFIG}
          - **构建耗时**: ${DURATION} 秒
          - **缓存命中**: ${CACHE_HIT}
          - **构建时间**: ${TIMESTAMP}
          RELEOF

              if gh release view "$TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                echo "📤 [${TARGET}] Release $TAG 已存在，更新固件 assets..."
                gh release upload "$TAG" --repo "$RELEASE_REPO" "$FW_DIR"/* --clobber
              else
                echo "🚀 [${TARGET}] 创建 Release $TAG ..."
                gh release create "$TAG" --repo "$RELEASE_REPO" \
                  --title "${TARGET_NAME} ${TITLE}" \
                  --notes-file /tmp/release_body.md \
                  "$FW_DIR"/*
              fi
            else
              echo "⚠️  [${TARGET}] 没有找到固件文件，跳过固件发布。"
            fi

            # -------- 发布 Passwall（固定 Release） --------
            local PW_DIR="artifacts/${TARGET}-passwall"
            if [ -d "$PW_DIR" ]; then
              local PW_FILES
              PW_FILES=$(find "$PW_DIR" -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' \) -type f 2>/dev/null || true)
              if [ -n "$PW_FILES" ]; then
                if gh release view "$PASSWALL_TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                  echo "📤 [${TARGET}] Passwall Release 已存在，更新 assets..."
                  echo "$PW_FILES" | xargs gh release upload "$PASSWALL_TAG" --repo "$RELEASE_REPO" --clobber
                else
                  echo "🚀 [${TARGET}] 创建 Passwall Release ..."
                  gh release create "$PASSWALL_TAG" --repo "$RELEASE_REPO" \
                    --title "Passwall Packages (${TARGET})" \
                    --notes "最新 passwall 及依赖，更新于 $(date +'%Y-%m-%d %H:%M')" \
                    $(echo "$PW_FILES")
                fi
              else
                echo "⚠️  [${TARGET}] 没有找到 passwall 文件，跳过。"
              fi
            fi

            echo "✅ [${TARGET}] 发布流程完成。"
          }

          # ============================================================
          # 按目标依次发布（参数全从 build-info.json 读取）
          # ============================================================
          for target_dir in artifacts/*-build-info; do
            TARGET_NAME=$(basename "$target_dir" | sed 's/-build-info//')
            publish_target "$TARGET_NAME"
          done

          echo "🎉 全部发布流程完成！"
