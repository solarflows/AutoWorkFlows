name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择构建目标'
        required: true
        default: 'both'
        type: choice
        options:
          - 'mt798x'
          - 'qualcommax'
          - 'both'
      release:
        description: '是否发布到 Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_ccache:
        description: '是否启用 ccache 编译缓存'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      force_rebuild:
        description: '强制重新编译（忽略所有缓存，用于修复工具链损坏）'
        required: false
        default: false
        type: boolean
      free_disk_space:
        description: '清理磁盘空间（编译仅需约30G，Runner默认约89G可用，通常无需开启）'
        required: false
        default: false
        type: boolean
      enable_tmate:
        description: '失败时启动 tmate 调试会话（auto=仅手动触发时启动）'
        required: false
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'true'
          - 'false'
  schedule:
    - cron: '6 7 * * 1,6'  # 每周一和周六的 7:06 AM（UTC 时间，上海时间为 15:06）

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== 构建矩阵（从 targets.json 读取） ==========
  define-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          sparse-checkout: openwrt-configs/immortalwrt/targets.json
          path: AutoWorkFlows

      - id: set-matrix
        run: |
          TARGET_FILTER="${{ github.event.inputs.target || 'both' }}"
          JSON_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/targets.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ 配置文件不存在: $JSON_FILE"
            exit 1
          fi
          echo "📋 加载构建目标: $JSON_FILE ($(jq '.targets | length' "$JSON_FILE") 个目标)"
          echo "🎯 过滤条件: $TARGET_FILTER"

          FILTERED=$(jq -c --arg t "$TARGET_FILTER" '
            if $t == "both" then .targets
            else [.targets[] | select(.target == $t)] end
          ' "$JSON_FILE")

          MATRIX=$(echo "$FILTERED" | jq -c 'map(. + {
            packages_branch:   (.packages_branch   // .target),
            release_repo:     (.release_repo     // .repo),
            passwall_tag:     (.passwall_tag     // "passwall-\(.target)"),
            release_tag_prefix: (.release_tag_prefix // ""),
            apk_signing:      (.apk_signing      // false)
          })')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "✅ 矩阵: $MATRIX"

      # -------- 触发上游同步工作流 --------
      - name: Trigger OpenWRT_Packages_Updater
        id: trigger-updater
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 OpenWRT_Packages_Updater..."
          gh workflow run OpenWRT_Packages_Updater.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow OpenWRT_Packages_Updater.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "updater_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      - name: Trigger Sync_Push
        id: trigger-sync
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 Sync_Push..."
          gh workflow run Sync_Push.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow Sync_Push.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "sync_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      - name: Wait for upstream workflows (parallel)
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "⏳ 并行等待上游工作流完成..."
          # 后台进程并行等待，不增加 runner 消耗
          gh run watch ${{ steps.trigger-updater.outputs.updater_id }} \
            --repo ${{ github.repository }} \
            --exit-status &
          PID1=$!
          gh run watch ${{ steps.trigger-sync.outputs.sync_id }} \
            --repo ${{ github.repository }} \
            --exit-status &
          PID2=$!
          # 等待两个后台进程都完成
          EXIT_CODE=0
          wait $PID1 || EXIT_CODE=1
          echo "✅ OpenWRT_Packages_Updater 完成"
          wait $PID2 || EXIT_CODE=1
          echo "✅ Sync_Push 完成"
          exit $EXIT_CODE

  # ========== 构建任务（矩阵并行） ==========
  # 注意：矩阵 job 的 outputs 只反映最后一个完成的矩阵分片的值（不可预测顺序），
  # 因此 publish job 不应依赖 needs.build.outputs.changed。
  build:
    name: Build ${{ matrix.target }}
    needs: define-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    strategy:
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          path: openwrt
          fetch-depth: 1

      - name: 📦 Get source & clone packages
        id: clone_packages
        run: |
          cd openwrt

          # 获取源码 SHA
          SHA=$(git rev-parse --short HEAD)
          SHA_FULL=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_full=${SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 源码 @ ${SHA}"

          # 克隆自定义软件包
          echo "📦 克隆 openwrt-packages (${{ matrix.packages_branch }}) ..."
          git clone --depth 1 https://github.com/solarflows/openwrt-packages.git package/solarflows -b ${{ matrix.packages_branch }}
          PKG_SHA=$(git -C package/solarflows rev-parse --short HEAD)
          PKG_SHA_FULL=$(git -C package/solarflows rev-parse HEAD)
          echo "packages_sha=${PKG_SHA}" >> $GITHUB_OUTPUT
          echo "packages_sha_full=${PKG_SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 openwrt-packages @ ${PKG_SHA}"

          # ── Summary ──
          echo "| 📦 **源码** | [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ \`${SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 **软件包** | [${{ matrix.packages_branch }}](https://github.com/solarflows/openwrt-packages/tree/${{ matrix.packages_branch }}) @ \`${PKG_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ───────── 计算工具链指纹（仅基于 tools/ 和 toolchain/ 目录的变更）─────────
      - name: 🔧 Compute toolchain hash
        id: toolchain_hash
        run: |
          HASH=$(git -C openwrt log --pretty=tformat:"%h" -n1 tools toolchain 2>/dev/null || echo "unknown")
          FORCE="${{ github.event.inputs.force_rebuild }}"
          # force_rebuild 时插入 force- 前缀，使 cache key 永不精确命中，
          # 确保 actions/cache post-job 一定保存新缓存（cache-hit=false）
          if [ "$FORCE" == "true" ]; then
            HASH="force-${HASH}"
            echo "🔧 强制重建模式 · 缓存 key 已注入 force- 前缀"
          fi
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "🔧 工具链指纹: $HASH"

      - name: 💾 Cache source marker
        id: check
        uses: actions/cache@v5
        with:
          path: .sha_marker
          key: sha-${{ matrix.target }}-${{ steps.clone_packages.outputs.sha }}-${{ steps.clone_packages.outputs.packages_sha }}

      - name: 📋 Evaluate changes
        id: evaluate
        run: |
          SHA_SHORT="${{ steps.clone_packages.outputs.sha }}"
          SHA_FULL="${{ steps.clone_packages.outputs.sha_full }}"
          PKG_SHA="${{ steps.clone_packages.outputs.packages_sha }}"
          echo "📋 源码:   $SHA_FULL"
          echo "📋 软件包: ${{ steps.clone_packages.outputs.packages_sha_full }}"

          # 判断是否跳过构建
          if [ "${{ steps.check.outputs.cache-hit }}" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            BUILD_STATUS="⏭️ 缓存命中，定时触发无变更 → 跳过构建"
          elif [ "${{ steps.check.outputs.cache-hit }}" = "true" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            BUILD_STATUS="🟢 缓存命中，但手动触发 → 强制构建"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            BUILD_STATUS="🔵 源码有变更 → 继续构建"
          fi
          # 注意：.sha_marker 不在本步骤创建，而是在 build 成功后才写入（见末尾 save source marker 步骤），
          # 避免构建失败时 actions/cache post-job 将 marker 误缓存，导致下次定时触发跳过修复后的构建。

          # ── Summary 标题 + 构建概述（表格保持打开，后续 step 继续追加行） ──
          {
            echo "---"
            echo "## 📋 ${{ matrix.target }} — Build Summary"
            echo ""
            echo "| 项目 | 详情 |"
            echo "|------|------|"
            echo "| 🎯 **目标** | ${{ matrix.target }} |"
            echo "| 🔄 **触发方式** | ${{ github.event_name }} |"
            echo "| 📌 **变更检测** | ${BUILD_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🕐 Record build start time
        if: steps.evaluate.outputs.changed == 'true'
        id: start_time
        run: |
          START_FMT=$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')
          echo "timestamp=${START_FMT}" >> $GITHUB_OUTPUT
          echo "🕐 构建开始时间: ${START_FMT}"

          # ── Summary ──
          echo "| 🕐 **构建开始** | ${START_FMT} |" >> "$GITHUB_STEP_SUMMARY"

      - name: 🧹 Free Disk Space
        if: steps.evaluate.outputs.changed == 'true' && github.event.inputs.free_disk_space == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 🛠️ 1. Prepare Environment
        if: steps.evaluate.outputs.changed == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 1. Prepare Environment           ║"
          echo "╚══════════════════════════════════════╝"
          echo "🧹 清理无用软件包..."
          sudo -E apt -y purge firefox 2>/dev/null || true
          echo "📦 更新系统..."
          sudo -E apt update
          sudo -E apt -yqq full-upgrade
          echo "🧹 清理 apt 缓存..."
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          echo "📦 安装编译依赖..."
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"
          echo "✅ 环境准备完成"


      # ───────── 构建缓存（工具链 + ccache）─────────
      - name: 🔧 Restore toolchain cache
        if: steps.evaluate.outputs.changed == 'true'
        id: cache-tc
        uses: actions/cache@v5
        with:
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*

      - name: 🗄️ Restore ccache
        if: steps.evaluate.outputs.changed == 'true' && github.event.inputs.use_ccache != 'false'
        id: cache-cc
        uses: actions/cache@v5
        with:
          # 刻意使用 run_id 而非内容哈希，保证 cache-hit 永远为 false。
          # 原因：ccache 的失效因素不可穷举（任何 package Makefile/CFLAGS/依赖版本变化
          # 都可能导致编译输出不同），无法用单一内容哈希精确建模。
          # run_id 确保每轮成功构建后必定保存最新缓存，restore-keys 模糊匹配回退
          # 到最近一次快照；旧条目由后续清理步骤（见 Purge stale remote caches）删除。
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-
          path: openwrt/.ccache

      - name: 🔄 Verify & report cache status
        if: steps.evaluate.outputs.changed == 'true'
        id: cache-refresh
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"

          # ====== 强制重建：清除已恢复的缓存文件 + 删除远端缓存 =====
          if [ "$FORCE" == "true" ]; then
            echo "🧹 强制重建模式 · 清除所有缓存..."
            # 工具链：用 make 官方指令清理 staging_dir
            if [ -d openwrt/staging_dir ]; then
              rm -rf openwrt/staging_dir/host* openwrt/staging_dir/tool*
              echo "  ✂️ staging_dir/host* 和 tool* 已删除"
            fi
            # ccache：用官方指令清理缓存目录
            if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
              ccache -C 2>/dev/null || true  # --clear: 完全清空缓存
              rm -rf openwrt/.ccache
              echo "  ✂️ .ccache 已清空 (ccache -C)"
            fi
            echo "✅ 强制清理完成 · 本次将全量编译并保存全新缓存"
          fi

          # ====== 工具链：检测 staging_dir ======
          TOOLCHAIN_RESTORED="false"
          if [ "$FORCE" != "true" ] && [ -d "openwrt/staging_dir" ] && [ "$(find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | head -1)" ]; then
            find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | while read -r d; do
              find "$d" -type f -exec touch {} +
            done
            # 修正 host ccache 软链接：OpenWrt 默认将 gcc/g++ 链接到系统编译器，
            # 但同目录下有 ccache 二进制可用，重链接后 host 包(node/rust等)编译可走 ccache
            if [ -x "openwrt/staging_dir/host/bin/ccache" ]; then
              for cmd in gcc g++ cc c++; do
                ln -sf ccache "openwrt/staging_dir/host/bin/$cmd" 2>/dev/null || true
              done
              echo "⚡ host ccache 软链接已修正"
            fi
            mkdir -p openwrt/tmp && echo "1" > openwrt/tmp/.build
            TOOLCHAIN_RESTORED="true"
            echo "🔧 工具链缓存已恢复 · stamp 已刷新"
          else
            echo "ℹ️ 工具链缓存未命中 · 将全量编译"
          fi
          echo "toolchain_restored=${TOOLCHAIN_RESTORED}" >> $GITHUB_OUTPUT

          # ====== ccache：检测 .ccache 目录 ======
          CCACHE_RESTORED="false"
          if [ "$FORCE" != "true" ] && [ -d "openwrt/.ccache" ] && [ "$(find openwrt/.ccache -type f 2>/dev/null | head -1)" ]; then
            CCACHE_RESTORED="true"
            echo "⚡ ccache 已恢复（来自上次构建）"
          fi
          echo "ccache_restored=${CCACHE_RESTORED}" >> $GITHUB_OUTPUT

          # ====== 缓存命中汇总 ======
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║  📊 缓存命中状态                     ║"
          echo "╚══════════════════════════════════════╝"

          # 工具链：区分 exact key 命中 vs restore-key 模糊恢复
          TC_EXACT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$TOOLCHAIN_RESTORED" = "true" ]; then
            if [ "$TC_EXACT" = "true" ]; then
              echo "  🔧 工具链 (staging_dir): ✅ 精确命中 (exact key)"
            else
              echo "  🔧 工具链 (staging_dir): ♻️ 模糊恢复 (restore-key)"
            fi
          else
            echo "  🔧 工具链 (staging_dir): 🔨 重新编译"
          fi

          # ccache：仅展示命中/未命中
          CC_ICON=$([ "$CCACHE_RESTORED" = "true" ] && echo "✅ 命中" || echo "🔄 冷启动")
          echo "  ⚡ ccache (.ccache):      ${CC_ICON}"

          # 输出工具链精确命中标记供 release note 使用
          # 注意：此步骤是诊断/报告性质的，设置 continue-on-error 避免瞬态 IO 错误
          # （如 find/du 在并发环境下读到临时文件被删除）杀死整个 7 小时固件构建。
          # 下游引用本 step 的 outputs 时（build-info.json）应容忍空值。
          echo "toolchain_exact=${TC_EXACT}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ───────── 构建 ─────────
      - name: 🔑 Setup APK Signing Key
        if: steps.evaluate.outputs.changed == 'true' && fromJson(matrix.apk_signing)
        id: signing_key
        env:
          BUILD_KEY: ${{ secrets.BUILD_KEY }}
        run: |
          # 使用固定密钥签名 APK 包，避免路由器报 untrusted key
          # 密钥来源：GitHub Secrets 中的 BUILD_KEY（RSA 私钥 PEM）
          if [ -n "$BUILD_KEY" ]; then
            # 通过 env 变量写入，避免 secret 出现在日志中（echo 可能导致 GitHub mask 失效）
            printf '%s' "$BUILD_KEY" > openwrt/key-build
            chmod 600 openwrt/key-build
            # 提取公钥指纹用于追踪（不影响签名）
            FP=$(openssl rsa -in openwrt/key-build -pubout 2>/dev/null | openssl sha256 | awk '{print $NF}')
            echo "fingerprint=${FP}" >> $GITHUB_OUTPUT
            echo "🔑 APK 签名密钥已注入 (SHA256: ${FP:0:16}...)"
          else
            echo "⚠️ BUILD_KEY secret 未设置，使用构建系统自动生成的随机密钥"
            echo "fingerprint=none" >> $GITHUB_OUTPUT
          fi

      - name: 📥 2. Update Feeds & Packages
        if: steps.evaluate.outputs.changed == 'true'
        id: feeds
        run: |
          set -euo pipefail
          echo "📥 更新 feeds ..."
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "✅ feeds 准备完成"

      - name: ⚙️ 3. Apply Configuration
        if: steps.evaluate.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  ⚙️ 3. Apply Configuration            ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          SEED_DIR="../AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          echo "📄 合并种子配置: $SEED_DIR"
          find "$SEED_DIR" -type f -name '*.seed' | sort | while read -r f; do
            echo "  + $(basename "$f")" >&2
            if [ ! -s "$f" ]; then
              echo "    ⚠️ 跳过空文件" >&2
              continue
            fi
            cat "$f"
            [ -z "$(tail -c1 "$f")" ] || echo
            true
          done > .config
          sed -i 's/\r$//; s/\xef\xbb\xbf//g' .config
          echo "✅ 已生成 .config ($(wc -l < .config) 行)"
          echo "📋 ======== 种子配置 (.config) ========"
          cat .config
          echo "🔧 运行 make defconfig (超时 5 分钟)..."
          timeout 300 make defconfig || {
            echo "❌ make defconfig 超时或失败，请检查 .config 语法"
            exit 1
          }
          echo "📋 ======== defconfig 后 .config ========"
          cat .config

      - name: 📥 4. Download Source Packages
        if: steps.evaluate.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  📥 4. Download Source Packages      ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          echo "📥 下载源码包 (并行 $(nproc) 线程, 超时 30 分钟)..."
          timeout 1800 make download -j$(nproc) || {
            echo "⚠️ make download 超时或失败，重试单线程..."
            timeout 3600 make download -j1 || {
              echo "❌ make download 彻底失败"
              exit 1
            }
          }
          echo "📦 清理下载不完整的小文件（<1KB）..."
          find dl -size -1024c -print -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      - name: 🔨 5. Build Firmware
        if: steps.evaluate.outputs.changed == 'true'
        id: build
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  🔨 5. Build Firmware                ║"
          echo "╚══════════════════════════════════════╝"
          START_TIME=$(date +%s)
          cd openwrt
          export CC="ccache gcc"
          export CXX="ccache g++"
          NPROC=$(($(nproc) + 1))

          # 确保 make_exit 总有值输出（防止步骤意外退出时 retry 误判）
          MAKE_EXIT=1
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT

          echo "🔨 并行编译 (${NPROC} 线程, -k)..."
          set +o pipefail
          make -j${NPROC} -k 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION_SEC}" >> $GITHUB_OUTPUT
          echo "⏱️ 本步骤耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 重试（先更新仓库 → 并行重试 → 单线程兜底）─────────
      - name: 🔄 Retry build
        if: steps.evaluate.outputs.changed == 'true' && steps.build.outputs.make_exit != '0'
        id: retry
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd openwrt
          export CC="ccache gcc"
          export CXX="ccache g++"

          echo "⚠️ 并行编译有错误 → 更新仓库后重试..."

          echo "📥 更新源码仓库 (${{ matrix.ref }})..."
          git pull origin ${{ matrix.ref }} 2>/dev/null || echo "   (无远端更新或非分支引用)"
          echo "📥 更新 openwrt-packages (${{ matrix.packages_branch }})..."
          git -C package/solarflows pull origin ${{ matrix.packages_branch }} 2>/dev/null || echo "   (无远端更新)"
          echo "📥 更新 feeds ..."
          ./scripts/feeds update -a && ./scripts/feeds install -a

          # 第一轮：并行重试（很多竞争错误二次就能过）
          echo "🔄 第一轮重试：并行编译 ($(nproc) 线程)..."
          RETRY_EXIT=1
          set +o pipefail
          make -j$(nproc) 2>&1 | tee -a build.log
          RETRY_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          if [ "$RETRY_EXIT" -ne 0 ]; then
            # 第二轮：单线程重试（最后一搏）
            echo "⚠️ 并行重试仍有错误 → 单线程最后一搏..."
            set +o pipefail
            make -j1 2>&1 | tee -a build.log
            RETRY_EXIT=${PIPESTATUS[0]}
            set -o pipefail
          fi

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "retry_duration=${DURATION_SEC}" >> $GITHUB_OUTPUT

          if [ "$RETRY_EXIT" -ne 0 ]; then
            echo "💥 构建彻底失败 · 请查看 build.log 及 logs/ 目录"
            exit 1
          fi
          echo "✅ 重试完成 · 耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 总耗时汇总 ─────────
      - name: ⏱️ Total Build Duration
        if: always() && steps.evaluate.outputs.changed == 'true'
        id: total_duration
        run: |
          BUILD_DUR="${{ steps.build.outputs.duration }}"
          RETRY_DUR="${{ steps.retry.outputs.retry_duration || '0' }}"
          TOTAL_SEC=$((BUILD_DUR + RETRY_DUR))
          TOTAL_FMT=$(printf '%dh %dm %ds' $((TOTAL_SEC/3600)) $(((TOTAL_SEC%3600)/60)) $((TOTAL_SEC%60)))
          echo "duration=${TOTAL_SEC}" >> $GITHUB_OUTPUT
          echo "duration_fmt=${TOTAL_FMT}" >> $GITHUB_OUTPUT
          echo "⏱️ 总编译耗时: ${TOTAL_FMT} (并行 ${BUILD_DUR}s + 重试 ${RETRY_DUR}s)"

          # ── Summary ──
          echo "| ⏱️ **编译耗时** | ${TOTAL_FMT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 **构建结束** | $(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S') |" >> "$GITHUB_STEP_SUMMARY"

          # 表格结束，追加运行环境信息
          {
            echo ""
            echo "### 运行环境"
            echo "\`\`\`"
            echo "🖥️ 构建环境"
            echo "  🧠 CPU : $(nproc) 核 | $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
            echo "  💾 内存: $(free -h | awk '/^Mem:/ {print $2}') | 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"
            echo "  🐧 系统: $(uname -r)"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 编译日志统计（合并：耗时提取 + 日志分析，只输出到 Summary）─────────
      - name: 📊 Build Log Analysis
        if: always() && steps.evaluate.outputs.changed == 'true'
        run: |
          cd openwrt
          TOTAL=$(find logs -name 'compile.txt' 2>/dev/null | wc -l)
          INCOMPLETE=$(find logs -name 'compile.txt' -exec sh -c '
            tail -1 "$1" 2>/dev/null | grep -q "^time: " || echo "$1"
          ' _ {} \; 2>/dev/null | wc -l)
          EMPTY=$(find logs -name 'compile.txt' -size 0 2>/dev/null | wc -l)

          # 耗时提取
          find logs -name 'compile.txt' -exec sh -c 'tail -1 "$1" 2>/dev/null' _ {} \; 2>/dev/null | \
            grep '^time: ' | awk -F'#' 'NF==4' > build_time_clean.log || true

          # ── Summary ──
          {
            echo ""
            echo "### 📊 编译统计"
            echo "| 指标 | 数值 |"
            echo "|------|------|"
            echo "| compile.txt 总数 | ${TOTAL} |"
            echo "| 未完成（末行无 time:） | ${INCOMPLETE} |"
            echo "| 空日志 | ${EMPTY} |"
            echo "| 耗时记录数 | $(wc -l < build_time_clean.log 2>/dev/null || echo 0) |"
            echo ""
            echo "🐌 编译耗时 Top 5:"
            echo "\`\`\`"
            awk -F'#' '{
              pkg=$1; sub(/^time: /, "", pkg); sub(/\/compile$/, "", pkg);
              real=$2;
              printf "%8.2fs  %s\n", real, pkg
            }' build_time_clean.log 2>/dev/null | sort -rn 2>/dev/null | head -5 || true
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── ccache 统计与清理（独立步骤，不受构建成败影响）─────────
      - name: 📈 ccache Stats & Cleanup
        if: always() && steps.evaluate.outputs.changed == 'true'
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📈 ccache 统计与压缩测量             ║"
          echo "╚══════════════════════════════════════╝"

          # ── 初始化 Summary 行供后续追加 ──
          TC_HIT_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored }}" = "true" ] && echo "✅ 命中" || echo "🔨 重编")
          TC_DISK=$(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo "N/A")

          if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
            export CCACHE_DIR="$(pwd)/openwrt/.ccache"
            ccache --max-size 5G 2>/dev/null || true

            # ── 磁盘用量 + 压缩大小 ──
            DISK_USAGE_HUMAN=$(du -sh "openwrt/.ccache" 2>/dev/null | cut -f1)
            DISK_USAGE_BYTES=$(du -sb "openwrt/.ccache" 2>/dev/null | awk '{print $1}')
            CC_GZIP_BYTES=$(timeout 60 tar cf - openwrt/.ccache 2>/dev/null | gzip -1 -c | wc -c 2>/dev/null || echo 0)
            CC_GZIP_HUMAN=""
            CC_REAL_RATIO=""
            if [ -n "$CC_GZIP_BYTES" ] && [ "$CC_GZIP_BYTES" -gt 0 ] && [ -n "$DISK_USAGE_BYTES" ] && [ "$DISK_USAGE_BYTES" -gt 0 ]; then
              CC_GZIP_HUMAN=$(numfmt --to=iec "$CC_GZIP_BYTES" 2>/dev/null || echo "${CC_GZIP_BYTES} B")
              CC_REAL_RATIO=$(awk -v disk="$DISK_USAGE_BYTES" -v gzip="$CC_GZIP_BYTES" 'BEGIN {printf "%.1f", disk / gzip}' 2>/dev/null)
            fi

            # ── 解析关键指标（兼容 ccache 3.x 旧格式 + 4.x 新格式）──
            CC_RAW=$(ccache -s 2>/dev/null || true)
            HITS_DIRECT=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(direct\)|Direct):\s*\K[0-9]+' | head -1)
            HITS_PREP=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(preprocessed\)|Preprocessed):\s*\K[0-9]+' | head -1)
            MISSES=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache miss|Misses):\s*\K[0-9]+' | head -1)
            CACHE_SIZE=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache size \(|Cache size \()G(?:B|iB)\):\s*\K[0-9.]+' | head -1)
            # 如果 4.x 格式的 Direct/Preprocessed/Misses 没抓到，说明可能是其他格式，置空即可
            [ -z "$HITS_DIRECT" ] && HITS_DIRECT="?"
            [ -z "$HITS_PREP" ] && HITS_PREP="?"
            [ -z "$MISSES" ] && MISSES="?"
            [ -z "$CACHE_SIZE" ] && CACHE_SIZE="?"

            # ── 输出完整原始 ccache -s 到 Summary ──
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$CC_RAW" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            # ── 清理过期缓存 ──
            echo "🧹 清理过期缓存 (上限: 5GiB)..."
            ccache --cleanup 2>/dev/null || true
            echo ""

            # ── 构造 ccache 行变量 ──
            CC_HIT=$([ "${{ steps.cache-refresh.outputs.ccache_restored }}" = "true" ] && echo "✅ 命中" || echo "🔄 冷启")
            CCACHE_LINE="| **ccache** (.ccache) | ${CC_HIT} | ${DISK_USAGE_HUMAN:-N/A} | ${CC_GZIP_HUMAN:-N/A} |"
            CCACHE_HITRATE="direct=${HITS_DIRECT} preprocessed=${HITS_PREP} miss=${MISSES} size=${CACHE_SIZE}"
          else
            echo "⚠️ ccache 不可用或 .ccache 目录不存在"
            CCACHE_LINE="| **ccache** (.ccache) | 🔄 冷启 | N/A | N/A |"
            CCACHE_HITRATE="N/A"
          fi

          # ── Summary 缓存状态（日志 + Summary 双写）──
          {
            echo ""
            echo "### 💾 缓存状态"
            echo "| 缓存 | 恢复状态 | 磁盘大小 | GitHub 上传大小 |"
            echo "|------|----------|----------|----------------|"
            echo "| **工具链** (staging_dir) | ${TC_HIT_LABEL} | ${TC_DISK} | ~N/A |"
            echo "${CCACHE_LINE}"
            echo "| **ccache 缩写** | ${CCACHE_HITRATE:-N/A} | — | — |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 失败处理 ─────────
      - name: 📤 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-log
          path: openwrt/build.log
          retention-days: 7
          if-no-files-found: ignore

      # ───────── 手动触发失败时启动 tmate 调试会话 ─────────
      - name: 🖥️ Tmate debug session
        if: |
          failure() && (
            github.event.inputs.enable_tmate == 'true' ||
            ((github.event.inputs.enable_tmate == 'auto' || github.event.inputs.enable_tmate == '') && github.event_name == 'workflow_dispatch')
          )
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      # ───────── 清理远端缓存（统一入口，仅构建成功时执行）─────────
      - name: 🧹 Purge stale remote caches
        if: steps.evaluate.outputs.changed == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"
          echo "🧹 清理远端缓存 (force_rebuild=${FORCE})..."

          # 工具链：force_rebuild 时无条件全部删除，否则仅在 exact key 未命中时删除
          TC_EXACT_HIT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$FORCE" == "true" ] || [ "$TC_EXACT_HIT" != "true" ]; then
            TC_LIST=$(gh cache list --repo "${{ github.repository }}" --key "immwrt-toolchain-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id')
            for CACHE_ID in $TC_LIST; do
              gh cache delete "$CACHE_ID" --repo "${{ github.repository }}"
            done
            echo "🧹 旧工具链缓存已清理"
          else
            echo "ℹ️ 工具链 exact key 命中 · 缓存不可变，跳过清理"
          fi

          # ccache：同上逻辑
          CC_EXACT_HIT="${{ steps.cache-cc.outputs.cache-hit }}"
          if [ "$FORCE" == "true" ] || [ "$CC_EXACT_HIT" != "true" ]; then
            CC_LIST=$(gh cache list --repo "${{ github.repository }}" --key "immwrt-ccache-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id')
            for CACHE_ID in $CC_LIST; do
              gh cache delete "$CACHE_ID" --repo "${{ github.repository }}"
            done
            echo "🧹 旧 ccache 缓存已清理"
          else
            echo "ℹ️ ccache exact key 命中 · 缓存不可变，跳过清理"
          fi

      # ───────── 打包产物 ─────────
      - name: 📦 6. Package Artifacts
        if: steps.evaluate.outputs.changed == 'true' && success()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 6. Package Artifacts             ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          mkdir -p release/firmware
          # 收集 bin/targets 下所有固件文件（.bin/.itb/.img/.manifest/.buildinfo/sha256sums/profiles.json 等）
          # 排除 packages/ 子目录（含 kmod 包，非固件）
          find bin/targets -type f -not -path "*/packages/*" \
            -exec cp {} release/firmware/ \; 2>/dev/null || true
          echo "📦 固件文件列表："
          ls -la release/firmware/ 2>/dev/null || echo "  (无固件文件)"
          # passwall ipk 和 apk 均支持（mt798x 旧版用 ipk，qualcommax 新版用 apk）
          mkdir -p release/passwall
          find bin/packages -name "*passwall*.ipk" -o -name "*passwall*.apk" -exec cp {} release/passwall/ \; 2>/dev/null || true
          DEPS=(chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadowsocksr simple-obfs sing-box tcping xray-core)
          for dep in "${DEPS[@]}"; do
            find bin/packages \( -name "*${dep}*.ipk" -o -name "*${dep}*.apk" \) -exec cp {} release/passwall/ \; 2>/dev/null || true
          done
          echo ""
          echo "📦 Passwall 包列表："
          ls -la release/passwall/ 2>/dev/null || echo "  (无 passwall 包)"
          echo ""
          # 编译耗时数据已输出到 Summary，不再单独打包日志文件
          mkdir -p release/build-logs
          echo ""
          echo ""
          echo "📊 产物汇总："
          echo "  固件: $(find release/firmware -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/firmware 2>/dev/null | cut -f1)"
          echo "  Passwall: $(find release/passwall -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/passwall 2>/dev/null | cut -f1)"
          echo "  编译耗时: $(find release/build-logs -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/build-logs 2>/dev/null | cut -f1)"
          (cd release && tar czf ../${{ matrix.target }}-release.tar.gz .)

          # ── Summary 产物统计 ──
          {
            echo ""
            echo "### 📦 产物统计"
            echo "| 类别 | 数量 | 大小 |"
            echo "|------|------|------|"
            echo "| **固件** | $(find release/firmware -type f 2>/dev/null | wc -l) 个 | $(du -sh release/firmware 2>/dev/null | cut -f1) |"
            echo "| **Passwall** | $(find release/passwall -type f 2>/dev/null | wc -l) 个 | $(du -sh release/passwall 2>/dev/null | cut -f1) |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 构建信息 JSON（独立 artifact）─────────
      - name: 📋 Generate build info
        if: steps.evaluate.outputs.changed == 'true'
        run: |
          NOW="${{ steps.start_time.outputs.timestamp }}"
          SHA_FULL="${{ steps.clone_packages.outputs.sha_full }}"
          SHA_SHORT="${{ steps.clone_packages.outputs.sha }}"

          # 从编译产物 feeds.buildinfo 提取各 feed 版本
          FEEDS_INFO=""
          FEEDS_MD_JSON=""
          FW_FEEDS_FILE=$(find openwrt/bin/targets -name "feeds.buildinfo" 2>/dev/null | head -1)
          if [ -f "$FW_FEEDS_FILE" ] && [ -s "$FW_FEEDS_FILE" ]; then
            # 验证文件内容是否有效（至少包含一行 feed 条目）
            if grep -q '^src-git\b' "$FW_FEEDS_FILE" 2>/dev/null; then
              FEEDS_INFO=$(jq -Rs '.' "$FW_FEEDS_FILE")
              FEEDS_MD_JSON=$(awk '{
                n=split($NF,a,"^"); url=a[1]; hash=a[2]
                sub(/\.git$/,"",url)
                printf "| [%s](%s/tree/%s) | `%s` |\n", $2, url, hash, hash
              }' "$FW_FEEDS_FILE" | jq -Rs '.')
            else
              echo "⚠️ feeds.buildinfo 内容不完整（无 src-git 条目），跳过 feed 版本记录"
              FEEDS_INFO='""'
              FEEDS_MD_JSON='""'
            fi
          else
            FEEDS_INFO='""'
            FEEDS_MD_JSON='""'
          fi

          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "config": "${{ matrix.config }}",
            "source_repo": "${{ matrix.repo }}",
            "source_ref": "${{ matrix.ref }}",
            "source_sha": "${SHA_FULL}",
            "source_sha_short": "${SHA_SHORT}",
            "packages_repo": "solarflows/openwrt-packages",
            "packages_branch": "${{ matrix.packages_branch }}",
            "packages_sha": "${{ steps.clone_packages.outputs.packages_sha }}",
            "feeds_info": ${FEEDS_INFO},
            "feeds_md": ${FEEDS_MD_JSON},
            "duration_sec": "${{ steps.total_duration.outputs.duration }}",
            "duration_fmt": "${{ steps.total_duration.outputs.duration_fmt }}",
            "toolchain_hit": "${{ steps.cache-refresh.outputs.toolchain_restored }}",
            "toolchain_exact": "${{ steps.cache-refresh.outputs.toolchain_exact }}",
            "ccache_hit": "${{ steps.cache-refresh.outputs.ccache_restored }}",
            "signing_key_fingerprint": "${{ steps.signing_key.outputs.fingerprint || 'none' }}",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_tag_prefix": "${{ matrix.release_tag_prefix }}",
            "timestamp": "${NOW}"
          }
          JSONEOF
          echo "📋 build-info.json 内容:"
          jq . build-info.json

          # ── Summary Feed 版本 ──
          {
            echo ""
            echo "### 📌 Feed 版本"
            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              echo "$FEEDS_MD_JSON" | jq -r '.'
            else
              echo ""
              echo "（feeds.buildinfo 缺失或为空，未记录）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ── 生成 release-body.md（供 publish job 直接使用，简洁美观） ──
          TC_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored }}" = "true" ] && echo "✅ 工具链缓存命中" || echo "🔨 工具链重新编译")
          CC_LABEL=$([ "${{ steps.cache-refresh.outputs.ccache_restored }}" = "true" ] && echo "✅ ccache 命中" || echo "🔄 ccache 冷启动")
          {
            echo "## ${{ matrix.target }} Build"
            echo ""
            echo "**源码**: [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ \`${SHA_SHORT}\`"
            echo "**软件包**: \`${{ steps.clone_packages.outputs.packages_sha }}\`"
            echo "**编译耗时**: ${{ steps.total_duration.outputs.duration_fmt }}"
            echo "**缓存**: ${TC_LABEL} / ${CC_LABEL}"

            # Feed 版本
            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "### 📌 Feed 版本"
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              echo "$FEEDS_MD_JSON" | jq -r '.'
            fi

            echo ""
            echo "---"
            echo "ℹ️ 完整构建报告请查看 GitHub Actions Summary。"
          } > release-body.md
          echo "📋 release-body.md 已生成"

      - name: 📤 Upload firmware artifact
        if: steps.evaluate.outputs.changed == 'true' && success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-release
          path: openwrt/${{ matrix.target }}-release.tar.gz
          retention-days: 7

      - name: 📤 Upload passwall artifact
        if: steps.evaluate.outputs.changed == 'true' && success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall
          path: openwrt/release/passwall
          retention-days: 7
          if-no-files-found: ignore

      - name: 📤 Upload build info artifact
        if: steps.evaluate.outputs.changed == 'true' && success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-info
          path: |
            build-info.json
            release-body.md
          retention-days: 7

      - name: 💾 Save source marker on success
        if: steps.evaluate.outputs.changed == 'true' && success()
        run: touch .sha_marker

  # ========== 发布任务 ==========
  # 使用 always() 确保即使某个矩阵分片构建失败，仍可发布其他成功的分片。
  # 内部 publish_target() 函数会逐个目标检查产物是否存在，缺失则优雅跳过。
  publish:
    name: Publish Releases
    needs: build
    if: |
      always() &&
      !cancelled() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event.inputs.release != 'false' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'

      - name: 🔄 Retry download via gh CLI (fallback)
        if: steps.download.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🔄 actions/download-artifact@v8 失败，通过 gh CLI 重试..."
          # gh run download --name 每次只下载一个 artifact，用循环重试全部
          ARTIFACTS=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} \
            --json artifacts --jq '.artifacts[].name' 2>/dev/null)
          for artifact in $ARTIFACTS; do
            max_retries=3
            for i in $(seq 1 $max_retries); do
              echo "📥 下载 artifact: $artifact (尝试 #$i)..."
              gh run download ${{ github.run_id }} \
                --repo ${{ github.repository }} \
                --name "$artifact" \
                --dir artifacts 2>&1 && break
              if [ "$i" -lt "$max_retries" ]; then
                echo "⚠️ 重试 #$i 失败，10 秒后..."
                sleep 10
              else
                echo "❌ artifact $artifact 下载失败"
                exit 1
              fi
            done
          done
          echo "✅ 所有 artifact 下载完成"

      - name: Remove failed build logs
        run: rm -rf artifacts/*-build-log 2>/dev/null || true

      - name: Publish all targets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # ============================================================
          # 通用发布函数：固件 Release + Passwall 固定 Release
          # ============================================================
          publish_target() {
            local TARGET="$1"

            local INFO_FILE="artifacts/${TARGET}-build-info/build-info.json"
            if [ ! -f "$INFO_FILE" ]; then
              echo "⏭️  [${TARGET}] 未找到构建产物，跳过发布。"
              return 0
            fi

            # -------- 从 build-info.json 读取所有参数 --------
            local TARGET_NAME CONFIG SOURCE_REPO SOURCE_REF SHORT_SHA
            local PKG_SHA FEEDS_MD DURATION_FMT
            local TOOLCHAIN_HIT TOOLCHAIN_EXACT CCACHE_HIT TIMESTAMP
            local RELEASE_REPO PASSWALL_TAG TAG_PREFIX
            TARGET_NAME=$(jq -r '.target'              "$INFO_FILE")
            CONFIG=$(jq -r '.config'                   "$INFO_FILE")
            SOURCE_REPO=$(jq -r '.source_repo'          "$INFO_FILE")
            SOURCE_REF=$(jq -r '.source_ref'            "$INFO_FILE")
            SHORT_SHA=$(jq -r '.source_sha_short'       "$INFO_FILE")
            PKG_SHA=$(jq -r '.packages_sha'            "$INFO_FILE")
            FEEDS_MD=$(jq -r '.feeds_md'               "$INFO_FILE")
            DURATION_FMT=$(jq -r '.duration_fmt'        "$INFO_FILE")
            TOOLCHAIN_HIT=$(jq -r '.toolchain_hit'      "$INFO_FILE")
            TOOLCHAIN_EXACT=$(jq -r '.toolchain_exact'   "$INFO_FILE")
            CCACHE_HIT=$(jq -r '.ccache_hit'             "$INFO_FILE")
            TIMESTAMP=$(jq -r '.timestamp'             "$INFO_FILE")
            RELEASE_REPO=$(jq -r '.release_repo'        "$INFO_FILE")
            PASSWALL_TAG=$(jq -r '.passwall_tag'        "$INFO_FILE")
            TAG_PREFIX=$(jq -r '.release_tag_prefix'    "$INFO_FILE")

            # -------- 格式化图标 --------
            if [ "$TOOLCHAIN_HIT" = "true" ]; then
              if [ "$TOOLCHAIN_EXACT" = "true" ]; then
                TC_HIT_LABEL="✅ 精确命中"
              else
                TC_HIT_LABEL="♻️ 模糊恢复"
              fi
            else
              TC_HIT_LABEL="🔨 重编"
            fi
            CC_HIT_LABEL=$([ "$CCACHE_HIT" = "true" ] && echo "✅ 命中" || echo "🔄 冷启")

            # -------- 生成版本 Tag（使用构建开始时间） --------
            local DATE_TAG TAG TITLE
            # TIMESTAMP 格式: "2026-05-28 12:30:00" → "v20260528-1230"
            DATE_TAG="v$(echo "$TIMESTAMP" | awk '{gsub(/[:-]/," "); split($0,a," "); printf "%s%s%s-%s%s", a[1],a[2],a[3],a[4],a[5]}')"
            TAG="${TAG_PREFIX}${DATE_TAG}"
            TITLE="${TAG_PREFIX}Build ${DATE_TAG}"
            echo "🏷️  [${TARGET}] 版本: $TAG → $RELEASE_REPO"

            # -------- 解包固件 --------
            local RELEASE_TAR="artifacts/${TARGET}-release/${TARGET}-release.tar.gz"
            if [ -f "$RELEASE_TAR" ]; then
              tar xzf "$RELEASE_TAR" -C "artifacts/${TARGET}-release/"
            fi

            # -------- 发布固件 --------
            local FW_DIR="artifacts/${TARGET}-release/firmware"
            local FW_COUNT
            FW_COUNT=$(find "$FW_DIR" -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -d "$FW_DIR" ] && [ -n "$FW_COUNT" ]; then
              # 直接从构建产物读取 release-body.md
              local RELEASE_BODY="artifacts/${TARGET}-build-info/release-body.md"
              if [ -f "$RELEASE_BODY" ]; then
                cp "$RELEASE_BODY" /tmp/release_body.md
              else
                # 降级：文件不存在则生成最小 body
                echo "## ${TARGET_NAME} ${TITLE}" > /tmp/release_body.md
              fi

              if gh release view "$TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                echo "📤 [${TARGET}] Release $TAG 已存在，清理旧 assets..."
                # 删除所有旧固件文件，确保只有本次构建的产物
                gh release view "$TAG" --repo "$RELEASE_REPO" --json assets --jq '.assets[].name' 2>/dev/null | \
                  while IFS= read -r asset; do
                    [ -n "$asset" ] && gh release delete-asset "$TAG" --repo "$RELEASE_REPO" "$asset" --yes 2>/dev/null || true
                  done
                echo "📤 [${TARGET}] 上传新固件..."
                gh release upload "$TAG" --repo "$RELEASE_REPO" "$FW_DIR"/*
              else
                echo "🚀 [${TARGET}] 创建 Release $TAG ..."
                gh release create "$TAG" --repo "$RELEASE_REPO" \
                  --title "${TARGET_NAME} ${TITLE}" \
                  --notes-file /tmp/release_body.md \
                  "$FW_DIR"/*
              fi
            else
              echo "⚠️  [${TARGET}] 没有找到固件文件，跳过固件发布。"
            fi

            # -------- 发布 Passwall（固定 Release） --------
            local PW_DIR="artifacts/${TARGET}-passwall"
            if [ -d "$PW_DIR" ]; then
              local PW_FILES
              PW_FILES=$(find "$PW_DIR" -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' \) -type f 2>/dev/null || true)
              if [ -n "$PW_FILES" ]; then
                if gh release view "$PASSWALL_TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                  echo "📤 [${TARGET}] Passwall Release 已存在，清理旧 assets..."
                  # 删除所有旧包文件，确保只有最新版本
                  gh release view "$PASSWALL_TAG" --repo "$RELEASE_REPO" --json assets --jq '.assets[].name' 2>/dev/null | \
                    while IFS= read -r asset; do
                      [ -n "$asset" ] && gh release delete-asset "$PASSWALL_TAG" --repo "$RELEASE_REPO" "$asset" --yes 2>/dev/null || true
                    done
                  echo "📤 [${TARGET}] 上传新 Passwall 包..."
                  echo "$PW_FILES" | xargs gh release upload "$PASSWALL_TAG" --repo "$RELEASE_REPO"
                  # 确保 Passwall 不抢占 latest release
                  gh release edit "$PASSWALL_TAG" --repo "$RELEASE_REPO" --latest=false
                else
                  echo "🚀 [${TARGET}] 创建 Passwall Release ..."
                  gh release create "$PASSWALL_TAG" --repo "$RELEASE_REPO" \
                    --title "Passwall Packages (${TARGET})" \
                    --notes "最新 passwall 及依赖，更新于 $(date +'%Y-%m-%d %H:%M')" \
                    --latest=false \
                    $(echo "$PW_FILES")
                fi
              else
                echo "⚠️  [${TARGET}] 没有找到 passwall 文件，跳过。"
              fi
            fi

            echo "✅ [${TARGET}] 发布流程完成。"
          }

          # ============================================================
          # 按目标依次发布（参数全从 build-info.json 读取）
          # ============================================================
          for target_dir in artifacts/*-build-info; do
            TARGET_NAME=$(basename "$target_dir" | sed 's/-build-info//')
            publish_target "$TARGET_NAME"
          done

          echo "🎉 全部发布流程完成！"
