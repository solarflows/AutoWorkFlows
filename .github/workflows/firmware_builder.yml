name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      # ── 选择类 ──
      target:
        description: '选择构建目标'
        required: true
        default: 'both'
        type: choice
        options:
          - 'mt798x'
          - 'qualcommax'
          - 'both'
      trigger:
        description: '触发模式'
        required: false
        default: 'smart'
        type: choice
        options:
          - 'smart'      # 智能检测变更（定时任务同款逻辑）
          - 'firmware'   # 强制编译固件
          - 'packages'   # 强制编译软件包 (SDK / 自控 Docker)
          - 'passwall'   # 强制仅编译 passwall (gh-action-sdk)
      cache_strategy:
        description: '缓存策略 (仅 firmware 模式生效)'
        required: false
        default: 'smart'
        type: choice
        options:
          - 'smart'            # 智能缓存（默认）
          - 'clean-toolchain'  # 清除工具链缓存
          - 'clean-ccache'     # 清除编译缓存
          - 'clean-all'        # 清除所有缓存
      # ── 开关类 ──
      skip_upstream:
        description: '跳过上游同步 (节省时间)'
        required: false
        default: false
        type: boolean
      use_ccache:
        description: '启用 ccache (仅 firmware 模式生效)'
        required: false
        default: true
        type: boolean
      free_disk_space:
        description: '清理磁盘空间 (仅 firmware/packages 模式生效，Runner 默认约89G可用，通常无需开启)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '6 0 * * 1,6'  # 每周一和周六的 00:06 UTC（上海时间为 08:06）

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: false   # 不允许取消进行中的构建（避免编译一半被后续提交打断）。
                               # 如需手动取消，通过 GitHub Actions 面板操作。

permissions:
  actions: write   # 允许 gh workflow run / gh cache delete 操作
  contents: write  # 允许创建 Release 和上传资产

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 Actions runner 使用 Node24，
                                              # 解决某些 action 在 Node20 上的兼容性问题

jobs:
  # ========== 构建矩阵（从 targets.json 读取） ==========
  plan:
    name: Plan build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      full_matrix: ${{ steps.build-matrix.outputs.full_matrix }}
      passwall_matrix: ${{ steps.build-matrix.outputs.passwall_matrix }}
      pkgs_matrix: ${{ steps.build-matrix.outputs.pkgs_matrix }}
      version: ${{ steps.version.outputs.version }}
      sdk_version: ${{ steps.version.outputs.sdk_version }}
      source_changed: ${{ steps.build-matrix.outputs.source_changed }}
      packages_changed: ${{ steps.build-matrix.outputs.packages_changed }}
      should_build_firmware: ${{ steps.build-matrix.outputs.should_build_firmware }}
      should_build_passwall: ${{ steps.build-matrix.outputs.should_build_passwall }}
      should_build_pkgs: ${{ steps.build-matrix.outputs.should_build_pkgs }}
      should_publish: ${{ steps.build-matrix.outputs.should_publish }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          sparse-checkout: openwrt-configs/immortalwrt/targets.json
          path: AutoWorkFlows

      # -------- 触发上游同步工作流 --------
      - name: Trigger OpenWRT_Packages_Updater
        if: github.event.inputs.skip_upstream != 'true'
        id: trigger-updater
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 OpenWRT_Packages_Updater..."
          gh workflow run OpenWRT_Packages_Updater.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          # gh workflow run 不返回 run ID，通过 gh run list --limit 1 获取最新 run。
          # sleep 5 等待 GitHub 后台创建 run 记录。
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow OpenWRT_Packages_Updater.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "updater_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      - name: Trigger Sync_Push
        if: github.event.inputs.skip_upstream != 'true' && github.event.inputs.trigger != 'packages'
        id: trigger-sync
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 Sync_Push..."
          gh workflow run Sync_Push.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          # 同上：gh workflow run 不返回 run ID
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow Sync_Push.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "sync_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      # -------- 等待上游同步（串行，可跳过） --------
      - name: ⏳ Wait for upstream workflows
        if: github.event.inputs.skip_upstream != 'true'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          UPDATER_ID="${{ steps.trigger-updater.outputs.updater_id }}"
          SYNC_ID="${{ steps.trigger-sync.outputs.sync_id }}"
          if [ -n "$UPDATER_ID" ]; then
            echo "⏳ 等待 OpenWRT_Packages_Updater..."
            gh run watch "$UPDATER_ID" \
              --repo ${{ github.repository }} --exit-status \
              && echo "✅ 完成" || echo "⚠️ 失败，继续"
          fi
          if [ -n "$SYNC_ID" ]; then
            echo "⏳ 等待 Sync_Push..."
            gh run watch "$SYNC_ID" \
              --repo ${{ github.repository }} --exit-status \
              && echo "✅ 完成" || echo "⚠️ 失败，继续"
          fi
        continue-on-error: true

      # -------- 生成版本号 --------
      # 版本号格式: V + YYMMDD (如 2026-07-16 14:30:00 → V260716)
      # SDK 版本: V + YYMMDDhhmm (精确到分钟，避免 SDK 和固件版本冲突)
      - name: 🏷️ Set build version
        id: version
        run: |
          NOW=$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')
          VERSION="V$(echo "$NOW" | awk '{gsub(/[:-]/," "); split($0,a," "); printf "%s%s%s", substr(a[1],3), a[2], a[3]}')"
          SDK_VERSION="V$(echo "$NOW" | awk '{gsub(/[:-]/," "); split($0,a," "); printf "%s%s%s%s%s", substr(a[1],3), a[2], a[3], a[4], a[5]}')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sdk_version=${SDK_VERSION}" >> $GITHUB_OUTPUT
          echo "🏷️ 固件版本: ${VERSION} | SDK 版本: ${SDK_VERSION}"

      # -------- 恢复缓存中的构建状态 --------
      - name: 💾 Restore build state
        id: cache-build-state
        uses: actions/cache/restore@v5
        with:
          key: immwrt-state-${{ github.run_id }}
          restore-keys: immwrt-state-
          path: build-state.json

      # -------- 加载目标 + SHA 状态检查（GitHub Actions Cache）-------
      - name: Load targets & check changes
        id: load-targets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          TARGET_FILTER="${{ github.event.inputs.target || 'both' }}"
          JSON_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/targets.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ 配置文件不存在: $JSON_FILE"
            exit 1
          fi
          echo "📋 加载构建目标: $JSON_FILE ($(jq '.targets | length' "$JSON_FILE") 个目标)"
          echo "🎯 过滤条件: $TARGET_FILTER"

          FILTERED=$(jq -c --arg t "$TARGET_FILTER" '
            if $t == "both" then .targets
            else [.targets[] | select(.target == $t)] end
          ' "$JSON_FILE")
          echo "$FILTERED" > /tmp/filtered_targets.json

          # ── 加载缓存状态 ──
          if [ -f build-state.json ]; then
            echo "📦 缓存状态已加载 ($(jq 'keys | length' build-state.json) 个 target)"
          else
            echo "📦 无缓存状态（首次构建？）"
            echo '{}' > build-state.json
          fi

          # ── SHA 状态检查（带熔断）──
          SRC_CHANGED=false
          PKG_CHANGED=false
          for TARGET in $(echo "$FILTERED" | jq -r '.[].target'); do
            # 熔断：所有标志都已变更，无需继续
            [ "$SRC_CHANGED" = "true" ] && [ "$PKG_CHANGED" = "true" ] && break

            CURR_REPO=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | (.release_repo // .repo)')
            CURR_REF=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | .ref')
            CURR_PKG_BRANCH=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | (.packages_branch // .target)')

            # 获取远端当前源码 SHA
            CURR_SRC=$(git ls-remote "https://github.com/${CURR_REPO}" "${CURR_REF}" 2>/dev/null | cut -f1 | head -1)

            # ── 源码变更检测：对比缓存中的上次构建 SHA ──
            LAST_SRC=$(jq -r ".[\"${TARGET}\"].source_sha // empty" build-state.json)

            if [ -n "$LAST_SRC" ] && [ "$LAST_SRC" = "$CURR_SRC" ]; then
              echo "  ✅ [${TARGET}] 源码未变更 (${CURR_SRC:0:7})"
            else
              echo "  🔵 [${TARGET}] 源码有变更: ${LAST_SRC:-无记录} → ${CURR_SRC:0:7}"
              SRC_CHANGED=true
            fi

            # ── 软件包变更检测 ──
            CURR_PKG=$(git ls-remote https://github.com/solarflows/openwrt-packages.git "${CURR_PKG_BRANCH}" 2>/dev/null | cut -f1 | head -1)
            LAST_PKG=$(jq -r ".[\"${TARGET}\"].packages_sha // empty" build-state.json)

            if [ -n "$LAST_PKG" ]; then
              if [ "$LAST_PKG" != "$CURR_PKG" ]; then
                echo "  🟡 [${TARGET}] 软件包有变更: ${LAST_PKG:0:7} → ${CURR_PKG:0:7}"
                PKG_CHANGED=true
              else
                echo "  ✅ [${TARGET}] 软件包未变更 (${CURR_PKG:0:7})"
              fi
            else
              echo "  ⚠️ [${TARGET}] 未找到软件包状态（首次构建？）"
              PKG_CHANGED=true
            fi
          done

          echo "source_changed=${SRC_CHANGED}" >> $GITHUB_OUTPUT
          echo "packages_changed=${PKG_CHANGED}" >> $GITHUB_OUTPUT
          echo "🔍 source_changed=${SRC_CHANGED}, packages_changed=${PKG_CHANGED}"

      # -------- 拆分矩阵 + 生成控制信号 --------
      - name: Build matrix & control signals
        id: build-matrix
        run: |
          FILTERED=$(cat /tmp/filtered_targets.json)
          SRC_CHANGED="${{ steps.load-targets.outputs.source_changed }}"
          PKG_CHANGED="${{ steps.load-targets.outputs.packages_changed }}"

          # ── 拆分矩阵：全量编译、passwall、其他软件包 ──
          FULL_MATRIX=$(echo "$FILTERED" | jq -c 'map(. + {
            packages_branch:   (.packages_branch   // .target),
            release_repo:     (.release_repo     // .repo),
            passwall_repo:    (.passwall_repo    // "solarflows/openwrt-packages"),
            passwall_tag:     (.passwall_tag     // "packages"),
            apk_signing:      (.apk_signing      // false),
            sdk_container:    (.sdk_container    // null),
            sdk_packages:     (.sdk_packages     // "*")
          })')
          # passwall 矩阵：有 SDK 容器的目标
          PASSWALL_MATRIX=$(echo "$FILTERED" | jq -c '[.[] | select(.sdk_container != null) | . + {
            packages_branch: (.packages_branch // .target),
            release_repo:    (.release_repo    // .repo),
            passwall_repo:   (.passwall_repo   // "solarflows/openwrt-packages"),
            passwall_tag:    (.passwall_tag    // "packages"),
            apk_signing:     (.apk_signing     // false),
            sdk_packages:    (.sdk_packages    // "*")
          }]')
          # 其他 SDK 包矩阵
          PKGS_MATRIX=$(echo "$PASSWALL_MATRIX" | jq -c '.')

          echo "full_matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
          echo "passwall_matrix=$PASSWALL_MATRIX" >> $GITHUB_OUTPUT
          echo "pkgs_matrix=$PKGS_MATRIX" >> $GITHUB_OUTPUT
          echo "source_changed=${SRC_CHANGED}" >> $GITHUB_OUTPUT
          echo "packages_changed=${PKG_CHANGED}" >> $GITHUB_OUTPUT

          # ── Job 控制信号 ──
          TRIGGER="${{ github.event.inputs.trigger || 'smart' }}"
          IS_SCHEDULE="${{ github.event_name }}"

          if [ "$TRIGGER" = "packages" ]; then
            # 强制编译软件包：compile-packages 统一处理所有包（含 passwall）
            echo "should_build_firmware=false" >> $GITHUB_OUTPUT
            echo "should_build_passwall=false" >> $GITHUB_OUTPUT
            if [ "$(echo "$PKGS_MATRIX" | jq 'length')" -gt 0 ]; then
              echo "should_build_pkgs=true" >> $GITHUB_OUTPUT
            else
              echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
            fi
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [ "$TRIGGER" = "passwall" ]; then
            # 强制仅编译 passwall：用 compile-passwall (gh-action-sdk)，仅 2 个包，最快
            echo "should_build_firmware=false" >> $GITHUB_OUTPUT
            if [ "$(echo "$PASSWALL_MATRIX" | jq 'length')" -gt 0 ]; then
              echo "should_build_passwall=true" >> $GITHUB_OUTPUT
            else
              echo "should_build_passwall=false" >> $GITHUB_OUTPUT
            fi
            echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [ "$TRIGGER" = "firmware" ]; then
            # 强制编译固件
            echo "should_build_firmware=true" >> $GITHUB_OUTPUT
            echo "should_build_passwall=false" >> $GITHUB_OUTPUT
            echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            # smart：智能检测变更
            if [ "$SRC_CHANGED" = "false" ] && [ "$PKG_CHANGED" = "false" ]; then
              echo "should_build_firmware=false" >> $GITHUB_OUTPUT
              echo "should_build_passwall=false" >> $GITHUB_OUTPUT
              echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
              if [ "$IS_SCHEDULE" = "schedule" ]; then
                echo "should_publish=false" >> $GITHUB_OUTPUT
              else
                echo "should_publish=true" >> $GITHUB_OUTPUT
              fi
            elif [ "$SRC_CHANGED" = "true" ]; then
              echo "should_build_firmware=true" >> $GITHUB_OUTPUT
              echo "should_build_passwall=false" >> $GITHUB_OUTPUT
              echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
              echo "should_publish=true" >> $GITHUB_OUTPUT
            else
              # 仅软件包变更 → 统一用 compile-packages（自控 Docker）编译 sdk.config 所有包。
              # compile-passwall 仅在 trigger=passwall 手动触发时运行。
              echo "should_build_firmware=false" >> $GITHUB_OUTPUT
              echo "should_build_passwall=false" >> $GITHUB_OUTPUT
              if [ "$(echo "$PKGS_MATRIX" | jq 'length')" -gt 0 ]; then
                echo "should_build_pkgs=true" >> $GITHUB_OUTPUT
              else
                echo "should_build_pkgs=false" >> $GITHUB_OUTPUT
              fi
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi
          fi

      # -------- 创建 Draft Release --------
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          FILTERED=$(cat /tmp/filtered_targets.json)
          VERSION="${{ steps.version.outputs.version }}"
          TRIGGER="${{ github.event.inputs.trigger || 'smart' }}"
          SRC_CHANGED="${{ steps.load-targets.outputs.source_changed }}"
          PKG_CHANGED="${{ steps.load-targets.outputs.packages_changed }}"

          if [ "$TRIGGER" = "firmware" ] || { [ "$TRIGGER" != "packages" ] && [ "$SRC_CHANGED" = "true" ]; }; then
            for TARGET in $(echo "$FILTERED" | jq -r '.[].target'); do
              REPO=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | (.release_repo // .repo)')
              REF=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | .ref')
              # 将分支名/ref 解析为 commit SHA，确保 targetCommitish 是 SHA 而非分支名
              RESOLVED_SHA=$(git ls-remote "https://github.com/${REPO}" "${REF}" 2>/dev/null | cut -f1 | head -1)
              [ -z "$RESOLVED_SHA" ] && RESOLVED_SHA="$REF"  # 降级：ls-remote 失败时用原始 ref
              if ! gh release view "${VERSION}" --repo "$REPO" &>/dev/null; then
                if gh release create "${VERSION}" --repo "$REPO" \
                  --target "${RESOLVED_SHA}" \
                  --title "${TARGET} Build ${VERSION}" --draft \
                  --notes "🔨 构建中..." 2>/dev/null; then
                  echo "📝 创建 Draft Release: ${REPO}@${VERSION} → ${RESOLVED_SHA:0:7}"
                else
                  echo "⚠️ Release ${VERSION} 已存在（并发创建），跳过"
                fi
              fi
            done
          fi

  # ========== 固件构建任务（矩阵并行） ==========
  compile-firmware:
    name: Compile firmware ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.should_build_firmware == 'true'
    concurrency:
      group: build-fw-${{ matrix.target }}-${{ needs.plan.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.full_matrix) }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          path: openwrt
          fetch-depth: 1

      - name: 📦 Get source & clone packages
        id: clone_packages
        run: |
          cd openwrt

          # 获取源码 SHA
          SHA=$(git rev-parse --short HEAD)
          SHA_FULL=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_full=${SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 源码 @ ${SHA}"

          # 克隆自定义软件包
          echo "📦 克隆 openwrt-packages (${{ matrix.packages_branch }}) ..."
          git clone --depth 1 https://github.com/solarflows/openwrt-packages.git package/solarflows -b ${{ matrix.packages_branch }}
          PKG_SHA=$(git -C package/solarflows rev-parse --short HEAD)
          PKG_SHA_FULL=$(git -C package/solarflows rev-parse HEAD)
          echo "packages_sha=${PKG_SHA}" >> $GITHUB_OUTPUT
          echo "packages_sha_full=${PKG_SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 openwrt-packages @ ${PKG_SHA}"

          # ── Summary ──
          echo "| 📦 **源码** | [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ \`${SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 **软件包** | [${{ matrix.packages_branch }}](https://github.com/solarflows/openwrt-packages/tree/${{ matrix.packages_branch }}) @ \`${PKG_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ───────── 磁盘空间监控（第 1 阶段：初始状态）─────────
      - name: 💽 Disk space · Initial
        id: disk-1
        run: |
          echo "📊 初始磁盘空间（克隆后，环境准备前）"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "📊 openwrt/ : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"

      # ───────── 计算工具链指纹（仅基于 tools/ 和 toolchain/ 目录的变更）─────────
      - name: 🔧 Compute toolchain hash
        id: toolchain_hash
        run: |
          HASH=$(git -C openwrt log --pretty=tformat:"%h" -n1 tools toolchain 2>/dev/null || echo "unknown")
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"
          # clean-all / clean-toolchain 时注入 force- 前缀，使 cache key 永不精确命中
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ]; then
            HASH="force-${HASH}"
            echo "🔧 缓存策略: ${CACHE_STRATEGY} · 工具链缓存 key 已注入 force- 前缀"
          fi
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "🔧 工具链指纹: $HASH"

      - name: 📋 Record build start time And Hardware Information
        id: start_time
        run: |
          # ── Summary ──
          TRIGGER="${{ github.event.inputs.trigger || 'smart' }}"
          SRC_CHANGED="${{ needs.plan.outputs.source_changed }}"
          if [ "$TRIGGER" = "firmware" ]; then
            BUILD_STATUS="🔵 强制模式 → 完整固件构建"
          elif [ "$TRIGGER" = "packages" ]; then
            BUILD_STATUS="🟢 强制模式 → 仅编译软件包"
          elif [ "$SRC_CHANGED" = "true" ]; then
            BUILD_STATUS="🔵 源码有变更 → 完整固件构建"
          else
            BUILD_STATUS="🟡 仅软件包变更 → 固件重编"
          fi
          {
            echo "---"
            echo "## 📋 ${{ matrix.target }} — Build Summary"
            echo ""
            echo "| 项目 | 详情 |"
            echo "|------|------|"
            echo "| 🎯 **目标** | ${{ matrix.target }} |"
            echo "| 🏷️ **版本号** | ${{ needs.plan.outputs.version }} |"
            echo "| 🔄 **触发方式** | ${{ github.event_name }} |"
            echo "| 📌 **变更检测** | ${BUILD_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"
          # 运行环境仅输出到终端日志，不写 Summary
          echo "🖥️ CPU: $(nproc) 核 | $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
          echo "💾 内存: $(free -h | awk '/^Mem:/ {print $2}') | 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"

          START_FMT=$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')
          echo "timestamp=${START_FMT}" >> $GITHUB_OUTPUT
          echo "🕐 构建开始时间: ${START_FMT}"

      # 编译仅需约 30G，Runner 默认约 89G 可用，通常无需开启。
      # 启用后额外耗时约 2-3 分钟。
      - name: 🧹 Free Disk Space
        if: github.event.inputs.free_disk_space == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false  # 保留 Actions 缓存工具链（如 node/go 等 action 依赖）
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 🛠️ 1. Prepare Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 1. Prepare Environment           ║"
          echo "╚══════════════════════════════════════╝"
          echo "🧹 清理无用软件包..."
          sudo -E apt -y purge firefox 2>/dev/null || true
          echo "📦 更新系统..."
          sudo -E apt update
          sudo -E apt -yqq full-upgrade
          echo "🧹 清理 apt 缓存..."
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          echo "📦 安装编译依赖..."
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"
          echo "✅ 环境准备完成"

      # ───────── 磁盘空间监控（第 2 阶段：环境准备后）─────────
      - name: 💽 Disk space · After env prep
        id: disk-2
        run: |
          echo "📊 环境准备后磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"

      # ───────── 构建缓存（工具链 + ccache）─────────
      # 工具链缓存 key 基于 tools/ & toolchain/ 目录的 git hash，
      # 仅这两个目录变更时才重新编译工具链，大幅节省时间（~30 分钟）。
      - name: 🔧 Restore toolchain cache
        id: cache-tc
        uses: actions/cache@v5
        with:
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*

      - name: 🗄️ Restore ccache
        if: github.event.inputs.use_ccache != 'false'
        id: cache-cc
        uses: actions/cache@v5
        with:
          # 刻意使用 run_id 而非内容哈希，保证 cache-hit 永远为 false。
          # 原因：ccache 的失效因素不可穷举（任何 package Makefile/CFLAGS/依赖版本变化
          # 都可能导致编译输出不同），无法用单一内容哈希精确建模。
          # run_id 确保每轮成功构建后必定保存最新缓存，restore-keys 模糊匹配回退
          # 到最近一次快照；旧条目由后续清理步骤（见 Purge stale remote caches）删除。
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-
          path: openwrt/.ccache

      - name: 🔄 Verify & report cache status
        id: cache-refresh
        run: |
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"

          # ====== 缓存清理 ======
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ]; then
            echo "🧹 缓存策略: ${CACHE_STRATEGY} · 清除工具链缓存..."
            if [ -d openwrt/staging_dir ]; then
              rm -rf openwrt/staging_dir/host* openwrt/staging_dir/tool*
              echo "  ✂️ staging_dir/host* 和 tool* 已删除"
            fi
          fi
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-ccache" ]; then
            echo "🧹 缓存策略: ${CACHE_STRATEGY} · 清除编译缓存..."
            if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
              ccache -C 2>/dev/null || true
              rm -rf openwrt/.ccache
              echo "  ✂️ .ccache 已清空"
            fi
          fi

          # ====== 工具链：检测 staging_dir ======
          TOOLCHAIN_RESTORED="false"
          if [ "$CACHE_STRATEGY" != "clean-all" ] && [ "$CACHE_STRATEGY" != "clean-toolchain" ] && [ -d "openwrt/staging_dir" ] && [ "$(find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | head -1)" ]; then
            find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | while read -r d; do
              find "$d" -type f -exec touch {} +
            done
            # 修正 host ccache 软链接：OpenWrt 默认将 gcc/g++ 链接到系统编译器，
            # 但同目录下有 ccache 二进制可用，重链接后 host 包(node/rust等)编译可走 ccache
            if [ -x "openwrt/staging_dir/host/bin/ccache" ]; then
              for cmd in gcc g++ cc c++; do
                ln -sf ccache "openwrt/staging_dir/host/bin/$cmd" 2>/dev/null || true
              done
              echo "⚡ host ccache 软链接已修正"
            fi
            mkdir -p openwrt/tmp && echo "1" > openwrt/tmp/.build
            TOOLCHAIN_RESTORED="true"
            echo "🔧 工具链缓存已恢复 · stamp 已刷新"
          else
            echo "ℹ️ 工具链缓存未命中 · 将全量编译"
          fi
          echo "toolchain_restored=${TOOLCHAIN_RESTORED}" >> $GITHUB_OUTPUT

          # ====== ccache：检测 .ccache 目录 ======
          CCACHE_RESTORED="false"
          if [ "$CACHE_STRATEGY" != "clean-all" ] && [ "$CACHE_STRATEGY" != "clean-ccache" ] && [ -d "openwrt/.ccache" ] && [ "$(find openwrt/.ccache -type f 2>/dev/null | head -1)" ]; then
            CCACHE_RESTORED="true"
            echo "⚡ ccache 已恢复（来自上次构建）"
          fi
          echo "ccache_restored=${CCACHE_RESTORED}" >> $GITHUB_OUTPUT

          # ====== 缓存命中汇总 ======
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║  📊 缓存命中状态                     ║"
          echo "╚══════════════════════════════════════╝"

          # 工具链：区分 exact key 命中 vs restore-key 模糊恢复
          TC_EXACT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$TOOLCHAIN_RESTORED" = "true" ]; then
            if [ "$TC_EXACT" = "true" ]; then
              echo "  🔧 工具链 (staging_dir): ✅ 精确命中 (exact key)"
            else
              echo "  🔧 工具链 (staging_dir): ♻️ 模糊恢复 (restore-key)"
            fi
          else
            echo "  🔧 工具链 (staging_dir): 🔨 重新编译"
          fi

          # ccache：仅展示命中/未命中
          CC_ICON=$([ "$CCACHE_RESTORED" = "true" ] && echo "✅ 命中" || echo "🔄 冷启动")
          echo "  ⚡ ccache (.ccache):      ${CC_ICON}"

          # 输出工具链精确命中标记供 release note 使用
          # 注意：此步骤是诊断/报告性质的，设置 continue-on-error 避免瞬态 IO 错误
          # （如 find/du 在并发环境下读到临时文件被删除）杀死整个 7 小时固件构建。
          # 下游引用本 step 的 outputs 时（build-info.json）应容忍空值。
          echo "toolchain_exact=${TC_EXACT}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ───────── 构建 ─────────
      - name: 🔑 Setup APK Signing Key
        if: fromJson(matrix.apk_signing)
        id: signing_key
        env:
          APK_BUILD_KEY: ${{ secrets.APK_BUILD_KEY }}
        run: |
          set -euo pipefail
          # ── APK 签名密钥注入 ──
          # ImmortalWrt APK 构建系统（rules.mk）的密钥路径：
          #   BUILD_KEY_APK_SEC = $(TOPDIR)/private-key.pem   (私钥)
          #   BUILD_KEY_APK_PUB = $(TOPDIR)/public-key.pem    (公钥)
          # 构建系统自动生成的密钥是 ECDSA prime256v1 (P-256) 曲线。
          # 密钥来源：GitHub Secrets 中的 APK_BUILD_KEY（私钥 PEM）
          #
          # ⚠️ 只需要设私钥。公钥由本步骤自动派生，无需单独设 secret。

          if [ -z "$APK_BUILD_KEY" ]; then
            echo "::warning::APK_BUILD_KEY secret 未设置 — 构建系统将生成随机密钥，设备 apk add 需 --allow-untrusted"
            echo "fingerprint=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 1. 写入私钥（用 printf 避免 echo 可能暴露 secret）
          #    先 strip 首尾空白（GitHub 网页设置 secret 时常附带多余换行）
          printf '%s' "$APK_BUILD_KEY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' > openwrt/private-key.pem
          chmod 600 openwrt/private-key.pem

          # 诊断：输出文件大小（不暴露密钥内容）
          echo "📏 密钥文件: $(wc -c < openwrt/private-key.pem) 字节"

          # 确保 UNIX 换行（防止 Windows CRLF 导致 openssl 解析失败）
          sed -i 's/\r$//' openwrt/private-key.pem

          # 2. 验证密钥格式：ImmortalWrt 构建系统使用 ECDSA prime256v1 (P-256)
          echo "🔍 验证密钥格式..."
          if openssl ec -in openwrt/private-key.pem -check -noout 2>/dev/null; then
            echo "✅ ECDSA 私钥格式验证通过"
          elif openssl rsa -in openwrt/private-key.pem -check -noout 2>/dev/null; then
            echo "::warning::APK_BUILD_KEY 是 RSA 密钥，但 ImmortalWrt APK 构建系统默认使用 ECDSA prime256v1"
            echo "::warning::APK 本身支持 RSA，但若构建系统依赖 ecparam 自动派生公钥则会失败"
            echo "::notice::建议重新生成 ECDSA 密钥：openssl ecparam -name prime256v1 -genkey -noout -out private-key.pem"
          else
            KEY_HEADER=$(head -c 50 openwrt/private-key.pem)
            echo "::error::APK_BUILD_KEY 不是有效的 PEM 格式私钥（需要 ECDSA prime256v1 或 RSA）"
            echo "::notice::密钥头部: ${KEY_HEADER}"
            echo "::notice::生成 ECDSA 密钥：openssl ecparam -name prime256v1 -genkey -noout -out private-key.pem"
            exit 1
          fi

          # 3. 派生公钥（构建系统通过 package/base-files 安装到 /etc/apk/keys/）
          openssl ec -in openwrt/private-key.pem -pubout -out openwrt/public-key.pem 2>/dev/null || \
            openssl rsa -in openwrt/private-key.pem -pubout -out openwrt/public-key.pem
          chmod 644 openwrt/public-key.pem
          echo "✅ 公钥已派生 → openwrt/public-key.pem"

          # 4. 记录指纹
          FP=$(openssl sha256 < openwrt/public-key.pem | awk '{print $NF}')
          echo "fingerprint=${FP}" >> $GITHUB_OUTPUT
          echo "🔑 APK 签名密钥已注入 (公钥 SHA256: ${FP:0:16}...)"
          echo "📋 构建系统会将此公钥安装到目标设备的 /etc/apk/keys/"

      - name: 📥 2. Update Feeds & Packages
        id: feeds
        run: |
          set -euo pipefail
          echo "📥 更新 feeds ..."
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "✅ feeds 准备完成"

      - name: ⚙️ 3. Apply Configuration
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  ⚙️ 3. Apply Configuration            ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          SEED_DIR="../AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          echo "📄 合并种子配置: $SEED_DIR"
          find "$SEED_DIR" -type f -name '*.seed' | sort | while read -r f; do
            echo "  + $(basename "$f")" >&2
            if [ ! -s "$f" ]; then
              echo "    ⚠️ 跳过空文件" >&2
              continue
            fi
            cat "$f"
            [ -z "$(tail -c1 "$f")" ] || echo
            true
          done > .config
          sed -i 's/\r$//; s/\xef\xbb\xbf//g' .config
          # ── 注入构建版本号（出现在固件文件名和系统信息中） ──
          VERSION="${{ needs.plan.outputs.version }}"
          echo "✅ 已生成 .config ($(wc -l < .config) 行)"
          echo "📋 ======== 种子配置 (.config) ========"
          cat .config
          echo "🔧 运行 make defconfig (超时 5 分钟)..."
          timeout 300 make defconfig || {
            echo "❌ make defconfig 超时或失败，请检查 .config 语法"
            exit 1
          }
          echo "📋 ======== defconfig 后 .config ========"
          cat .config

          # ── 1. patch version.mk：将 SNAPSHOT 替换为版本号 ──
          # 两个仓库默认值：mt798x=21.02-SNAPSHOT, qualcommax=SNAPSHOT
          # 只改 VERSION_NUMBER 行，避免误伤 URL 等其他位置的 SNAPSHOT
          sed -i "/^VERSION_NUMBER:=/s/SNAPSHOT/${VERSION}/g" include/version.mk
          echo "📋 version.mk:"
          grep 'VERSION_NUMBER' include/version.mk || true

          # ── 2. patch image.mk：移除 CONFIG_VERSION_FILENAMES guard ──
          # IMG_PREFIX_VERNUM 默认只在 CONFIG_VERSION_FILENAMES=y 时才非空，
          # 种子配置未设此项导致版本号永不进入文件名。直接 hack 掉 guard。
          sed -i 's/^IMG_PREFIX_VERNUM:=.*/IMG_PREFIX_VERNUM:=$(call sanitize,$(VERSION_NUMBER))-/' include/image.mk
          echo "📋 image.mk IMG_PREFIX_VERNUM:"
          grep 'IMG_PREFIX_VERNUM' include/image.mk || true

      - name: 📥 4. Download Source Packages
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  📥 4. Download Source Packages      ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          echo "📥 下载源码包 (并行 $(nproc) 线程, 超时 30 分钟)..."
          timeout 1800 make download -j$(nproc) || {
            echo "⚠️ make download 超时或失败，重试单线程..."
            timeout 3600 make download -j1 || {
              echo "❌ make download 彻底失败"
              exit 1
            }
          }
          echo "📦 清理下载不完整的小文件（<1KB）..."
          find dl -size -1024c -print -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      # ───────── 磁盘空间监控（第 3 阶段：编译前）─────────
      - name: 💽 Disk space · Before build
        id: disk-3
        run: |
          echo "📊 编译前磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "  📂 openwrt/        : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ staging_dir/  : $(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ .ccache/      : $(du -sh openwrt/.ccache 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ dl/           : $(du -sh openwrt/dl 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    └─ build_dir/    : $(du -sh openwrt/build_dir 2>/dev/null | cut -f1 || echo 'N/A')"

      - name: 🔨 5. Build Firmware
        id: build
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  🔨 5. Build Firmware                ║"
          echo "╚══════════════════════════════════════╝"
          START_TIME=$(date +%s)
          cd openwrt
          export CCACHE_DIR="$(pwd)/.ccache"
          ccache --max-size 10G
          # ── ccache 优化配置（提高 OpenWrt 构建命中率）──
          ccache --set-config=compiler_check=content       # 按编译器内容校验，忽略 mtime
          ccache --set-config=hash_dir=false               # 不把工作目录纳入 hash（GHA 路径每次不同）
          ccache --set-config=compression=true             # 压缩缓存条目，10GB 能存更多
          ccache --set-config=compression_level=6          # 压缩级别（0-19，6 为平衡点）
          ccache --set-config=sloppiness=file_stat_matches,include_file_mtime,include_file_ctime,time_macros
          # file_stat_matches   : 用文件内容校验而非 mtime（cache restore 后 mtime 全变）
          # include_file_mtime  : 忽略 #include 文件的 mtime 变化
          # include_file_ctime  : 忽略 #include 文件的 ctime 变化
          # time_macros         : 忽略 __DATE__ / __TIME__ 宏（每次构建时间不同）
          echo "📋 ccache 配置:"
          ccache --show-config | grep -E 'max_size|compiler_check|hash_dir|compression|sloppiness'
          export CC="ccache gcc"
          export CXX="ccache g++"
          NPROC=$(($(nproc) + 1))
          # 确保 make_exit 总有值输出（防止步骤意外退出时 retry 误判）
          MAKE_EXIT=1
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT

          echo "🔨 并行编译 (${NPROC} 线程, -k)..."
          set +o pipefail
          make -j${NPROC} -k 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION_SEC}" >> $GITHUB_OUTPUT
          echo "⏱️ 本步骤耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 磁盘空间监控（第 4 阶段：编译后）─────────
      - name: 💽 Disk space · After build
        if: always()
        id: disk-4
        run: |
          echo "📊 编译后磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "  📂 openwrt/        : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ staging_dir/  : $(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ .ccache/      : $(du -sh openwrt/.ccache 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ dl/           : $(du -sh openwrt/dl 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    └─ build_dir/    : $(du -sh openwrt/build_dir 2>/dev/null | cut -f1 || echo 'N/A')"

          # ── 计算各阶段空间消耗差值 ──
          D1_USED=${{ steps.disk-1.outputs.used_gb || 0 }}
          D2_USED=${{ steps.disk-2.outputs.used_gb || 0 }}
          D3_USED=${{ steps.disk-3.outputs.used_gb || 0 }}
          D4_USED=${USED_GB}
          DELTA_1_2=$((D2_USED - D1_USED))
          DELTA_2_3=$((D3_USED - D2_USED))
          DELTA_3_4=$((D4_USED - D3_USED))
          # 格式化差值（带符号）
          fmt_delta() { local d=$1; if [ "$d" -ge 0 ]; then echo "+${d}G"; else echo "${d}G"; fi; }

          # ── Summary：磁盘空间汇总表 ──
          {
            echo ""
            echo "### 💽 磁盘空间变化"
            echo "| 阶段 | 总容量 | 已用 | 已用% | 阶段消耗 |"
            echo "|------|--------|------|-------|----------|"
            echo "| ① 初始 | ${TOTAL_GB}G | ${D1_USED}G | ${{ steps.disk-1.outputs.used_pct || 'N/A' }}% | — |"
            echo "| ② 环境准备后 | ${TOTAL_GB}G | ${D2_USED}G | ${{ steps.disk-2.outputs.used_pct || 'N/A' }}% | $(fmt_delta $DELTA_1_2) |"
            echo "| ③ 编译前 | ${TOTAL_GB}G | ${D3_USED}G | ${{ steps.disk-3.outputs.used_pct || 'N/A' }}% | $(fmt_delta $DELTA_2_3) |"
            echo "| ④ 编译后 | ${TOTAL_GB}G | ${D4_USED}G | ${USED_PCT}% | $(fmt_delta $DELTA_3_4) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # 后续可基于此输出决定是否自动清理
          # 例: if [ "$AVAIL_GB" -lt 30 ]; then echo "need_cleanup=true" >> $GITHUB_OUTPUT; fi

      # ───────── 重试（先更新仓库 → 并行重试 → 单线程兜底）─────────
      - name: 🔄 Retry build
        if: always() && !cancelled() && steps.build.outputs.make_exit != '0'
        id: retry
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd openwrt
          export CC="ccache gcc"
          export CXX="ccache g++"

          echo "⚠️ 并行编译有错误 → 更新仓库后重试..."

          # ── 保存初始 build.log ──
          # 保留初始构建（不含 git pull）的日志，某些工具链/host 编译错误
          # 可能在重试时因 pull 改变了上下文而无法复现，初始日志仍有参考价值。
          cp build.log build.1.log 2>/dev/null || true

          # ── 清除旧的 logs/ ──
          # 避免初始构建的失败包 compile.txt 残留 → 重试后的错误诊断误报。
          rm -rf logs/

          # 重试时拉取最新代码：并行编译失败常见于上游包版本冲突，
          # pull 到最新的 Makefile/patches 后再重试往往能解决。
          echo "📥 更新源码仓库 (${{ matrix.ref }})..."
          git pull origin ${{ matrix.ref }} 2>/dev/null || echo "   (无远端更新或非分支引用)"
          echo "📥 更新 openwrt-packages (${{ matrix.packages_branch }})..."
          git -C package/solarflows pull origin ${{ matrix.packages_branch }} 2>/dev/null || echo "   (无远端更新)"
          echo "📥 更新 feeds ..."
          ./scripts/feeds update -a && ./scripts/feeds install -a

          # 第一轮：并行重试（很多竞争错误二次就能过）
          # ⚠️ 覆盖 build.log 而非追加，确保 artifact 中只保留最新日志
          # ⚠️ 使用 -k 确保所有包都编译完，logs/ 信息完整，便于查错
          echo "🔄 第一轮重试：并行编译 ($(nproc) 线程, -k)..."
          RETRY_EXIT=1
          set +o pipefail
          make -j$(nproc) -k 2>&1 | tee build.log
          RETRY_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          if [ "$RETRY_EXIT" -ne 0 ]; then
            # 第二轮：单线程重试（最后一搏）
            echo "⚠️ 并行重试仍有错误 → 单线程最后一搏..."
            set +o pipefail
            make -j1 -k 2>&1 | tee build.log
            RETRY_EXIT=${PIPESTATUS[0]}
            set -o pipefail
          fi

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "retry_duration=${DURATION_SEC}" >> $GITHUB_OUTPUT

          if [ "$RETRY_EXIT" -ne 0 ]; then
            echo "💥 构建彻底失败 · 请查看 build.log 及 logs/ 目录"
            exit 1
          fi
          echo "✅ 重试完成 · 耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 总耗时汇总 ─────────
      - name: ⏱️ Total Build Duration
        if: always()
        id: total_duration
        run: |
          BUILD_DUR="${{ steps.build.outputs.duration || '0' }}"
          RETRY_DUR="${{ steps.retry.outputs.retry_duration || '0' }}"
          TOTAL_SEC=$((BUILD_DUR + RETRY_DUR))
          TOTAL_FMT=$(printf '%dh %dm %ds' $((TOTAL_SEC/3600)) $(((TOTAL_SEC%3600)/60)) $((TOTAL_SEC%60)))
          echo "duration=${TOTAL_SEC}" >> $GITHUB_OUTPUT
          echo "duration_fmt=${TOTAL_FMT}" >> $GITHUB_OUTPUT
          echo "⏱️ 总编译耗时: ${TOTAL_FMT} (并行 ${BUILD_DUR}s + 重试 ${RETRY_DUR}s)"

      # ───────── 编译日志统计 ─────────
      - name: 📊 Build Log Analysis
        if: always()
        run: |
          cd openwrt

          # 一次性提取所有 compile.txt 末行，再用 awk 分流统计
          TAIL_ALL=$(find logs -name 'compile.txt' -print0 | xargs -0 tail -qn1 2>/dev/null || true)

          TOTAL=$(find logs -name 'compile.txt' 2>/dev/null | wc -l)
          INCOMPLETE=$((TOTAL - $(echo "$TAIL_ALL" | grep -c '^time: ' || true)))
          EMPTY=$(find logs -name 'compile.txt' -size 0 2>/dev/null | wc -l)

          # 耗时提取
          echo "$TAIL_ALL" | grep '^time: ' | awk -F'#' 'NF==4' > build_time_clean.log || true

          # 统计输出到终端日志
          echo "📊 compile.txt: 总计 ${TOTAL}, 未完成 ${INCOMPLETE}, 空 ${EMPTY}"

          # Summary 只保留 Top 5
          {
            echo ""
            echo "### 📊 编译耗时 Top 5"
            echo "\`\`\`"
            awk -F'#' '{
              pkg=$1; sub(/^time: /, "", pkg); sub(/\/compile$/, "", pkg);
              real=$2;
              printf "%8.2fs  %s\n", real, pkg
            }' build_time_clean.log 2>/dev/null | sort -rn 2>/dev/null | head -5 || true
            echo "\`\`\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # ───────── ccache 统计与清理（独立步骤，不受构建成败影响）─────────
      - name: 📈 ccache Stats & Cleanup
        if: always()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📈 ccache 统计与压缩测量             ║"
          echo "╚══════════════════════════════════════╝"

          # ── 初始化 Summary 行供后续追加 ──
          TC_HIT_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}" = "true" ] && echo "✅ 命中" || echo "🔨 重编")
          TC_DISK=$(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo "N/A")

          if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
            export CCACHE_DIR="$(pwd)/openwrt/.ccache"

            # ── 磁盘用量 + 压缩大小 ──
            DISK_USAGE_HUMAN=$(du -sh "openwrt/.ccache" 2>/dev/null | cut -f1)
            DISK_USAGE_BYTES=$(du -sb "openwrt/.ccache" 2>/dev/null | awk '{print $1}')
            CC_GZIP_BYTES=$(timeout 60 tar cf - openwrt/.ccache 2>/dev/null | gzip -1 -c | wc -c 2>/dev/null || echo 0)
            CC_GZIP_HUMAN=""
            if [ -n "$CC_GZIP_BYTES" ] && [ "$CC_GZIP_BYTES" -gt 0 ] && [ -n "$DISK_USAGE_BYTES" ] && [ "$DISK_USAGE_BYTES" -gt 0 ]; then
              CC_GZIP_HUMAN=$(numfmt --to=iec "$CC_GZIP_BYTES" 2>/dev/null || echo "${CC_GZIP_BYTES} B")
            fi

            # ── 解析关键指标（兼容 ccache 3.x 旧格式 + 4.x 新格式）──
            CC_RAW=$(ccache -s 2>/dev/null || true)
            HITS_DIRECT=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(direct\)|Direct):\s*\K[0-9]+' | head -1)
            HITS_PREP=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(preprocessed\)|Preprocessed):\s*\K[0-9]+' | head -1)
            MISSES=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache miss|Misses):\s*\K[0-9]+' | head -1)
            CACHE_SIZE=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache size \(|Cache size \()G(?:B|iB)\):\s*\K[0-9.]+' | head -1)
            # 如果 4.x 格式的 Direct/Preprocessed/Misses 没抓到，说明可能是其他格式，置空即可
            [ -z "$HITS_DIRECT" ] && HITS_DIRECT="?"
            [ -z "$HITS_PREP" ] && HITS_PREP="?"
            [ -z "$MISSES" ] && MISSES="?"
            [ -z "$CACHE_SIZE" ] && CACHE_SIZE="?"

            # ── ccache -s 完整输出到终端日志 ──
            echo ""
            echo "📊 ccache -s 原始输出:"
            echo "$CC_RAW"

            # ── 计算命中率百分比（仅在指标可解析时计算）──
            if [ "$HITS_DIRECT" != "?" ] && [ "$HITS_PREP" != "?" ] && [ "$MISSES" != "?" ]; then
              CC_TOTAL=$((HITS_DIRECT + HITS_PREP + MISSES))
              if [ "$CC_TOTAL" -gt 0 ]; then
                HIT_RATE=$(( (HITS_DIRECT + HITS_PREP) * 100 / CC_TOTAL ))
              else
                HIT_RATE=0
              fi
              HIT_DETAIL="${HIT_RATE}% (${HITS_DIRECT}+${HITS_PREP}/${CC_TOTAL})"
            else
              HIT_DETAIL="N/A"
            fi

            # ── 清理过期缓存 ──
            echo "🧹 清理过期缓存 (上限: 10G)..."
            ccache --cleanup 2>/dev/null || true

            # ── Summary 精简缓存状态 ──
            CC_HIT=$([ "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}" = "true" ] && echo "✅ 命中" || echo "🔄 冷启")
            {
              echo ""
              echo "### 💾 缓存状态"
              echo "| 缓存 | 恢复 | 命中率 | 磁盘大小 |"
              echo "|------|------|--------|---------|"
              echo "| **工具链** | ${TC_HIT_LABEL} | — | ${TC_DISK} |"
              echo "| **ccache** | ${CC_HIT} | ${HIT_DETAIL} | ${DISK_USAGE_HUMAN:-N/A} |"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ ccache 不可用或 .ccache 目录不存在"
            {
              echo ""
              echo "### 💾 缓存状态"
              echo "| 缓存 | 恢复 | 命中率 | 磁盘大小 |"
              echo "|------|------|--------|---------|"
              echo "| **工具链** | ${TC_HIT_LABEL} | — | ${TC_DISK} |"
              echo "| **ccache** | 🔄 冷启 | — | — |"
            } | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      # ───────── 编译错误诊断 ─────────
      - name: 🔍 Build Error Diagnostics
        if: failure()
        run: |
          cd openwrt
          FAILED_PKGS=""

          echo "## ❌ 编译错误详情" >> "$GITHUB_STEP_SUMMARY"

          # 扫描 logs/ 中所有未正常完成的编译日志（末行不含 time: 标记的为失败）
          for logfile in $(find logs -name 'compile.txt' -type f 2>/dev/null | sort); do
            LAST_LINE=$(tail -1 "$logfile" 2>/dev/null || true)
            if ! echo "$LAST_LINE" | grep -q '^time:'; then
              PKG=$(echo "$logfile" | sed 's|logs/||; s|/compile.txt||')
              FAILED_PKGS="$FAILED_PKGS $PKG"
            fi
          done

          if [ -n "$FAILED_PKGS" ]; then
            PKG_COUNT=$(echo "$FAILED_PKGS" | wc -w)
            echo "共 ${PKG_COUNT} 个软件包编译失败" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            for pkg in $FAILED_PKGS; do
              LOGFILE="logs/${pkg}/compile.txt"
              if [ -f "$LOGFILE" ]; then
                echo "### ❌ ${pkg}" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo '```text' >> "$GITHUB_STEP_SUMMARY"
                # 过滤 make 目录切换噪音，取最后 60 行有效错误
                grep -vE '^(make\[[0-9]+\]|Entering directory|Leaving directory)' "$LOGFILE" 2>/dev/null | tail -60 >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
              fi
            done
          else
            echo "未在 logs/ 中找到失败软件包（编译可能在其他阶段出错）" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            # 从 build.log 提取 make 错误摘要
            grep -E 'make\[[0-9]+\].*(Error [0-9]+|Stop\.?)$' build.log 2>/dev/null | head -40 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # ── 提示初始构建日志（retry 时保存的 build.1.log）──
          if [ -f build.1.log ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> 📎 初始构建日志（更新仓库前）已保存至 artifact: \`build.1.log\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📋 logs/ 概览" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          TOTAL_LOGS=$(find logs -name 'compile.txt' -type f 2>/dev/null | wc -l)
          EMPTY_LOGS=$(find logs -name 'compile.txt' -type f -size 0 2>/dev/null | wc -l)
          echo "总日志数: ${TOTAL_LOGS}"
          echo "空日志:   ${EMPTY_LOGS}"
          echo "失败包:   ${PKG_COUNT:-0}"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ───────── 失败处理 ─────────
      - name: 📤 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-log
          path: |
            openwrt/build.log
            openwrt/build.1.log
            openwrt/logs/**
            openwrt/.config
          retention-days: 7
          if-no-files-found: ignore

      # ───────── 清理远端 GitHub Actions Cache（非 Release），仅构建成功时执行 ─────────
      # gh cache 操作的是 GitHub Actions 的缓存存储（actions/cache@v5 的后端），
      # 目标仓库 ${{ github.repository }} 即当前 workflow 所属仓库。
      - name: 🧹 Purge stale GitHub Actions caches
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"
          echo "🧹 清理远端缓存 (cache_strategy=${CACHE_STRATEGY})..."

          # 工具链：clean-all/clean-toolchain 时全删，否则仅在 exact key 未命中时删除
          TC_EXACT_HIT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ] || [ "$TC_EXACT_HIT" != "true" ]; then
            gh cache list --repo "${{ github.repository }}" --key "immwrt-toolchain-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id' 2>/dev/null | \
              xargs -r -P4 -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
            echo "🧹 旧工具链缓存已清理"
          else
            echo "ℹ️ 工具链 exact key 命中 · 缓存不可变，跳过清理"
          fi

          # ccache：同上逻辑
          CC_EXACT_HIT="${{ steps.cache-cc.outputs.cache-hit }}"
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-ccache" ] || [ "$CC_EXACT_HIT" != "true" ]; then
            gh cache list --repo "${{ github.repository }}" --key "immwrt-ccache-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id' 2>/dev/null | \
              xargs -r -P4 -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
            echo "🧹 旧 ccache 缓存已清理"
          else
            echo "ℹ️ ccache exact key 命中 · 缓存不可变，跳过清理"
          fi

          # 构建状态：全量清理旧的状态缓存（精确 key 仅保留本次 run_id）
          gh cache list --repo "${{ github.repository }}" --key "immwrt-state-" --limit 100 --json id --jq '.[].id' 2>/dev/null | \
            xargs -r -P4 -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
          echo "🧹 旧构建状态缓存已清理"

      # ───────── 打包产物 ─────────
      - name: 📦 6. Package Artifacts
        if: success()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 6. Package Artifacts             ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          mkdir -p release/firmware
          # 收集 bin/targets 下所有固件文件（.bin/.itb/.img/.manifest/.buildinfo/sha256sums/profiles.json 等）
          # 排除 packages/ 子目录（含 kmod 包，非固件）
          find bin/targets -type f -not -path "*/packages/*" \
            -exec cp {} release/firmware/ \; 2>/dev/null || true
          echo "📦 固件文件列表："
          ls -la release/firmware/ 2>/dev/null || echo "  (无固件文件)"
          # passwall ipk 和 apk 均支持（mt798x 旧版用 ipk，qualcommax 新版用 apk）
          mkdir -p release/passwall
          find bin/packages -name "*passwall*.ipk" -o -name "*passwall*.apk" -exec cp {} release/passwall/ \; 2>/dev/null || true
          # passwall + passwall2 依赖链：基于两个 Makefile 的 select 条目（并集）。
          # 与 sdk.config 中的 CONFIG_PACKAGE_*=y 保持一致。
          # passwall2 相对于 passwall 额外硬依赖: v2ray-geoip, v2ray-geosite
          DEPS=(chinadns-ng dns2socks geoview haproxy hysteria ipt2socks microsocks naiveproxy \
                shadowsocks-rust-sslocal shadowsocksr-libev simple-obfs shadow-tls sing-box \
                tcping tuic-client v2ray-geoip v2ray-geosite v2ray-plugin xray-core)
          for dep in "${DEPS[@]}"; do
            find bin/packages \( -name "*${dep}*.ipk" -o -name "*${dep}*.apk" \) -exec cp {} release/passwall/ \; 2>/dev/null || true
          done
          # 附带 APK 签名公钥到 passwall 发布目录
          if [ -f public-key.pem ]; then
            cp public-key.pem release/passwall/solarflows-apk-public.pem
            echo "🔑 公钥已复制到 passwall 发布目录"
          fi
          echo ""
          echo "📦 Passwall 包列表："
          ls -la release/passwall/ 2>/dev/null || echo "  (无 passwall 包)"
          echo ""
          echo ""
          echo "📊 产物汇总："
          echo "  固件: $(find release/firmware -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/firmware 2>/dev/null | cut -f1)"
          echo "  Passwall: $(find release/passwall -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/passwall 2>/dev/null | cut -f1)"
          (cd release && tar czf ../${{ matrix.target }}-release.tar.gz .)

          # ── Summary 产物统计 ──
          {
            echo ""
            echo "### 📦 产物统计"
            echo "| 类别 | 数量 | 大小 |"
            echo "|------|------|------|"
            echo "| **固件** | $(find release/firmware -type f 2>/dev/null | wc -l) 个 | $(du -sh release/firmware 2>/dev/null | cut -f1) |"
            echo "| **Passwall** | $(find release/passwall -type f 2>/dev/null | wc -l) 个 | $(du -sh release/passwall 2>/dev/null | cut -f1) |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 构建信息 JSON（独立 artifact）─────────
      - name: 📋 Generate build info
        id: build-info
        run: |
          NOW="${{ steps.start_time.outputs.timestamp }}"
          SHA_FULL="${{ steps.clone_packages.outputs.sha_full }}"
          SHA_SHORT="${{ steps.clone_packages.outputs.sha }}"

          # 从编译产物 feeds.buildinfo 提取各 feed 版本
          FEEDS_INFO=""
          FEEDS_MD_JSON=""
          FW_FEEDS_FILE=$(find openwrt/bin/targets -name "feeds.buildinfo" 2>/dev/null | head -1)
          if [ -f "$FW_FEEDS_FILE" ] && [ -s "$FW_FEEDS_FILE" ]; then
            if grep -q '^src-git\b' "$FW_FEEDS_FILE" 2>/dev/null; then
              FEEDS_INFO=$(jq -Rs '.' "$FW_FEEDS_FILE")
              FEEDS_MD_RAW=$(awk '{
                n=split($NF,a,"^"); url=a[1]; hash=a[2]
                sub(/\.git$/,"",url)
                printf "| [%s](%s/tree/%s) | `%s` |\n", $2, url, hash, hash
              }' "$FW_FEEDS_FILE")
              if [ -n "$FEEDS_MD_RAW" ]; then
                FEEDS_MD_JSON=$(echo "$FEEDS_MD_RAW" | jq -Rs '.')
              else
                echo "⚠️ feeds.buildinfo 格式异常，无法解析 feed 版本"
                FEEDS_MD_JSON='""'
              fi
            else
              echo "⚠️ feeds.buildinfo 内容不完整（无 src-git 条目），跳过 feed 版本记录"
              FEEDS_INFO='""'
              FEEDS_MD_JSON='""'
            fi
          else
            FEEDS_INFO='""'
            FEEDS_MD_JSON='""'
          fi

          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "config": "${{ matrix.config }}",
            "source_repo": "${{ matrix.repo }}",
            "source_ref": "${{ matrix.ref }}",
            "source_sha": "${SHA_FULL}",
            "packages_repo": "solarflows/openwrt-packages",
            "packages_branch": "${{ matrix.packages_branch }}",
            "packages_sha": "${{ steps.clone_packages.outputs.packages_sha }}",
            "feeds_info": ${FEEDS_INFO},
            "feeds_md": ${FEEDS_MD_JSON},
            "duration_sec": "${{ steps.total_duration.outputs.duration }}",
            "duration_fmt": "${{ steps.total_duration.outputs.duration_fmt }}",
            "toolchain_hit": "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}",
            "toolchain_exact": "${{ steps.cache-refresh.outputs.toolchain_exact || 'false' }}",
            "ccache_hit": "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}",
            "signing_key_fingerprint": "${{ steps.signing_key.outputs.fingerprint || 'none' }}",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_repo": "${{ matrix.passwall_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_tag": "${{ needs.plan.outputs.version }}",
            "source_changed": "${{ needs.plan.outputs.source_changed }}",
            "timestamp": "${NOW}"
          }
          JSONEOF
          echo "📋 build-info.json 内容:"
          jq . build-info.json

          # ── Summary Feed 版本 ──
          {
            echo ""
            echo "### 📌 Feed 版本"
            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              printf '%s\n' "$FEEDS_MD_JSON" | jq -r '.'
            else
              echo ""
              echo "（feeds.buildinfo 缺失或为空，未记录）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 生成 Release Notes ─────────
      - name: 📝 Generate release notes
        run: |
          SHA_FULL="${{ steps.clone_packages.outputs.sha_full }}"
          SHA_SHORT="${{ steps.clone_packages.outputs.sha }}"
          # 直接从 build-info.json 读取，避免通过 output 传递导致 bash 转义问题
          FEEDS_MD_JSON=$(jq -r '.feeds_md // empty' build-info.json)

          TC_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}" = "true" ] && echo "✅ 工具链缓存命中" || echo "🔨 工具链重新编译")
          CC_LABEL=$([ "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}" = "true" ] && echo "✅ ccache 命中" || echo "🔄 ccache 冷启动")
          {
            echo "## ${{ matrix.target }} Build"
            echo ""
            echo "**源码**: [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ [${SHA_SHORT}](https://github.com/${{ matrix.repo }}/commit/${SHA_FULL})"
            echo "**软件包**: [${{ matrix.packages_branch }}](https://github.com/solarflows/openwrt-packages/tree/${{ matrix.packages_branch }}) @ [${{ steps.clone_packages.outputs.packages_sha }}](https://github.com/solarflows/openwrt-packages/commit/${{ steps.clone_packages.outputs.packages_sha_full }})"
            echo "**编译耗时**: ${{ steps.total_duration.outputs.duration_fmt }}"
            echo "**缓存**: ${TC_LABEL} / ${CC_LABEL}"

            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "### 📌 Feed 版本"
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              printf '%s\n' "$FEEDS_MD_JSON"
            fi

            echo ""
            echo "---"
            echo "ℹ️ 完整构建报告请查看 GitHub Actions Summary。"
          } > release-body.md
          echo "📋 release-body.md 已生成"

      - name: 📤 Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-release
          path: openwrt/${{ matrix.target }}-release.tar.gz
          retention-days: 7

      - name: 📤 Upload passwall artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall
          path: openwrt/release/passwall
          retention-days: 7
          if-no-files-found: ignore

      - name: 📤 Upload build info artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-info
          path: |
            build-info.json
            release-body.md
          retention-days: 7

      # ───────── 失败/取消时清理 Draft Release ─────────
      - name: 🧹 Cleanup draft release on failure
        if: failure() || cancelled()
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          echo "🧹 构建失败或取消，清理 draft release ${VERSION} ..."
          # 仅删除仍为 draft 状态的 release（已被其他 job 发布的则跳过）
          IS_DRAFT=$(gh release view "${VERSION}" --repo ${{ matrix.release_repo }} \
            --json isDraft --jq '.isDraft' 2>/dev/null || echo "false")
          if [ "$IS_DRAFT" = "true" ]; then
            gh release delete "${VERSION}" --repo ${{ matrix.release_repo }} --yes 2>/dev/null || true
            echo "🗑️ Draft release ${VERSION} 已删除"
          else
            echo "ℹ️ Release ${VERSION} 非 draft 或已不存在，跳过清理"
          fi

  # ========== Passwall 软件包构建（仅 passwall 包变更时） ==========
  # 使用 gh-action-sdk 原生流程（含 check/refresh 校验），
  # 仅编译 luci-app-passwall 和 luci-app-passwall2。
  # 跳过了 hash 严格检测不需要的部分。
  compile-passwall:
    name: Compile passwall ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.should_build_passwall == 'true'
    concurrency:
      group: build-pw-${{ matrix.target }}-${{ needs.plan.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.passwall_matrix) }}
    steps:
      - name: Checkout packages repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.passwall_repo }}
          ref: ${{ matrix.packages_branch }}

      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: ⚙️ Generate .config
        run: |
          CONFIG_DIR="AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_LUCI_LANG_zh_Hans=y
          EOF
          if [ -f "$CONFIG_DIR/sdk.config" ] && [ -s "$CONFIG_DIR/sdk.config" ]; then
            grep -v '^#' "$CONFIG_DIR/sdk.config" | grep -v '^$' \
              | grep -E '(CONFIG_PACKAGE_luci-app-passwall|CONFIG_PACKAGE_luci-app-passwall2)' >> .config || true
            sed -i '/^CONFIG_PACKAGE_/s/=y$/=m/' .config
            echo "📋 已注入 passwall 配置"
          fi

      - name: 🔑 Derive APK public key
        if: ${{ matrix.apk_signing }}
        env:
          APK_BUILD_KEY: ${{ secrets.APK_BUILD_KEY }}
        run: |
          if [ -z "$APK_BUILD_KEY" ]; then
            echo "⚠️ APK_BUILD_KEY 未设置，跳过公钥派生"
            exit 0
          fi
          printf '%s' "$APK_BUILD_KEY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' > private-key.pem
          chmod 600 private-key.pem
          sed -i 's/\r$//' private-key.pem
          openssl ec -in private-key.pem -pubout -out public-key.pem 2>/dev/null || \
            openssl rsa -in private-key.pem -pubout -out public-key.pem
          chmod 644 public-key.pem
          FP=$(openssl sha256 < public-key.pem | awk '{print $NF}')
          echo "🔑 APK 公钥已派生 (SHA256: ${FP:0:16}...)"

      - name: 🔨 Build passwall with gh-action-sdk
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk_container }}
          PACKAGES: "luci-app-passwall luci-app-passwall2"
          FEEDNAME: solarflows
          FEED_DIR: ${{ github.workspace }}
          PRIVATE_KEY: ${{ secrets.APK_BUILD_KEY }}
          NO_REFRESH_CHECK: 1

      - name: 📦 Collect artifacts
        id: artifacts
        run: |
          mkdir -p upload
          for pkg in luci-app-passwall luci-app-passwall2; do
            find bin/packages/ -type f \( \
              -name "${pkg}_*.ipk" -o \
              -name "${pkg}_*.apk" -o \
              -name "${pkg}*.ipk" -o \
              -name "${pkg}*.apk" \
            \) -exec cp {} upload/ \; 2>/dev/null || true
          done
          if [ -f public-key.pem ]; then
            cp public-key.pem upload/solarflows-apk-public.pem
          fi
          FILE_COUNT=$(find upload/ -type f 2>/dev/null | wc -l)
          echo "file_count=${FILE_COUNT}" >> $GITHUB_OUTPUT
          echo "📦 收集到 ${FILE_COUNT} 个文件"

      - name: 📤 Upload passwall artifact (compile-passwall)
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall-sdk-pw
          path: upload/
          retention-days: 7

      - name: 📋 Generate build info (compile-passwall)
        if: steps.artifacts.outputs.file_count > 0
        run: |
          PKG_COMMIT=$(git rev-parse --short HEAD)
          PKG_COMMIT_FULL=$(git rev-parse HEAD)
          PKG_FORMAT="${{ matrix.apk_signing && 'apk' || 'ipk' }}"
          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "packages_branch": "${{ matrix.packages_branch }}",
            "packages_sha": "${PKG_COMMIT_FULL}",
            "packages_commit": "${PKG_COMMIT}",
            "source_sha": "",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_repo": "${{ matrix.passwall_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "packages_format": "${PKG_FORMAT}",
            "apk_signing": ${{ matrix.apk_signing }},
            "file_count": "${{ steps.artifacts.outputs.file_count }}",
            "timestamp": "$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')"
          }
          JSONEOF

      - name: 📤 Upload build info
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall-build-info
          path: build-info.json
          retention-days: 7

  # ========== 其他 SDK 软件包构建（仅非 passwall 包变更时） ==========
  # 使用自控 Docker 容器，跳过 gh-action-sdk 的严格 hash 检查，
  # 让 make download 的 git 回退机制能正常跑完。
  compile-packages:
    name: Compile packages ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.should_build_pkgs == 'true'
    concurrency:
      group: build-pkg-${{ matrix.target }}-${{ needs.plan.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.pkgs_matrix) }}
    steps:
      - name: Checkout packages repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.passwall_repo }}
          ref: ${{ matrix.packages_branch }}

      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: ⚙️ Generate .config
        run: |
          CONFIG_DIR="AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_LUCI_LANG_zh_Hans=y
          EOF
          if [ -f "$CONFIG_DIR/sdk.config" ] && [ -s "$CONFIG_DIR/sdk.config" ]; then
            grep -v '^#' "$CONFIG_DIR/sdk.config" | grep -v '^$' >> .config
            # SDK 编译：CONFIG_PACKAGE_*=y → =m（编译为独立 .ipk/.apk，不内建到固件）
            # 只改 CONFIG_PACKAGE_ 开头的行，避免误改 CONFIG_ALL_ 等系统配置
            sed -i '/^CONFIG_PACKAGE_/s/=y$/=m/' .config
            echo "📋 已注入 sdk.config ($(grep -c '^CONFIG' "$CONFIG_DIR/sdk.config") 项，PACKAGE_*=y 已转为 =m)"
          else
            echo "⚠️ $CONFIG_DIR/sdk.config 不存在或为空，使用默认最小配置"
          fi
          echo "📋 .config 内容:"
          cat .config

      - name: 🔑 Derive APK public key
        if: ${{ matrix.apk_signing }}
        env:
          APK_BUILD_KEY: ${{ secrets.APK_BUILD_KEY }}
        run: |
          if [ -z "$APK_BUILD_KEY" ]; then
            echo "⚠️ APK_BUILD_KEY 未设置，跳过公钥派生"
            exit 0
          fi
          printf '%s' "$APK_BUILD_KEY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' > private-key.pem
          chmod 600 private-key.pem
          sed -i 's/\r$//' private-key.pem
          openssl ec -in private-key.pem -pubout -out public-key.pem 2>/dev/null || \
            openssl rsa -in private-key.pem -pubout -out public-key.pem
          chmod 644 public-key.pem
          FP=$(openssl sha256 < public-key.pem | awk '{print $NF}')
          echo "🔑 APK 公钥已派生 (SHA256: ${FP:0:16}...)"

      - name: 📦 Resolve SDK packages
        id: resolve-pkgs
        run: |
          SDK_PKGS="${{ matrix.sdk_packages }}"
          if [ "$SDK_PKGS" = "*" ]; then
            CONFIG_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}/sdk.config"
            if [ -f "$CONFIG_FILE" ]; then
              # 提取 CONFIG_PACKAGE_*=y 的包名，需处理以下目录名 ≠ 包名的情况：
              # - 多子包目录: shadowsocksr-libev/ssr-*, simple-obfs/simple-obfs-client → 折叠
              # - i18n 包: luci-i18n-* 无法独立传给 make，但会随父 luci app 自动编译
              SDK_PKGS=$(grep '^CONFIG_PACKAGE_.*=[ym]' "$CONFIG_FILE" | sed 's/CONFIG_PACKAGE_\(.*\)=[ym]/\1/' | tr '\n' ' ')
              # 折叠多子包目录：子包名 → 父目录名
              SDK_PKGS=$(echo "$SDK_PKGS" | sed 's/shadowsocksr-libev-ssr-[^ ]*/shadowsocksr-libev/g')
              SDK_PKGS=$(echo "$SDK_PKGS" | sed 's/simple-obfs-client/simple-obfs/g')
              # 去重 + 清理空格 (保留完整列表供 collect 使用)
              SDK_PKGS=$(echo "$SDK_PKGS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/^ *//;s/ *$//')
              # 传给 make 的列表：移除 luci-i18n-*（随父 luci app 自动编译，不能独立 make）
              BUILD_PKGS=$(echo "$SDK_PKGS" | sed 's/luci-i18n-[^ ]*//g' | tr ' ' '\n' | sort -u | tr '\n' ' ' | sed 's/^ *//;s/ *$//')
            else
              echo "⚠️ sdk.config 不存在，跳过 SDK 构建 (target=${{ matrix.target }})"
              SDK_PKGS=""
            fi
            # 提取后仍为空（sdk.config 无 CONFIG_PACKAGE_ 条目）
            if [ -z "$SDK_PKGS" ]; then
              echo "⚠️ sdk.config 中无 CONFIG_PACKAGE_ 条目，跳过 SDK 构建"
            fi
          fi
          echo "packages=$BUILD_PKGS" >> $GITHUB_OUTPUT
          echo "collect_packages=$SDK_PKGS" >> $GITHUB_OUTPUT
          echo "📦 PACKAGES=$BUILD_PKGS"

      - name: 🔨 Build with OpenWrt SDK (direct)
        if: steps.resolve-pkgs.outputs.packages != ''
        id: compile
        run: |
          # 直接使用 SDK Docker 容器，跳过 gh-action-sdk entrypoint 的严格 hash 检查。
          # gh-action-sdk 在 make package/$PKG/check 后 grep 日志中的 hash WARNING → exit 1，
          # 不给 make download 的 git 回退机制（PKG_SOURCE_PROTO:=git 时 tarball 哈希不匹配 →
          # 回退到 git clone）跑完的机会。这里直接用 Docker 控制流程，跳过 check 步骤。
          DOCKER_OPTS="-v ${{ github.workspace }}:/feed --workdir /builder"
          if [ "${{ matrix.apk_signing }}" = "true" ] && [ -f private-key.pem ]; then
            DOCKER_OPTS="$DOCKER_OPTS -v $(pwd)/private-key.pem:/builder/private-key.pem:ro"
            echo "🔑 APK 私钥通过只读挂载注入容器"
          fi
          docker run --rm $DOCKER_OPTS \
            -e PACKAGES="${{ steps.resolve-pkgs.outputs.packages }}" \
            ghcr.io/openwrt/sdk:${{ matrix.sdk_container }} \
            /bin/bash -c '
              set -e

              echo "::group::📋 Configure feeds"
              echo "src-link solarflows /feed/" >> feeds.conf
              ./scripts/feeds update -a 2>&1
              make defconfig 2>&1
              echo "::endgroup::"

              # ── Rust 包说明 ──
              # OpenWrt 21.02 SDK (mt798x) 不含 Rust 主机工具链，sing-box/hysteria 等
              # Rust 包无法通过 SDK 交叉编译。这些包仅在固件全量构建 (compile-firmware)
              # 中编译。SDK 编译时 Rust 包会自然失败，由 make 的 || warning 兜底。

              for pkg in $PACKAGES; do
                echo "::group::📦 Compile $pkg"
                ./scripts/feeds install -p solarflows -f "$pkg" 2>&1
                make package/"$pkg"/download V=s 2>&1
                make package/"$pkg"/compile \
                  BUILD_LOG=1 V=s -j$(nproc 2>/dev/null || echo 4) 2>&1 || \
                  echo "::warning::⚠️ $pkg build failed, continuing"
                echo "::endgroup::"
              done

              # 产物复制到宿主可见路径（/feed = ${{ github.workspace }}）
              [ -d bin/ ] && cp -r bin/ /feed/
              [ -d logs/ ] && cp -r logs/ /feed/
            '

      - name: 📦 Collect artifacts
        id: artifacts
        run: |
          mkdir -p upload
          # 使用收集专用列表（含 i18n 包），与传给 make 的列表不同（后者不含 i18n）
          SDK_PKGS="${{ steps.resolve-pkgs.outputs.collect_packages }}"
          if [ -z "$SDK_PKGS" ]; then
            echo "⚠️ 无软件包列表，跳过收集"
          else
            for pkg in $SDK_PKGS; do
              find bin/packages/ -type f \( \
                -name "${pkg}_*.ipk" -o \
                -name "${pkg}_*.apk" -o \
                -name "${pkg}*.ipk" -o \
                -name "${pkg}*.apk" \
              \) -exec cp {} upload/ \; 2>/dev/null || true
            done
          fi
          # 附带 APK 签名公钥
          if [ -f public-key.pem ]; then
            cp public-key.pem upload/solarflows-apk-public.pem
            echo "🔑 公钥已复制到上传目录"
          fi
          FILE_COUNT=$(find upload/ -type f 2>/dev/null | wc -l)
          echo "file_count=${FILE_COUNT}" >> $GITHUB_OUTPUT
          echo "📦 收集到 ${FILE_COUNT} 个文件"
          ls -la upload/

      - name: 📤 Upload passwall artifact
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall-sdk
          path: upload/
          retention-days: 7

      - name: 📋 Generate build info
        if: steps.artifacts.outputs.file_count > 0
        run: |
          PKG_COMMIT=$(git rev-parse --short HEAD)
          PKG_COMMIT_FULL=$(git rev-parse HEAD)
          if [ "${{ matrix.apk_signing }}" = "true" ]; then
            PKG_FORMAT="apk"
          else
            PKG_FORMAT="ipk"
          fi
          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "packages_branch": "${{ matrix.packages_branch }}",
            "packages_sha": "${PKG_COMMIT_FULL}",
            "packages_commit": "${PKG_COMMIT}",
            "packages_commit_full": "${PKG_COMMIT_FULL}",
            "source_sha": "",
            "packages_format": "${PKG_FORMAT}",
            "sdk_container": "${{ matrix.sdk_container }}",
            "sdk_packages": "${{ matrix.sdk_packages }}",
            "release_tag": "${{ needs.plan.outputs.sdk_version }}",
            "passwall_repo": "${{ matrix.passwall_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_repo": "${{ matrix.passwall_repo }}",
            "apk_signing": ${{ matrix.apk_signing }},
            "file_count": "${{ steps.artifacts.outputs.file_count }}",
            "timestamp": "$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')"
          }
          JSONEOF

      - name: 📤 Upload build info
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-sdk-build-info
          path: build-info.json
          retention-days: 7

  # ========== 发布任务 ==========
  # 使用 always() 而非 success()：矩阵构建中某个分片失败不应阻止其他成功分片的发布。
  # 内部 publish_target() 会检查产物是否存在，缺失则跳过。
  # Release 的创建由 plan 负责（draft），compile 上传产物，此 job 负责 draft→published。
  release:
    name: Release
    needs: [plan, compile-firmware, compile-passwall, compile-packages]
    if: |
      always() &&
      !cancelled() &&
      needs.plan.outputs.should_publish == 'true' &&
      (needs.plan.outputs.should_build_firmware == 'true' ||
       needs.plan.outputs.should_build_passwall == 'true' ||
       needs.plan.outputs.should_build_pkgs == 'true')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'

      - name: 🔄 Retry download via gh CLI (fallback)
        if: steps.download.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🔄 actions/download-artifact@v8 失败，通过 gh CLI 重试..."
          # gh run download --name 每次只下载一个 artifact，用循环重试全部
          ARTIFACTS=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} \
            --json artifacts --jq '.artifacts[].name' 2>/dev/null)
          for artifact in $ARTIFACTS; do
            max_retries=3
            for i in $(seq 1 $max_retries); do
              echo "📥 下载 artifact: $artifact (尝试 #$i)..."
              gh run download ${{ github.run_id }} \
                --repo ${{ github.repository }} \
                --name "$artifact" \
                --dir artifacts 2>&1 && break
              if [ "$i" -lt "$max_retries" ]; then
                echo "⚠️ 重试 #$i 失败，10 秒后..."
                sleep 10
              else
                echo "❌ artifact $artifact 下载失败"
                exit 1
              fi
            done
          done
          echo "✅ 所有 artifact 下载完成"

      - name: Remove failed build logs
        run: rm -rf artifacts/*-build-log 2>/dev/null || true

      - name: Publish all targets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # ============================================================
          # 通用发布函数：固件 Release + Passwall 固定 Release
          # ============================================================
          publish_target() {
            local TARGET="$1"

            local INFO_FILE="artifacts/${TARGET}-build-info/build-info.json"
            if [ ! -f "$INFO_FILE" ]; then
              echo "⏭️  [${TARGET}] 未找到构建产物，跳过发布。"
              return 0
            fi

            # -------- 从 build-info.json 读取参数 --------
            local TARGET_NAME SOURCE_SHA PKG_SHA
            local DURATION_FMT
            local TOOLCHAIN_HIT TOOLCHAIN_EXACT CCACHE_HIT
            local RELEASE_REPO PASSWALL_TAG PASSWALL_REPO
            TARGET_NAME=$(jq -r '.target'              "$INFO_FILE")
            SOURCE_SHA=$(jq -r '.source_sha'            "$INFO_FILE")
            PKG_SHA=$(jq -r '.packages_sha'            "$INFO_FILE")
            DURATION_FMT=$(jq -r '.duration_fmt'        "$INFO_FILE")
            TOOLCHAIN_HIT=$(jq -r '.toolchain_hit'      "$INFO_FILE")
            TOOLCHAIN_EXACT=$(jq -r '.toolchain_exact'   "$INFO_FILE")
            CCACHE_HIT=$(jq -r '.ccache_hit'             "$INFO_FILE")
            RELEASE_REPO=$(jq -r '.release_repo'        "$INFO_FILE")
            PASSWALL_REPO=$(jq -r '.passwall_repo'      "$INFO_FILE")
            PASSWALL_TAG=$(jq -r '.passwall_tag'        "$INFO_FILE")
            echo "🏷️  [${TARGET}] Passwall → ${PASSWALL_REPO}@${PASSWALL_TAG}"

            # -------- 格式化图标（用于日志） --------
            if [ "$TOOLCHAIN_HIT" = "true" ]; then
              if [ "$TOOLCHAIN_EXACT" = "true" ]; then
                echo "  🔧 工具链: ✅ 精确命中"
              else
                echo "  🔧 工具链: ♻️ 模糊恢复"
              fi
            else
              echo "  🔧 工具链: 🔨 重编"
            fi
            [ "$CCACHE_HIT" = "true" ] && echo "  ⚡ ccache: ✅ 命中" || echo "  ⚡ ccache: 🔄 冷启"

            # -------- 生成版本 Tag（直接从 build-info.json 读取） --------
            local TAG TITLE
            TAG=$(jq -r '.release_tag' "$INFO_FILE")
            TITLE="Build ${TAG}"
            echo "🏷️  [${TARGET}] 版本: $TAG → $RELEASE_REPO"

            # -------- 解包固件 --------
            local RELEASE_TAR="artifacts/${TARGET}-release/${TARGET}-release.tar.gz"
            if [ -f "$RELEASE_TAR" ]; then
              tar xzf "$RELEASE_TAR" -C "artifacts/${TARGET}-release/"
            fi

            # -------- 发布固件 --------
            local FW_DIR="artifacts/${TARGET}-release/firmware"
            local FW_COUNT
            FW_COUNT=$(find "$FW_DIR" -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -d "$FW_DIR" ] && [ -n "$FW_COUNT" ]; then
              # 直接从构建产物读取 release-body.md
              local RELEASE_BODY="artifacts/${TARGET}-build-info/release-body.md"
              if [ -f "$RELEASE_BODY" ]; then
                cp "$RELEASE_BODY" /tmp/release_body.md
              else
                # 降级：文件不存在则生成最小 body
                echo "## ${TARGET_NAME} ${TITLE}" > /tmp/release_body.md
              fi

              if gh release view "$TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                # Draft release 已由 plan 创建，上传固件
                echo "📤 [${TARGET}] 上传固件到 Release $TAG ..."
                gh release upload "$TAG" --repo "$RELEASE_REPO" \
                  "$FW_DIR"/* --clobber || echo "::warning::⚠️ [${TARGET}] 固件上传失败"
              else
                # 降级：Release 不存在时直接创建
                echo "🚀 [${TARGET}] 创建 Release $TAG ..."
                gh release create "$TAG" --repo "$RELEASE_REPO" \
                  --title "${TARGET_NAME} ${TITLE}" \
                  --target "$SOURCE_SHA" \
                  --notes-file /tmp/release_body.md \
                  "$FW_DIR"/* || echo "::error::❌ [${TARGET}] Release 创建失败"
              fi
              # 更新 notes 并发布（draft → published）
              gh release edit "$TAG" --repo "$RELEASE_REPO" \
                --title "${TARGET_NAME} ${TITLE}" \
                --notes-file /tmp/release_body.md \
                --draft=false || echo "::warning::⚠️ [${TARGET}] Release notes 更新失败"
              echo "✅ [${TARGET}] Release $TAG 已发布"
            else
              echo "⚠️  [${TARGET}] 没有找到固件文件，跳过固件发布。"
            fi

            # -------- 发布 Passwall（合并 Release，solarflows/openwrt-packages） --------
            # mt798x(ipk) + qualcommax(apk) 格式不同，合并到同一个 tag 不冲突。
            # 增量上传: 先上传文件的 target 创建 Release，后续 target 追加文件。
            local PW_DIR="artifacts/${TARGET}-passwall"
            if [ -d "$PW_DIR" ]; then
              local PW_FILES
              PW_FILES=$(find "$PW_DIR" -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' -o -name '*.pem' \) -type f 2>/dev/null || true)
              if [ -n "$PW_FILES" ]; then
                local PW_NOTES
                PW_NOTES="${TARGET} 全量构建 · $(date +'%Y-%m-%d %H:%M')"
                if gh release view "$PASSWALL_TAG" --repo "$PASSWALL_REPO" &>/dev/null; then
                  echo "📤 [${TARGET}] 上传到 Passwall Release ${PASSWALL_TAG} ..."
                  gh release upload "$PASSWALL_TAG" --repo "$PASSWALL_REPO" \
                    $(echo "$PW_FILES") --clobber || echo "::warning::⚠️ [${TARGET}] Passwall 上传失败"
                  # 追加 notes
                  EXISTING=$(gh release view "$PASSWALL_TAG" --repo "$PASSWALL_REPO" --json body --jq '.body // ""' 2>/dev/null || echo "")
                  printf '%b\n' "${EXISTING}\n- **${TARGET}**: ${PW_NOTES}" > /tmp/release_notes.md
                  gh release edit "$PASSWALL_TAG" --repo "$PASSWALL_REPO" --notes-file /tmp/release_notes.md || echo "::warning::⚠️ [${TARGET}] Passwall notes 更新失败"
                else
                  echo "🚀 [${TARGET}] 创建 Passwall Release ${PASSWALL_REPO}@${PASSWALL_TAG} ..."
                  note_body="## Passwall Packages\n\n"
                  note_body="${note_body}全量构建 + SDK 增量构建，合并两个目标平台的软件包。\n\n"
                  note_body="${note_body}---\n- **${TARGET}**: ${PW_NOTES}"
                  printf '%b\n' "$note_body" > /tmp/release_notes.md
                  gh release create "$PASSWALL_TAG" --repo "$PASSWALL_REPO" \
                    --title "Passwall Packages" \
                    --notes-file /tmp/release_notes.md \
                    --latest=false \
                    $(echo "$PW_FILES")
                fi
              else
                echo "⚠️  [${TARGET}] 没有找到 passwall 文件，跳过。"
              fi
            fi

            echo "✅ [${TARGET}] 发布流程完成。"
          }

          # 按目标依次发布固件（排除 SDK / passwall 构建产物）
          for target_dir in artifacts/*-build-info; do
            case "$(basename "$target_dir")" in *-sdk-*|*-passwall-*) continue ;; esac
            TARGET_NAME=$(basename "$target_dir" | sed 's/-build-info//')
            publish_target "$TARGET_NAME"
          done

          # ── 发布 SDK 构建的 passwall（合并到同一 Release）──
          # 增量上传到与全量构建相同的固定 tag Release，不删除重建。
          # 两个目标 (mt798x ipk + qualcommax apk) 合并到同一个 Release。
          for sdk_dir in artifacts/*-sdk-build-info; do
            [ -d "$sdk_dir" ] || continue
            TARGET=$(basename "$sdk_dir" | sed 's/-sdk-build-info//')
            INFO_FILE="$sdk_dir/build-info.json"
            [ -f "$INFO_FILE" ] || continue

            PW_REPO=$(jq -r '.passwall_repo' "$INFO_FILE")
            PW_TAG=$(jq -r '.passwall_tag' "$INFO_FILE")
            PKG_BRANCH=$(jq -r '.packages_branch' "$INFO_FILE")
            PKG_COMMIT=$(jq -r '.packages_commit // "unknown"' "$INFO_FILE")
            PKG_COMMIT_FULL=$(jq -r '.packages_commit_full // ""' "$INFO_FILE")
            PKG_FORMAT=$(jq -r '.packages_format // "?"' "$INFO_FILE")
            SDK_DIR="artifacts/${TARGET}-passwall-sdk"
            [ -d "$SDK_DIR" ] || { echo "⏭️ [${TARGET}] SDK 产物不存在"; continue; }

            SDK_FILES=$(find "$SDK_DIR" -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' -o -name '*.pem' \) 2>/dev/null || true)
            [ -n "$SDK_FILES" ] || { echo "⏭️ [${TARGET}] 无 SDK 文件"; continue; }

            # 构建 Release Note（含分支、commit、包格式）
            SDK_NOTE_TITLE="### ${TARGET} — SDK 构建 (.${PKG_FORMAT})"
            SDK_NOTE_DETAIL="| 项目 | 详情 |\n|------|------|\n| **格式** | .${PKG_FORMAT} (opkg install) |\n| **分支** | [${PKG_BRANCH}](https://github.com/solarflows/openwrt-packages/tree/${PKG_BRANCH}) |\n| **Commit** | [${PKG_COMMIT}](https://github.com/solarflows/openwrt-packages/commit/${PKG_COMMIT_FULL}) |\n| **构建时间** | $(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S') |"

            echo "📤 [${TARGET}] SDK 增量发布 → ${PW_REPO}@${PW_TAG} (.${PKG_FORMAT})"

            if gh release view "$PW_TAG" --repo "$PW_REPO" &>/dev/null; then
              # Release 已存在 → 上传文件（覆盖同名，保留其他）
              gh release upload "$PW_TAG" --repo "$PW_REPO" \
                $(echo "$SDK_FILES") --clobber || echo "::warning::⚠️ [${TARGET}] SDK 上传失败"
              # 获取旧 notes，追加本次 SDK 构建信息
              EXISTING=$(gh release view "$PW_TAG" --repo "$PW_REPO" --json body --jq '.body // ""' 2>/dev/null || echo "")
              if echo "$EXISTING" | grep -q "### ${TARGET}" 2>/dev/null; then
                # 同一 target 已有记录 → 替换对应段落
                echo "⚠️ 同一 target 已有构建记录，使用 --clobber 覆盖文件但 notes 需手动清理旧条目"
              fi
              printf '%b\n' "${EXISTING}\n\n---\n${SDK_NOTE_TITLE}\n${SDK_NOTE_DETAIL}" > /tmp/release_notes.md
              gh release edit "$PW_TAG" --repo "$PW_REPO" --notes-file /tmp/release_notes.md || echo "::warning::⚠️ [${TARGET}] SDK notes 更新失败"
            else
              # Release 不存在（纯 SDK target，无全量构建）→ 创建
              printf '%b\n' "${SDK_NOTE_TITLE}\n${SDK_NOTE_DETAIL}" > /tmp/release_notes.md
              gh release create "$PW_TAG" --repo "$PW_REPO" \
                --title "Passwall Packages" \
                --notes-file /tmp/release_notes.md \
                --latest=false \
                $(echo "$SDK_FILES")
            fi
            echo "✅ [${TARGET}] SDK passwall 已发布到 ${PW_TAG}"
          done

          # ── 发布 compile-passwall 构建的 passwall ──
          for pw_dir in artifacts/*-passwall-build-info; do
            [ -d "$pw_dir" ] || continue
            INFO_FILE="$pw_dir/build-info.json"
            [ -f "$INFO_FILE" ] || continue
            TARGET=$(jq -r '.target' "$INFO_FILE")
            PW_TAG=$(jq -r '.passwall_tag // "packages"' "$INFO_FILE")
            PW_REPO="solarflows/openwrt-packages"

            SDK_DIR="artifacts/${TARGET}-passwall-sdk-pw"

            SDK_FILES=$(find "$SDK_DIR" -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' -o -name '*.pem' \) 2>/dev/null || true)
            [ -n "$SDK_FILES" ] || { echo "⏭️ [${TARGET}] 无 passwall 文件"; continue; }

            echo "📤 [${TARGET}] compile-passwall 增量发布 → ${PW_REPO}@${PW_TAG}"
            if gh release view "$PW_TAG" --repo "$PW_REPO" &>/dev/null; then
              gh release upload "$PW_TAG" --repo "$PW_REPO" \
                $(echo "$SDK_FILES") --clobber || echo "::warning::⚠️ [${TARGET}] compile-passwall 上传失败"
            else
              note_body="## Passwall Packages\n\ncompile-passwall 构建。\n\n- **${TARGET}**: $(date +'%Y-%m-%d %H:%M')"
              printf '%b\n' "$note_body" > /tmp/release_notes.md
              gh release create "$PW_TAG" --repo "$PW_REPO" \
                --title "Passwall Packages" \
                --notes-file /tmp/release_notes.md \
                --latest=false \
                $(echo "$SDK_FILES")
            fi
            echo "✅ [${TARGET}] compile-passwall passwall 已发布到 ${PW_TAG}"
          done

          echo "🎉 全部发布流程完成！"

          # ── 生成组合状态文件并保存到 Cache ──
          # 仅从固件构建产物（*-build-info，排除 *-passwall-build-info 和 *-sdk-build-info）
          # 收集 source_sha 和 packages_sha，避免 SDK/Passwall 的空值覆盖固件状态。
          cat > /tmp/build-state.json <<JSONEOF
          {
          $(comma=""; for info in artifacts/*-build-info/build-info.json; do
            [ -f "$info" ] || continue
            case "$(basename "$(dirname "$info")")" in
              *-passwall-*|*-sdk-*) continue ;;
            esac
            TARGET=$(jq -r '.target // empty' "$info" 2>/dev/null)
            SRC_SHA=$(jq -r '.source_sha // empty' "$info" 2>/dev/null)
            PKG_SHA=$(jq -r '.packages_sha // empty' "$info" 2>/dev/null)
            [ -z "$TARGET" ] && continue
            echo "${comma}\"${TARGET}\": {\"source_sha\": \"${SRC_SHA}\", \"packages_sha\": \"${PKG_SHA}\", \"last_build\": \"$(date +'%Y-%m-%d %H:%M:%S')\"}"
            comma=","
          done)
          }
          JSONEOF
          cp /tmp/build-state.json build-state.json

      - name: 💾 Save build state to cache
        uses: actions/cache/save@v5
        with:
          key: immwrt-state-${{ github.run_id }}
          path: build-state.json
