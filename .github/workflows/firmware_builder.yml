name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      # ── 选择类 ──
      target:
        description: '选择构建目标'
        required: true
        default: 'both'
        type: choice
        options:
          - 'mt798x'
          - 'qualcommax'
          - 'both'
      trigger:
        description: '触发模式'
        required: false
        default: 'full'
        type: choice
        options:
          - 'full'           # 完整固件 + 软件包
          - 'packages-only'  # 仅 SDK 编译 passwall
      cache_strategy:
        description: '缓存策略'
        required: false
        default: 'smart'
        type: choice
        options:
          - 'smart'            # 智能缓存（默认）
          - 'clean-toolchain'  # 清除工具链缓存
          - 'clean-ccache'     # 清除编译缓存
          - 'clean-all'        # 清除所有缓存
      # ── 开关类 ──
      skip_upstream:
        description: '跳过上游同步（节省时间）'
        required: false
        default: false
        type: boolean
      use_ccache:
        description: '启用 ccache 编译缓存'
        required: false
        default: true
        type: boolean
      free_disk_space:
        description: '清理磁盘空间（编译仅需约30G，Runner默认约89G可用，通常无需开启）'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '6 0 * * 1,6'  # 每周一和周六的 00:06 UTC（上海时间为 08:06）

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== 构建矩阵（从 targets.json 读取） ==========
  plan:
    name: Plan build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      full_matrix: ${{ steps.set-matrix.outputs.full_matrix }}
      pkgs_matrix: ${{ steps.set-matrix.outputs.pkgs_matrix }}
      version: ${{ steps.version.outputs.version }}
      source_changed: ${{ steps.set-matrix.outputs.source_changed }}
      packages_changed: ${{ steps.set-matrix.outputs.packages_changed }}
      should_build_firmware: ${{ steps.set-matrix.outputs.should_build_firmware }}
      should_build_sdk: ${{ steps.set-matrix.outputs.should_build_sdk }}
      should_publish: ${{ steps.set-matrix.outputs.should_publish }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          sparse-checkout: openwrt-configs/immortalwrt/targets.json
          path: AutoWorkFlows

      # -------- 触发上游同步工作流 --------
      - name: Trigger OpenWRT_Packages_Updater
        if: github.event.inputs.skip_upstream != 'true'
        id: trigger-updater
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 OpenWRT_Packages_Updater..."
          gh workflow run OpenWRT_Packages_Updater.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow OpenWRT_Packages_Updater.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "updater_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      - name: Trigger Sync_Push
        if: github.event.inputs.skip_upstream != 'true' && github.event.inputs.trigger != 'packages-only'
        id: trigger-sync
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🚀 触发 Sync_Push..."
          gh workflow run Sync_Push.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
          sleep 5
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow Sync_Push.yml \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "sync_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "📋 Run ID: $RUN_ID"

      # -------- 等待上游同步（串行，可跳过） --------
      - name: ⏳ Wait for upstream workflows
        if: github.event.inputs.skip_upstream != 'true'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          UPDATER_ID="${{ steps.trigger-updater.outputs.updater_id }}"
          SYNC_ID="${{ steps.trigger-sync.outputs.sync_id }}"
          if [ -n "$UPDATER_ID" ]; then
            echo "⏳ 等待 OpenWRT_Packages_Updater..."
            gh run watch "$UPDATER_ID" \
              --repo ${{ github.repository }} --exit-status \
              && echo "✅ 完成" || echo "⚠️ 失败，继续"
          fi
          if [ -n "$SYNC_ID" ]; then
            echo "⏳ 等待 Sync_Push..."
            gh run watch "$SYNC_ID" \
              --repo ${{ github.repository }} --exit-status \
              && echo "✅ 完成" || echo "⚠️ 失败，继续"
          fi
        continue-on-error: true

      # -------- 生成版本号 --------
      - name: 🏷️ Set build version
        id: version
        run: |
          NOW=$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')
          VERSION="V$(echo "$NOW" | awk '{gsub(/[:-]/," "); split($0,a," "); printf "%s%s%s", substr(a[1],3), a[2], a[3]}')"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "🏷️ 版本号: ${VERSION}"

      # -------- 检查 SHA 变更 + 拆分矩阵 --------
      - id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          TARGET_FILTER="${{ github.event.inputs.target || 'both' }}"
          JSON_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/targets.json"
          VERSION="${{ steps.version.outputs.version }}"

          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ 配置文件不存在: $JSON_FILE"
            exit 1
          fi
          echo "📋 加载构建目标: $JSON_FILE ($(jq '.targets | length' "$JSON_FILE") 个目标)"
          echo "🎯 过滤条件: $TARGET_FILTER"

          FILTERED=$(jq -c --arg t "$TARGET_FILTER" '
            if $t == "both" then .targets
            else [.targets[] | select(.target == $t)] end
          ' "$JSON_FILE")

          # ── SHA 状态检查 ──
          SRC_CHANGED=false
          PKG_CHANGED=false
          for TARGET in $(echo "$FILTERED" | jq -r '.[].target'); do
            gh release download _build-state --repo ${{ github.repository }} \
              --pattern "${TARGET}-state.json" -D /tmp/state 2>/dev/null || true
            if [ -f "/tmp/state/${TARGET}-state.json" ]; then
              LAST_SRC=$(jq -r '.source_sha' "/tmp/state/${TARGET}-state.json")
              LAST_PKG=$(jq -r '.packages_sha' "/tmp/state/${TARGET}-state.json")
              CURR_REPO=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | .repo')
              CURR_REF=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | .ref')
              CURR_SRC=$(git ls-remote "https://github.com/${CURR_REPO}" "${CURR_REF}" 2>/dev/null | cut -f1)
              CURR_PKG=$(git ls-remote https://github.com/solarflows/openwrt-packages.git "$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | (.packages_branch // .target)')" 2>/dev/null | cut -f1)
              [ "$LAST_SRC" != "$CURR_SRC" ] && SRC_CHANGED=true
              [ "$LAST_PKG" != "$CURR_PKG" ] && PKG_CHANGED=true
            else
              SRC_CHANGED=true
              PKG_CHANGED=true
            fi
          done

          # 手动触发也走正常 SHA 检查（不强制全量）
          # 只在无状态文件时（首次运行）才强制全量

          echo "source_changed=${SRC_CHANGED}" >> $GITHUB_OUTPUT
          echo "packages_changed=${PKG_CHANGED}" >> $GITHUB_OUTPUT
          echo "🔍 source_changed=${SRC_CHANGED}, packages_changed=${PKG_CHANGED}"

          # ── 拆分矩阵 ──
          FULL_MATRIX=$(echo "$FILTERED" | jq -c 'map(. + {
            packages_branch:   (.packages_branch   // .target),
            release_repo:     (.release_repo     // .repo),
            passwall_repo:    (.passwall_repo    // "solarflows/openwrt-packages"),
            passwall_tag:     (.passwall_tag     // .target),
            apk_signing:      (.apk_signing      // false),
            sdk_container:    (.sdk_container    // null)
          })')
          PKGS_MATRIX=$(echo "$FILTERED" | jq -c '[.[] | select(.sdk_container != null) | . + {
            packages_branch: (.packages_branch // .target),
            passwall_repo:   (.passwall_repo   // "solarflows/openwrt-packages"),
            passwall_tag:    (.passwall_tag    // .target),
            apk_signing:     (.apk_signing     // false)
          }]')

          echo "full_matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
          echo "pkgs_matrix=$PKGS_MATRIX" >> $GITHUB_OUTPUT
          echo "✅ full_matrix: $FULL_MATRIX"
          echo "✅ pkgs_matrix: $PKGS_MATRIX"

          # ── Job 控制信号 ──
          TRIGGER="${{ github.event.inputs.trigger || 'full' }}"
          IS_SCHEDULE="${{ github.event_name }}"

          if [ "$TRIGGER" = "packages-only" ] && [ "$IS_SCHEDULE" != "schedule" ]; then
            # 手动 packages-only：强制 SDK 构建
            echo "should_build_firmware=false" >> $GITHUB_OUTPUT
            if [ "$(echo "$PKGS_MATRIX" | jq 'length')" -gt 0 ]; then
              echo "should_build_sdk=true" >> $GITHUB_OUTPUT
            else
              echo "should_build_sdk=false" >> $GITHUB_OUTPUT
            fi
            echo "should_publish=true" >> $GITHUB_OUTPUT
          elif [ "$IS_SCHEDULE" = "schedule" ]; then
            # 定时触发：根据 SHA 检查决定
            if [ "$SRC_CHANGED" = "false" ] && [ "$PKG_CHANGED" = "false" ]; then
              echo "should_build_firmware=false" >> $GITHUB_OUTPUT
              echo "should_build_sdk=false" >> $GITHUB_OUTPUT
              echo "should_publish=false" >> $GITHUB_OUTPUT
            elif [ "$SRC_CHANGED" = "true" ]; then
              echo "should_build_firmware=true" >> $GITHUB_OUTPUT
              echo "should_build_sdk=false" >> $GITHUB_OUTPUT
              echo "should_publish=true" >> $GITHUB_OUTPUT
            else
              # 仅软件包变更 → SDK 构建
              echo "should_build_firmware=false" >> $GITHUB_OUTPUT
              if [ "$(echo "$PKGS_MATRIX" | jq 'length')" -gt 0 ]; then
                echo "should_build_sdk=true" >> $GITHUB_OUTPUT
              else
                echo "should_build_sdk=false" >> $GITHUB_OUTPUT
              fi
              echo "should_publish=true" >> $GITHUB_OUTPUT
            fi
          else
            # 手动 full：强制全量固件编译
            echo "should_build_firmware=true" >> $GITHUB_OUTPUT
            echo "should_build_sdk=false" >> $GITHUB_OUTPUT
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

          # ── 创建 Draft Release（仅固件构建时需要，排除 packages-only）──
          if [ "$TRIGGER" != "packages-only" ] && { [ "$SRC_CHANGED" = "true" ] || [ "$PKG_CHANGED" = "true" ]; }; then
            for TARGET in $(echo "$FILTERED" | jq -r '.[].target'); do
              REPO=$(echo "$FILTERED" | jq -r --arg t "$TARGET" '.[] | select(.target == $t) | (.release_repo // .repo)')
              if ! gh release view "${VERSION}" --repo "$REPO" &>/dev/null; then
                if gh release create "${VERSION}" --repo "$REPO" \
                  --title "${TARGET} Build ${VERSION}" --draft \
                  --notes "🔨 构建中..." 2>/dev/null; then
                  echo "📝 创建 Draft Release: ${REPO}@${VERSION}"
                else
                  echo "⚠️ Release ${VERSION} 已存在（并发创建），跳过"
                fi
              fi
            done
          fi

  # ========== 固件构建任务（矩阵并行） ==========
  compile-firmware:
    name: Compile firmware
    needs: plan
    if: needs.plan.outputs.should_build_firmware == 'true'
    concurrency:
      group: build-${{ matrix.target }}-${{ needs.plan.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 480
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.full_matrix) }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          path: openwrt
          fetch-depth: 1

      - name: 📦 Get source & clone packages
        id: clone_packages
        run: |
          cd openwrt

          # 获取源码 SHA
          SHA=$(git rev-parse --short HEAD)
          SHA_FULL=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "sha_full=${SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 源码 @ ${SHA}"

          # 克隆自定义软件包
          echo "📦 克隆 openwrt-packages (${{ matrix.packages_branch }}) ..."
          git clone --depth 1 https://github.com/solarflows/openwrt-packages.git package/solarflows -b ${{ matrix.packages_branch }}
          PKG_SHA=$(git -C package/solarflows rev-parse --short HEAD)
          PKG_SHA_FULL=$(git -C package/solarflows rev-parse HEAD)
          echo "packages_sha=${PKG_SHA}" >> $GITHUB_OUTPUT
          echo "packages_sha_full=${PKG_SHA_FULL}" >> $GITHUB_OUTPUT
          echo "   📋 openwrt-packages @ ${PKG_SHA}"

          # ── Summary ──
          echo "| 📦 **源码** | [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ \`${SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 **软件包** | [${{ matrix.packages_branch }}](https://github.com/solarflows/openwrt-packages/tree/${{ matrix.packages_branch }}) @ \`${PKG_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ───────── 磁盘空间监控（第 1 阶段：初始状态）─────────
      - name: 💽 Disk space · Initial
        id: disk-1
        run: |
          echo "📊 初始磁盘空间（克隆后，环境准备前）"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "📊 openwrt/ : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"

      # ───────── 计算工具链指纹（仅基于 tools/ 和 toolchain/ 目录的变更）─────────
      - name: 🔧 Compute toolchain hash
        id: toolchain_hash
        run: |
          HASH=$(git -C openwrt log --pretty=tformat:"%h" -n1 tools toolchain 2>/dev/null || echo "unknown")
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"
          # clean-all / clean-toolchain 时注入 force- 前缀，使 cache key 永不精确命中
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ]; then
            HASH="force-${HASH}"
            echo "🔧 缓存策略: ${CACHE_STRATEGY} · 工具链缓存 key 已注入 force- 前缀"
          fi
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "🔧 工具链指纹: $HASH"

      - name: 📋 Record build start time And Hardware Information
        id: start_time
        run: |
          # ── Summary ──
          TRIGGER="${{ github.event.inputs.trigger || 'full' }}"
          SRC_CHANGED="${{ needs.plan.outputs.source_changed }}"
          if [ "$SRC_CHANGED" = "true" ]; then
            BUILD_STATUS="🔵 源码有变更 → 完整固件构建"
          else
            BUILD_STATUS="🟡 仅软件包变更 → 固件重编"
          fi
          {
            echo "---"
            echo "## 📋 ${{ matrix.target }} — Build Summary"
            echo ""
            echo "| 项目 | 详情 |"
            echo "|------|------|"
            echo "| 🎯 **目标** | ${{ matrix.target }} |"
            echo "| 🏷️ **版本号** | ${{ needs.plan.outputs.version }} |"
            echo "| 🔄 **触发方式** | ${{ github.event_name }} |"
            echo "| 📌 **变更检测** | ${BUILD_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "### 运行环境"
            echo "\`\`\`"
            echo "🖥️ 构建环境"
            echo "  🧠 CPU : $(nproc) 核 | $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
            echo "  💾 内存: $(free -h | awk '/^Mem:/ {print $2}') | 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"
            echo "  🐧 系统: $(uname -r)"
            echo "\`\`\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          START_FMT=$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')
          echo "timestamp=${START_FMT}" >> $GITHUB_OUTPUT
          echo "🕐 构建开始时间: ${START_FMT}"

          # ── Summary ──
          echo "| 🕐 **构建开始** | ${START_FMT} |" >> "$GITHUB_STEP_SUMMARY"

      - name: 🧹 Free Disk Space
        if: github.event.inputs.free_disk_space == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: 🛠️ 1. Prepare Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 1. Prepare Environment           ║"
          echo "╚══════════════════════════════════════╝"
          echo "🧹 清理无用软件包..."
          sudo -E apt -y purge firefox 2>/dev/null || true
          echo "📦 更新系统..."
          sudo -E apt update
          sudo -E apt -yqq full-upgrade
          echo "🧹 清理 apt 缓存..."
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          echo "📦 安装编译依赖..."
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"
          echo "✅ 环境准备完成"

      # ───────── 磁盘空间监控（第 2 阶段：环境准备后）─────────
      - name: 💽 Disk space · After env prep
        id: disk-2
        run: |
          echo "📊 环境准备后磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"

      # ───────── 构建缓存（工具链 + ccache）─────────
      - name: 🔧 Restore toolchain cache
        id: cache-tc
        uses: actions/cache@v5
        with:
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*

      - name: 🗄️ Restore ccache
        if: github.event.inputs.use_ccache != 'false'
        id: cache-cc
        uses: actions/cache@v5
        with:
          # 刻意使用 run_id 而非内容哈希，保证 cache-hit 永远为 false。
          # 原因：ccache 的失效因素不可穷举（任何 package Makefile/CFLAGS/依赖版本变化
          # 都可能导致编译输出不同），无法用单一内容哈希精确建模。
          # run_id 确保每轮成功构建后必定保存最新缓存，restore-keys 模糊匹配回退
          # 到最近一次快照；旧条目由后续清理步骤（见 Purge stale remote caches）删除。
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-
          path: openwrt/.ccache

      - name: 🔄 Verify & report cache status
        id: cache-refresh
        run: |
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"

          # ====== 缓存清理 ======
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ]; then
            echo "🧹 缓存策略: ${CACHE_STRATEGY} · 清除工具链缓存..."
            if [ -d openwrt/staging_dir ]; then
              rm -rf openwrt/staging_dir/host* openwrt/staging_dir/tool*
              echo "  ✂️ staging_dir/host* 和 tool* 已删除"
            fi
          fi
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-ccache" ]; then
            echo "🧹 缓存策略: ${CACHE_STRATEGY} · 清除编译缓存..."
            if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
              ccache -C 2>/dev/null || true
              rm -rf openwrt/.ccache
              echo "  ✂️ .ccache 已清空"
            fi
          fi

          # ====== 工具链：检测 staging_dir ======
          TOOLCHAIN_RESTORED="false"
          if [ "$CACHE_STRATEGY" != "clean-all" ] && [ "$CACHE_STRATEGY" != "clean-toolchain" ] && [ -d "openwrt/staging_dir" ] && [ "$(find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | head -1)" ]; then
            find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | while read -r d; do
              find "$d" -type f -exec touch {} +
            done
            # 修正 host ccache 软链接：OpenWrt 默认将 gcc/g++ 链接到系统编译器，
            # 但同目录下有 ccache 二进制可用，重链接后 host 包(node/rust等)编译可走 ccache
            if [ -x "openwrt/staging_dir/host/bin/ccache" ]; then
              for cmd in gcc g++ cc c++; do
                ln -sf ccache "openwrt/staging_dir/host/bin/$cmd" 2>/dev/null || true
              done
              echo "⚡ host ccache 软链接已修正"
            fi
            mkdir -p openwrt/tmp && echo "1" > openwrt/tmp/.build
            TOOLCHAIN_RESTORED="true"
            echo "🔧 工具链缓存已恢复 · stamp 已刷新"
          else
            echo "ℹ️ 工具链缓存未命中 · 将全量编译"
          fi
          echo "toolchain_restored=${TOOLCHAIN_RESTORED}" >> $GITHUB_OUTPUT

          # ====== ccache：检测 .ccache 目录 ======
          CCACHE_RESTORED="false"
          if [ "$CACHE_STRATEGY" != "clean-all" ] && [ "$CACHE_STRATEGY" != "clean-ccache" ] && [ -d "openwrt/.ccache" ] && [ "$(find openwrt/.ccache -type f 2>/dev/null | head -1)" ]; then
            CCACHE_RESTORED="true"
            echo "⚡ ccache 已恢复（来自上次构建）"
          fi
          echo "ccache_restored=${CCACHE_RESTORED}" >> $GITHUB_OUTPUT

          # ====== 缓存命中汇总 ======
          echo ""
          echo "╔══════════════════════════════════════╗"
          echo "║  📊 缓存命中状态                     ║"
          echo "╚══════════════════════════════════════╝"

          # 工具链：区分 exact key 命中 vs restore-key 模糊恢复
          TC_EXACT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$TOOLCHAIN_RESTORED" = "true" ]; then
            if [ "$TC_EXACT" = "true" ]; then
              echo "  🔧 工具链 (staging_dir): ✅ 精确命中 (exact key)"
            else
              echo "  🔧 工具链 (staging_dir): ♻️ 模糊恢复 (restore-key)"
            fi
          else
            echo "  🔧 工具链 (staging_dir): 🔨 重新编译"
          fi

          # ccache：仅展示命中/未命中
          CC_ICON=$([ "$CCACHE_RESTORED" = "true" ] && echo "✅ 命中" || echo "🔄 冷启动")
          echo "  ⚡ ccache (.ccache):      ${CC_ICON}"

          # 输出工具链精确命中标记供 release note 使用
          # 注意：此步骤是诊断/报告性质的，设置 continue-on-error 避免瞬态 IO 错误
          # （如 find/du 在并发环境下读到临时文件被删除）杀死整个 7 小时固件构建。
          # 下游引用本 step 的 outputs 时（build-info.json）应容忍空值。
          echo "toolchain_exact=${TC_EXACT}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ───────── 构建 ─────────
      - name: 🔑 Setup APK Signing Key
        if: fromJson(matrix.apk_signing)
        id: signing_key
        env:
          APK_BUILD_KEY: ${{ secrets.APK_BUILD_KEY }}
        run: |
          set -euo pipefail
          # ── APK 签名密钥注入 ──
          # ImmortalWrt APK 构建系统（rules.mk）的密钥路径：
          #   BUILD_KEY_APK_SEC = $(TOPDIR)/private-key.pem   (私钥)
          #   BUILD_KEY_APK_PUB = $(TOPDIR)/public-key.pem    (公钥)
          # 构建系统自动生成的密钥是 ECDSA prime256v1 (P-256) 曲线。
          # 密钥来源：GitHub Secrets 中的 APK_BUILD_KEY（私钥 PEM）
          #
          # ⚠️ 只需要设私钥。公钥由本步骤自动派生，无需单独设 secret。

          if [ -z "$APK_BUILD_KEY" ]; then
            echo "::warning::APK_BUILD_KEY secret 未设置 — 构建系统将生成随机密钥，设备 apk add 需 --allow-untrusted"
            echo "fingerprint=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 1. 写入私钥（用 printf 避免 echo 可能暴露 secret）
          #    先 strip 首尾空白（GitHub 网页设置 secret 时常附带多余换行）
          printf '%s' "$APK_BUILD_KEY" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' > openwrt/private-key.pem
          chmod 600 openwrt/private-key.pem

          # 诊断：输出文件大小（不暴露密钥内容）
          echo "📏 密钥文件: $(wc -c < openwrt/private-key.pem) 字节"

          # 确保 UNIX 换行（防止 Windows CRLF 导致 openssl 解析失败）
          sed -i 's/\r$//' openwrt/private-key.pem

          # 2. 验证密钥格式：ImmortalWrt 构建系统使用 ECDSA prime256v1 (P-256)
          echo "🔍 验证密钥格式..."
          if openssl ec -in openwrt/private-key.pem -check -noout 2>/dev/null; then
            echo "✅ ECDSA 私钥格式验证通过"
          elif openssl rsa -in openwrt/private-key.pem -check -noout 2>/dev/null; then
            echo "::warning::APK_BUILD_KEY 是 RSA 密钥，但 ImmortalWrt APK 构建系统默认使用 ECDSA prime256v1"
            echo "::warning::APK 本身支持 RSA，但若构建系统依赖 ecparam 自动派生公钥则会失败"
            echo "::notice::建议重新生成 ECDSA 密钥：openssl ecparam -name prime256v1 -genkey -noout -out private-key.pem"
          else
            KEY_HEADER=$(head -c 50 openwrt/private-key.pem)
            echo "::error::APK_BUILD_KEY 不是有效的 PEM 格式私钥（需要 ECDSA prime256v1 或 RSA）"
            echo "::notice::密钥头部: ${KEY_HEADER}"
            echo "::notice::生成 ECDSA 密钥：openssl ecparam -name prime256v1 -genkey -noout -out private-key.pem"
            exit 1
          fi

          # 3. 派生公钥（构建系统通过 package/base-files 安装到 /etc/apk/keys/）
          openssl ec -in openwrt/private-key.pem -pubout -out openwrt/public-key.pem 2>/dev/null || \
            openssl rsa -in openwrt/private-key.pem -pubout -out openwrt/public-key.pem
          chmod 644 openwrt/public-key.pem
          echo "✅ 公钥已派生 → openwrt/public-key.pem"

          # 4. 记录指纹
          FP=$(openssl sha256 < openwrt/public-key.pem | awk '{print $NF}')
          echo "fingerprint=${FP}" >> $GITHUB_OUTPUT
          echo "🔑 APK 签名密钥已注入 (公钥 SHA256: ${FP:0:16}...)"
          echo "📋 构建系统会将此公钥安装到目标设备的 /etc/apk/keys/"

      - name: 📥 2. Update Feeds & Packages
        id: feeds
        run: |
          set -euo pipefail
          echo "📥 更新 feeds ..."
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "✅ feeds 准备完成"

      - name: ⚙️ 3. Apply Configuration
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  ⚙️ 3. Apply Configuration            ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          SEED_DIR="../AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          echo "📄 合并种子配置: $SEED_DIR"
          find "$SEED_DIR" -type f -name '*.seed' | sort | while read -r f; do
            echo "  + $(basename "$f")" >&2
            if [ ! -s "$f" ]; then
              echo "    ⚠️ 跳过空文件" >&2
              continue
            fi
            cat "$f"
            [ -z "$(tail -c1 "$f")" ] || echo
            true
          done > .config
          sed -i 's/\r$//; s/\xef\xbb\xbf//g' .config
          # ── 注入构建版本号（出现在固件文件名和系统信息中） ──
          VERSION="${{ needs.plan.outputs.version }}"
          # 移除种子文件中可能已有的 CONFIG_VERSION_NUMBER，确保唯一
          sed -i '/^CONFIG_VERSION_NUMBER=/d' .config
          echo "CONFIG_VERSION_NUMBER=\"${VERSION}\"" >> .config
          echo "🏷️ 注入版本号: ${VERSION}"
          echo "✅ 已生成 .config ($(wc -l < .config) 行)"
          echo "📋 ======== 种子配置 (.config) ========"
          cat .config
          echo "🔧 运行 make defconfig (超时 5 分钟)..."
          timeout 300 make defconfig || {
            echo "❌ make defconfig 超时或失败，请检查 .config 语法"
            exit 1
          }
          echo "📋 ======== defconfig 后 .config ========"
          cat .config

      - name: 📥 4. Download Source Packages
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  📥 4. Download Source Packages      ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          echo "📥 下载源码包 (并行 $(nproc) 线程, 超时 30 分钟)..."
          timeout 1800 make download -j$(nproc) || {
            echo "⚠️ make download 超时或失败，重试单线程..."
            timeout 3600 make download -j1 || {
              echo "❌ make download 彻底失败"
              exit 1
            }
          }
          echo "📦 清理下载不完整的小文件（<1KB）..."
          find dl -size -1024c -print -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      # ───────── 磁盘空间监控（第 3 阶段：编译前）─────────
      - name: 💽 Disk space · Before build
        id: disk-3
        run: |
          echo "📊 编译前磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "  📂 openwrt/        : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ staging_dir/  : $(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ .ccache/      : $(du -sh openwrt/.ccache 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ dl/           : $(du -sh openwrt/dl 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    └─ build_dir/    : $(du -sh openwrt/build_dir 2>/dev/null | cut -f1 || echo 'N/A')"

      - name: 🔨 5. Build Firmware
        id: build
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  🔨 5. Build Firmware                ║"
          echo "╚══════════════════════════════════════╝"
          START_TIME=$(date +%s)
          cd openwrt
          export CCACHE_DIR="$(pwd)/.ccache"
          ccache --max-size 10G
          export CC="ccache gcc"
          export CXX="ccache g++"
          NPROC=$(($(nproc) + 1))
          # 确保 make_exit 总有值输出（防止步骤意外退出时 retry 误判）
          MAKE_EXIT=1
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT

          echo "🔨 并行编译 (${NPROC} 线程, -k)..."
          set +o pipefail
          make -j${NPROC} -k 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "make_exit=${MAKE_EXIT}" >> $GITHUB_OUTPUT
          echo "duration=${DURATION_SEC}" >> $GITHUB_OUTPUT
          echo "⏱️ 本步骤耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 磁盘空间监控（第 4 阶段：编译后）─────────
      - name: 💽 Disk space · After build
        if: always()
        id: disk-4
        run: |
          echo "📊 编译后磁盘空间"
          df -h / | awk 'NR==1{print} NR==2{print}'
          TOTAL_KB=$(df --output=size / | tail -1)
          TOTAL_GB=$((TOTAL_KB / 1024 / 1024))
          AVAIL_KB=$(df --output=avail / | tail -1)
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          USED_GB=$((TOTAL_GB - AVAIL_GB))
          USED_PCT=$(df --output=pcent / | tail -1 | tr -d ' %')
          echo "total_gb=${TOTAL_GB}" >> $GITHUB_OUTPUT
          echo "used_gb=${USED_GB}" >> $GITHUB_OUTPUT
          echo "avail_gb=${AVAIL_GB}" >> $GITHUB_OUTPUT
          echo "used_pct=${USED_PCT}" >> $GITHUB_OUTPUT
          echo "📊 总容量: ${TOTAL_GB}G | 已用: ${USED_GB}G (${USED_PCT}%) | 可用: ${AVAIL_GB}G"
          echo "  📂 openwrt/        : $(du -sh openwrt 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ staging_dir/  : $(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ .ccache/      : $(du -sh openwrt/.ccache 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    ├─ dl/           : $(du -sh openwrt/dl 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "    └─ build_dir/    : $(du -sh openwrt/build_dir 2>/dev/null | cut -f1 || echo 'N/A')"

          # ── 计算各阶段空间消耗差值 ──
          D1_USED=${{ steps.disk-1.outputs.used_gb || 0 }}
          D2_USED=${{ steps.disk-2.outputs.used_gb || 0 }}
          D3_USED=${{ steps.disk-3.outputs.used_gb || 0 }}
          D4_USED=${USED_GB}
          DELTA_1_2=$((D2_USED - D1_USED))
          DELTA_2_3=$((D3_USED - D2_USED))
          DELTA_3_4=$((D4_USED - D3_USED))
          # 格式化差值（带符号）
          fmt_delta() { local d=$1; if [ "$d" -ge 0 ]; then echo "+${d}G"; else echo "${d}G"; fi; }

          # ── Summary：磁盘空间汇总表 ──
          {
            echo ""
            echo "### 💽 磁盘空间变化"
            echo "| 阶段 | 总容量 | 已用 | 已用% | 阶段消耗 |"
            echo "|------|--------|------|-------|----------|"
            echo "| ① 初始 | ${TOTAL_GB}G | ${D1_USED}G | ${{ steps.disk-1.outputs.used_pct || 'N/A' }}% | — |"
            echo "| ② 环境准备后 | ${TOTAL_GB}G | ${D2_USED}G | ${{ steps.disk-2.outputs.used_pct || 'N/A' }}% | $(fmt_delta $DELTA_1_2) |"
            echo "| ③ 编译前 | ${TOTAL_GB}G | ${D3_USED}G | ${{ steps.disk-3.outputs.used_pct || 'N/A' }}% | $(fmt_delta $DELTA_2_3) |"
            echo "| ④ 编译后 | ${TOTAL_GB}G | ${D4_USED}G | ${USED_PCT}% | $(fmt_delta $DELTA_3_4) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # 后续可基于此输出决定是否自动清理
          # 例: if [ "$AVAIL_GB" -lt 30 ]; then echo "need_cleanup=true" >> $GITHUB_OUTPUT; fi

      # ───────── 重试（先更新仓库 → 并行重试 → 单线程兜底）─────────
      - name: 🔄 Retry build
        if: always() && steps.build.outputs.make_exit != '0'
        id: retry
        run: |
          set -euo pipefail
          START_TIME=$(date +%s)
          cd openwrt
          export CC="ccache gcc"
          export CXX="ccache g++"

          echo "⚠️ 并行编译有错误 → 更新仓库后重试..."

          echo "📥 更新源码仓库 (${{ matrix.ref }})..."
          git pull origin ${{ matrix.ref }} 2>/dev/null || echo "   (无远端更新或非分支引用)"
          echo "📥 更新 openwrt-packages (${{ matrix.packages_branch }})..."
          git -C package/solarflows pull origin ${{ matrix.packages_branch }} 2>/dev/null || echo "   (无远端更新)"
          echo "📥 更新 feeds ..."
          ./scripts/feeds update -a && ./scripts/feeds install -a

          # 第一轮：并行重试（很多竞争错误二次就能过）
          echo "🔄 第一轮重试：并行编译 ($(nproc) 线程)..."
          RETRY_EXIT=1
          set +o pipefail
          make -j$(nproc) 2>&1 | tee -a build.log
          RETRY_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          if [ "$RETRY_EXIT" -ne 0 ]; then
            # 第二轮：单线程重试（最后一搏）
            echo "⚠️ 并行重试仍有错误 → 单线程最后一搏..."
            set +o pipefail
            make -j1 2>&1 | tee -a build.log
            RETRY_EXIT=${PIPESTATUS[0]}
            set -o pipefail
          fi

          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          echo "retry_duration=${DURATION_SEC}" >> $GITHUB_OUTPUT

          if [ "$RETRY_EXIT" -ne 0 ]; then
            echo "💥 构建彻底失败 · 请查看 build.log 及 logs/ 目录"
            exit 1
          fi
          echo "✅ 重试完成 · 耗时: $(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))"

      # ───────── 总耗时汇总 ─────────
      - name: ⏱️ Total Build Duration
        if: always()
        id: total_duration
        run: |
          BUILD_DUR="${{ steps.build.outputs.duration }}"
          RETRY_DUR="${{ steps.retry.outputs.retry_duration || '0' }}"
          TOTAL_SEC=$((BUILD_DUR + RETRY_DUR))
          TOTAL_FMT=$(printf '%dh %dm %ds' $((TOTAL_SEC/3600)) $(((TOTAL_SEC%3600)/60)) $((TOTAL_SEC%60)))
          echo "duration=${TOTAL_SEC}" >> $GITHUB_OUTPUT
          echo "duration_fmt=${TOTAL_FMT}" >> $GITHUB_OUTPUT
          echo "⏱️ 总编译耗时: ${TOTAL_FMT} (并行 ${BUILD_DUR}s + 重试 ${RETRY_DUR}s)"

          # ── Summary ──
          echo "| ⏱️ **编译耗时** | ${TOTAL_FMT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 **构建结束** | $(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S') |" >> "$GITHUB_STEP_SUMMARY"

      # ───────── 编译日志统计（合并：耗时提取 + 日志分析，只输出到 Summary）─────────
      - name: 📊 Build Log Analysis
        if: always()
        run: |
          cd openwrt

          # 一次性提取所有 compile.txt 末行，再用 awk 分流统计
          TAIL_ALL=$(find logs -name 'compile.txt' -print0 | xargs -0 tail -qn1 2>/dev/null || true)

          TOTAL=$(find logs -name 'compile.txt' 2>/dev/null | wc -l)
          INCOMPLETE=$((TOTAL - $(echo "$TAIL_ALL" | grep -c '^time: ' || true)))
          EMPTY=$(find logs -name 'compile.txt' -size 0 2>/dev/null | wc -l)

          # 耗时提取
          echo "$TAIL_ALL" | grep '^time: ' | awk -F'#' 'NF==4' > build_time_clean.log || true

          # ── Summary ──
          {
            echo ""
            echo "### 📊 编译统计"
            echo "| 指标 | 数值 |"
            echo "|------|------|"
            echo "| compile.txt 总数 | ${TOTAL} |"
            echo "| 未完成（末行无 time:） | ${INCOMPLETE} |"
            echo "| 空日志 | ${EMPTY} |"
            echo "| 耗时记录数 | $(wc -l < build_time_clean.log 2>/dev/null || echo 0) |"
            echo ""
            echo "🐌 编译耗时 Top 5:"
            echo "\`\`\`"
            awk -F'#' '{
              pkg=$1; sub(/^time: /, "", pkg); sub(/\/compile$/, "", pkg);
              real=$2;
              printf "%8.2fs  %s\n", real, pkg
            }' build_time_clean.log 2>/dev/null | sort -rn 2>/dev/null | head -5 || true
            echo "\`\`\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # ───────── ccache 统计与清理（独立步骤，不受构建成败影响）─────────
      - name: 📈 ccache Stats & Cleanup
        if: always()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📈 ccache 统计与压缩测量             ║"
          echo "╚══════════════════════════════════════╝"

          # ── 初始化 Summary 行供后续追加 ──
          TC_HIT_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}" = "true" ] && echo "✅ 命中" || echo "🔨 重编")
          TC_DISK=$(du -sh openwrt/staging_dir 2>/dev/null | cut -f1 || echo "N/A")

          if command -v ccache &>/dev/null && [ -d openwrt/.ccache ]; then
            export CCACHE_DIR="$(pwd)/openwrt/.ccache"

            # ── 磁盘用量 + 压缩大小 ──
            DISK_USAGE_HUMAN=$(du -sh "openwrt/.ccache" 2>/dev/null | cut -f1)
            DISK_USAGE_BYTES=$(du -sb "openwrt/.ccache" 2>/dev/null | awk '{print $1}')
            CC_GZIP_BYTES=$(timeout 60 tar cf - openwrt/.ccache 2>/dev/null | gzip -1 -c | wc -c 2>/dev/null || echo 0)
            CC_GZIP_HUMAN=""
            if [ -n "$CC_GZIP_BYTES" ] && [ "$CC_GZIP_BYTES" -gt 0 ] && [ -n "$DISK_USAGE_BYTES" ] && [ "$DISK_USAGE_BYTES" -gt 0 ]; then
              CC_GZIP_HUMAN=$(numfmt --to=iec "$CC_GZIP_BYTES" 2>/dev/null || echo "${CC_GZIP_BYTES} B")
            fi

            # ── 解析关键指标（兼容 ccache 3.x 旧格式 + 4.x 新格式）──
            CC_RAW=$(ccache -s 2>/dev/null || true)
            HITS_DIRECT=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(direct\)|Direct):\s*\K[0-9]+' | head -1)
            HITS_PREP=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache hit \(preprocessed\)|Preprocessed):\s*\K[0-9]+' | head -1)
            MISSES=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache miss|Misses):\s*\K[0-9]+' | head -1)
            CACHE_SIZE=$(echo "$CC_RAW" | grep -oP '^\s*(?:cache size \(|Cache size \()G(?:B|iB)\):\s*\K[0-9.]+' | head -1)
            # 如果 4.x 格式的 Direct/Preprocessed/Misses 没抓到，说明可能是其他格式，置空即可
            [ -z "$HITS_DIRECT" ] && HITS_DIRECT="?"
            [ -z "$HITS_PREP" ] && HITS_PREP="?"
            [ -z "$MISSES" ] && MISSES="?"
            [ -z "$CACHE_SIZE" ] && CACHE_SIZE="?"

            # ── 输出完整原始 ccache -s（日志 + Summary 双写）──
            echo ""
            echo "📊 ccache -s 原始输出:"
            echo "$CC_RAW"
            {
              echo '```'
              echo "$CC_RAW"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            # ── 清理过期缓存 ──
            echo "🧹 清理过期缓存 (上限: 10G)..."
            ccache --cleanup 2>/dev/null || true
            echo ""

            # ── 构造 ccache 行变量 ──
            CC_HIT=$([ "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}" = "true" ] && echo "✅ 命中" || echo "🔄 冷启")
            CCACHE_LINE="| **ccache** (.ccache) | ${CC_HIT} | ${DISK_USAGE_HUMAN:-N/A} | ${CC_GZIP_HUMAN:-N/A} |"
            CCACHE_HITRATE="direct=${HITS_DIRECT} preprocessed=${HITS_PREP} miss=${MISSES} size=${CACHE_SIZE}"
          else
            echo "⚠️ ccache 不可用或 .ccache 目录不存在"
            CCACHE_LINE="| **ccache** (.ccache) | 🔄 冷启 | N/A | N/A |"
            CCACHE_HITRATE="N/A"
          fi

          # ── Summary 缓存状态（日志 + Summary 双写）──
          {
            echo ""
            echo "### 💾 缓存状态"
            echo "| 缓存 | 恢复状态 | 磁盘大小 | GitHub 上传大小 |"
            echo "|------|----------|----------|----------------|"
            echo "| **工具链** (staging_dir) | ${TC_HIT_LABEL} | ${TC_DISK} | ~N/A |"
            echo "${CCACHE_LINE}"
            echo "| **ccache 缩写** | ${CCACHE_HITRATE:-N/A} | — | — |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # ───────── 失败处理 ─────────
      - name: 📤 Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-log
          path: openwrt/build.log
          retention-days: 7
          if-no-files-found: ignore

      # ───────── 清理远端 GitHub Actions Cache（非 Release），仅构建成功时执行 ─────────
      # gh cache 操作的是 GitHub Actions 的缓存存储（actions/cache@v5 的后端），
      # 目标仓库 ${{ github.repository }} 即当前 workflow 所属仓库。
      - name: 🧹 Purge stale GitHub Actions caches
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          CACHE_STRATEGY="${{ github.event.inputs.cache_strategy || 'smart' }}"
          echo "🧹 清理远端缓存 (cache_strategy=${CACHE_STRATEGY})..."

          # 工具链：clean-all/clean-toolchain 时全删，否则仅在 exact key 未命中时删除
          TC_EXACT_HIT="${{ steps.cache-tc.outputs.cache-hit }}"
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-toolchain" ] || [ "$TC_EXACT_HIT" != "true" ]; then
            gh cache list --repo "${{ github.repository }}" --key "immwrt-toolchain-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id' 2>/dev/null | \
              xargs -r -P4 -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
            echo "🧹 旧工具链缓存已清理"
          else
            echo "ℹ️ 工具链 exact key 命中 · 缓存不可变，跳过清理"
          fi

          # ccache：同上逻辑
          CC_EXACT_HIT="${{ steps.cache-cc.outputs.cache-hit }}"
          if [ "$CACHE_STRATEGY" = "clean-all" ] || [ "$CACHE_STRATEGY" = "clean-ccache" ] || [ "$CC_EXACT_HIT" != "true" ]; then
            gh cache list --repo "${{ github.repository }}" --key "immwrt-ccache-${{ matrix.target }}-" --limit 100 --json id --jq '.[].id' 2>/dev/null | \
              xargs -r -P4 -I{} gh cache delete {} --repo "${{ github.repository }}" 2>/dev/null || true
            echo "🧹 旧 ccache 缓存已清理"
          else
            echo "ℹ️ ccache exact key 命中 · 缓存不可变，跳过清理"
          fi

      # ───────── 打包产物 ─────────
      - name: 📦 6. Package Artifacts
        if: success()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  📦 6. Package Artifacts             ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          mkdir -p release/firmware
          # 收集 bin/targets 下所有固件文件（.bin/.itb/.img/.manifest/.buildinfo/sha256sums/profiles.json 等）
          # 排除 packages/ 子目录（含 kmod 包，非固件）
          find bin/targets -type f -not -path "*/packages/*" \
            -exec cp {} release/firmware/ \; 2>/dev/null || true
          echo "📦 固件文件列表："
          ls -la release/firmware/ 2>/dev/null || echo "  (无固件文件)"
          # passwall ipk 和 apk 均支持（mt798x 旧版用 ipk，qualcommax 新版用 apk）
          mkdir -p release/passwall
          find bin/packages -name "*passwall*.ipk" -o -name "*passwall*.apk" -exec cp {} release/passwall/ \; 2>/dev/null || true
          DEPS=(chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadowsocksr simple-obfs sing-box tcping xray-core)
          for dep in "${DEPS[@]}"; do
            find bin/packages \( -name "*${dep}*.ipk" -o -name "*${dep}*.apk" \) -exec cp {} release/passwall/ \; 2>/dev/null || true
          done
          # 附带 APK 签名公钥到 passwall 发布目录
          if [ -f public-key.pem ]; then
            cp public-key.pem release/passwall/solarflows-apk-public.pem
            echo "🔑 公钥已复制到 passwall 发布目录"
          fi
          echo ""
          echo "📦 Passwall 包列表："
          ls -la release/passwall/ 2>/dev/null || echo "  (无 passwall 包)"
          echo ""
          echo ""
          echo "📊 产物汇总："
          echo "  固件: $(find release/firmware -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/firmware 2>/dev/null | cut -f1)"
          echo "  Passwall: $(find release/passwall -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/passwall 2>/dev/null | cut -f1)"
          (cd release && tar czf ../${{ matrix.target }}-release.tar.gz .)

          # ── Summary 产物统计 ──
          {
            echo ""
            echo "### 📦 产物统计"
            echo "| 类别 | 数量 | 大小 |"
            echo "|------|------|------|"
            echo "| **固件** | $(find release/firmware -type f 2>/dev/null | wc -l) 个 | $(du -sh release/firmware 2>/dev/null | cut -f1) |"
            echo "| **Passwall** | $(find release/passwall -type f 2>/dev/null | wc -l) 个 | $(du -sh release/passwall 2>/dev/null | cut -f1) |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ───────── 构建信息 JSON（独立 artifact）─────────
      - name: 📋 Generate build info
        run: |
          NOW="${{ steps.start_time.outputs.timestamp }}"
          SHA_FULL="${{ steps.clone_packages.outputs.sha_full }}"
          SHA_SHORT="${{ steps.clone_packages.outputs.sha }}"

          # 从编译产物 feeds.buildinfo 提取各 feed 版本
          FEEDS_INFO=""
          FEEDS_MD_JSON=""
          FW_FEEDS_FILE=$(find openwrt/bin/targets -name "feeds.buildinfo" 2>/dev/null | head -1)
          if [ -f "$FW_FEEDS_FILE" ] && [ -s "$FW_FEEDS_FILE" ]; then
            # 验证文件内容是否有效（至少包含一行 feed 条目）
            if grep -q '^src-git\b' "$FW_FEEDS_FILE" 2>/dev/null; then
              FEEDS_INFO=$(jq -Rs '.' "$FW_FEEDS_FILE")
              FEEDS_MD_RAW=$(awk '{
                n=split($NF,a,"^"); url=a[1]; hash=a[2]
                sub(/\.git$/,"",url)
                printf "| [%s](%s/tree/%s) | `%s` |\n", $2, url, hash, hash
              }' "$FW_FEEDS_FILE")
              if [ -n "$FEEDS_MD_RAW" ]; then
                FEEDS_MD_JSON=$(echo "$FEEDS_MD_RAW" | jq -Rs '.')
              else
                echo "⚠️ feeds.buildinfo 格式异常，无法解析 feed 版本"
                FEEDS_MD_JSON='""'
              fi
            else
              echo "⚠️ feeds.buildinfo 内容不完整（无 src-git 条目），跳过 feed 版本记录"
              FEEDS_INFO='""'
              FEEDS_MD_JSON='""'
            fi
          else
            FEEDS_INFO='""'
            FEEDS_MD_JSON='""'
          fi

          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "config": "${{ matrix.config }}",
            "source_repo": "${{ matrix.repo }}",
            "source_ref": "${{ matrix.ref }}",
            "source_sha": "${SHA_FULL}",
            "source_sha_short": "${SHA_SHORT}",
            "packages_repo": "solarflows/openwrt-packages",
            "packages_branch": "${{ matrix.packages_branch }}",
            "packages_sha": "${{ steps.clone_packages.outputs.packages_sha }}",
            "feeds_info": ${FEEDS_INFO},
            "feeds_md": ${FEEDS_MD_JSON},
            "duration_sec": "${{ steps.total_duration.outputs.duration }}",
            "duration_fmt": "${{ steps.total_duration.outputs.duration_fmt }}",
            "toolchain_hit": "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}",
            "toolchain_exact": "${{ steps.cache-refresh.outputs.toolchain_exact || 'false' }}",
            "ccache_hit": "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}",
            "signing_key_fingerprint": "${{ steps.signing_key.outputs.fingerprint || 'none' }}",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_repo": "${{ matrix.passwall_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_tag": "${{ needs.plan.outputs.version }}",
            "source_changed": "${{ needs.plan.outputs.source_changed }}",
            "timestamp": "${NOW}"
          }
          JSONEOF
          echo "📋 build-info.json 内容:"
          jq . build-info.json

          # ── Summary Feed 版本 ──
          {
            echo ""
            echo "### 📌 Feed 版本"
            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              echo "$FEEDS_MD_JSON" | jq -r '.'
            else
              echo ""
              echo "（feeds.buildinfo 缺失或为空，未记录）"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ── 生成 release-body.md（供 publish job 直接使用，简洁美观） ──
          TC_LABEL=$([ "${{ steps.cache-refresh.outputs.toolchain_restored || 'false' }}" = "true" ] && echo "✅ 工具链缓存命中" || echo "🔨 工具链重新编译")
          CC_LABEL=$([ "${{ steps.cache-refresh.outputs.ccache_restored || 'false' }}" = "true" ] && echo "✅ ccache 命中" || echo "🔄 ccache 冷启动")
          {
            echo "## ${{ matrix.target }} Build"
            echo ""
            echo "**源码**: [${{ matrix.ref }}](https://github.com/${{ matrix.repo }}) @ [${SHA_SHORT}](https://github.com/${{ matrix.repo }}/commit/${SHA_FULL})"
            echo "**软件包**: [${{ matrix.packages_branch }}](https://github.com/solarflows/openwrt-packages/tree/${{ matrix.packages_branch }}) @ [${{ steps.clone_packages.outputs.packages_sha }}](https://github.com/solarflows/openwrt-packages/commit/${{ steps.clone_packages.outputs.packages_sha_full }})"
            echo "**编译耗时**: ${{ steps.total_duration.outputs.duration_fmt }}"
            echo "**缓存**: ${TC_LABEL} / ${CC_LABEL}"

            # Feed 版本
            if [ -n "$FEEDS_MD_JSON" ] && [ "$FEEDS_MD_JSON" != '""' ]; then
              echo ""
              echo "### 📌 Feed 版本"
              echo ""
              echo "| Feed | 版本 |"
              echo "|------|------|"
              echo "$FEEDS_MD_JSON" | jq -r '.'
            fi

            echo ""
            echo "---"
            echo "ℹ️ 完整构建报告请查看 GitHub Actions Summary。"
          } > release-body.md
          echo "📋 release-body.md 已生成"

      - name: 📤 Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-release
          path: openwrt/${{ matrix.target }}-release.tar.gz
          retention-days: 7

      - name: 📤 Upload passwall artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall
          path: openwrt/release/passwall
          retention-days: 7
          if-no-files-found: ignore

      - name: 📤 Upload build info artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-info
          path: |
            build-info.json
            release-body.md
          retention-days: 7

      # ───────── 更新构建状态（替代旧的 sha marker）─────────
      - name: 📤 Upload build state
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          cat > "${{ matrix.target }}-state.json" <<JSONEOF
          {
            "source_sha": "${{ steps.clone_packages.outputs.sha_full }}",
            "packages_sha": "${{ steps.clone_packages.outputs.packages_sha_full }}",
            "last_build": "$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')",
            "version": "${VERSION}"
          }
          JSONEOF
          gh release upload "${VERSION}" "${{ matrix.target }}-state.json" \
            --repo ${{ matrix.release_repo }} --clobber 2>/dev/null || true
          echo "💾 构建状态已上传到 Release ${VERSION}"

  # ========== SDK 软件包构建（仅软件包变更时） ==========
  compile-packages:
    name: Compile packages
    needs: plan
    if: needs.plan.outputs.should_build_sdk == 'true'
    concurrency:
      group: build-${{ matrix.target }}-${{ needs.plan.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.pkgs_matrix) }}
    steps:
      - name: Checkout packages repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.passwall_repo }}
          ref: ${{ matrix.packages_branch }}

      - name: ⚙️ Generate .config
        run: |
          cat > .config <<EOF
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-app-passwall=m
          EOF

      - name: 🔨 Build with OpenWrt SDK
        id: compile
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk_container }}
          PACKAGES: luci-app-passwall
          PRIVATE_KEY: ${{ secrets.APK_BUILD_KEY }}

      - name: 📦 Collect artifacts
        id: artifacts
        run: |
          mkdir -p upload
          find bin/packages/ -type f \( \
            -name "luci-app-passwall*" -o \
            -name "luci-i18n-passwall*" \
          \) -exec cp {} upload/ \; 2>/dev/null || true
          FILE_COUNT=$(find upload/ -type f 2>/dev/null | wc -l)
          echo "file_count=${FILE_COUNT}" >> $GITHUB_OUTPUT
          echo "📦 收集到 ${FILE_COUNT} 个文件"
          ls -la upload/

      - name: 📤 Upload passwall artifact
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall-sdk
          path: upload/
          retention-days: 7

      - name: 📋 Generate build info
        if: steps.artifacts.outputs.file_count > 0
        run: |
          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "packages_branch": "${{ matrix.packages_branch }}",
            "sdk_container": "${{ matrix.sdk_container }}",
            "release_tag": "${{ needs.plan.outputs.version }}",
            "passwall_repo": "${{ matrix.passwall_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_repo": "${{ matrix.release_repo }}",
            "apk_signing": ${{ matrix.apk_signing }},
            "file_count": "${{ steps.artifacts.outputs.file_count }}",
            "timestamp": "$(TZ=${{ env.TZ }} date +'%Y-%m-%d %H:%M:%S')"
          }
          JSONEOF

      - name: 📤 Upload build info
        if: steps.artifacts.outputs.file_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-sdk-build-info
          path: build-info.json
          retention-days: 7

  # ========== 发布任务 ==========
  # 使用 always() 确保即使某个矩阵分片构建失败，仍可发布其他成功的分片。
  # 内部 publish_target() 函数会逐个目标检查产物是否存在，缺失则优雅跳过。
  release:
    name: Release
    needs: [compile-firmware, compile-packages]
    if: |
      always() &&
      !cancelled() &&
      needs.plan.outputs.should_publish == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'

      - name: 🔄 Retry download via gh CLI (fallback)
        if: steps.download.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          echo "🔄 actions/download-artifact@v8 失败，通过 gh CLI 重试..."
          # gh run download --name 每次只下载一个 artifact，用循环重试全部
          ARTIFACTS=$(gh run view ${{ github.run_id }} --repo ${{ github.repository }} \
            --json artifacts --jq '.artifacts[].name' 2>/dev/null)
          for artifact in $ARTIFACTS; do
            max_retries=3
            for i in $(seq 1 $max_retries); do
              echo "📥 下载 artifact: $artifact (尝试 #$i)..."
              gh run download ${{ github.run_id }} \
                --repo ${{ github.repository }} \
                --name "$artifact" \
                --dir artifacts 2>&1 && break
              if [ "$i" -lt "$max_retries" ]; then
                echo "⚠️ 重试 #$i 失败，10 秒后..."
                sleep 10
              else
                echo "❌ artifact $artifact 下载失败"
                exit 1
              fi
            done
          done
          echo "✅ 所有 artifact 下载完成"

      - name: Remove failed build logs
        run: rm -rf artifacts/*-build-log 2>/dev/null || true

      - name: Publish all targets
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # ============================================================
          # 通用发布函数：固件 Release + Passwall 固定 Release
          # ============================================================
          publish_target() {
            local TARGET="$1"

            local INFO_FILE="artifacts/${TARGET}-build-info/build-info.json"
            if [ ! -f "$INFO_FILE" ]; then
              echo "⏭️  [${TARGET}] 未找到构建产物，跳过发布。"
              return 0
            fi

            # -------- 从 build-info.json 读取参数 --------
            local TARGET_NAME SOURCE_SHA PKG_SHA
            local FEEDS_MD DURATION_FMT
            local TOOLCHAIN_HIT TOOLCHAIN_EXACT CCACHE_HIT
            local RELEASE_REPO PASSWALL_TAG PASSWALL_REPO
            TARGET_NAME=$(jq -r '.target'              "$INFO_FILE")
            SOURCE_SHA=$(jq -r '.source_sha'            "$INFO_FILE")
            PKG_SHA=$(jq -r '.packages_sha'            "$INFO_FILE")
            FEEDS_MD=$(jq -r '.feeds_md'               "$INFO_FILE")
            DURATION_FMT=$(jq -r '.duration_fmt'        "$INFO_FILE")
            TOOLCHAIN_HIT=$(jq -r '.toolchain_hit'      "$INFO_FILE")
            TOOLCHAIN_EXACT=$(jq -r '.toolchain_exact'   "$INFO_FILE")
            CCACHE_HIT=$(jq -r '.ccache_hit'             "$INFO_FILE")
            RELEASE_REPO=$(jq -r '.release_repo'        "$INFO_FILE")
            PASSWALL_REPO=$(jq -r '.passwall_repo'      "$INFO_FILE")
            PASSWALL_TAG=$(jq -r '.passwall_tag'        "$INFO_FILE")
            echo "🏷️  [${TARGET}] Passwall → ${PASSWALL_REPO}@${PASSWALL_TAG}"

            # -------- 格式化图标（用于日志） --------
            if [ "$TOOLCHAIN_HIT" = "true" ]; then
              if [ "$TOOLCHAIN_EXACT" = "true" ]; then
                echo "  🔧 工具链: ✅ 精确命中"
              else
                echo "  🔧 工具链: ♻️ 模糊恢复"
              fi
            else
              echo "  🔧 工具链: 🔨 重编"
            fi
            [ "$CCACHE_HIT" = "true" ] && echo "  ⚡ ccache: ✅ 命中" || echo "  ⚡ ccache: 🔄 冷启"

            # -------- 生成版本 Tag（直接从 build-info.json 读取） --------
            local TAG TITLE
            TAG=$(jq -r '.release_tag' "$INFO_FILE")
            TITLE="Build ${TAG}"
            echo "🏷️  [${TARGET}] 版本: $TAG → $RELEASE_REPO"

            # -------- 解包固件 --------
            local RELEASE_TAR="artifacts/${TARGET}-release/${TARGET}-release.tar.gz"
            if [ -f "$RELEASE_TAR" ]; then
              tar xzf "$RELEASE_TAR" -C "artifacts/${TARGET}-release/"
            fi

            # -------- 发布固件 --------
            local FW_DIR="artifacts/${TARGET}-release/firmware"
            local FW_COUNT
            FW_COUNT=$(find "$FW_DIR" -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -d "$FW_DIR" ] && [ -n "$FW_COUNT" ]; then
              # 直接从构建产物读取 release-body.md
              local RELEASE_BODY="artifacts/${TARGET}-build-info/release-body.md"
              if [ -f "$RELEASE_BODY" ]; then
                cp "$RELEASE_BODY" /tmp/release_body.md
              else
                # 降级：文件不存在则生成最小 body
                echo "## ${TARGET_NAME} ${TITLE}" > /tmp/release_body.md
              fi

              if gh release view "$TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                # Draft release 已由 plan 创建，上传固件
                echo "📤 [${TARGET}] 上传固件到 Release $TAG ..."
                gh release upload "$TAG" --repo "$RELEASE_REPO" \
                  "$FW_DIR"/* --clobber 2>/dev/null || true
              else
                # 降级：Release 不存在时直接创建
                echo "🚀 [${TARGET}] 创建 Release $TAG ..."
                gh release create "$TAG" --repo "$RELEASE_REPO" \
                  --title "${TARGET_NAME} ${TITLE}" \
                  --target "$SOURCE_SHA" \
                  --notes-file /tmp/release_body.md \
                  "$FW_DIR"/*
              fi
              # 更新 notes 并发布（draft → published）
              gh release edit "$TAG" --repo "$RELEASE_REPO" \
                --title "${TARGET_NAME} ${TITLE}" \
                --notes-file /tmp/release_body.md \
                --draft=false 2>/dev/null || true
              echo "✅ [${TARGET}] Release $TAG 已发布"
            else
              echo "⚠️  [${TARGET}] 没有找到固件文件，跳过固件发布。"
            fi

            # -------- 发布 Passwall（固定 Release，solarflows/openwrt-packages） --------
            local PW_DIR="artifacts/${TARGET}-passwall"
            if [ -d "$PW_DIR" ]; then
              local PW_FILES
              PW_FILES=$(find "$PW_DIR" -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' -o -name '*.pem' \) -type f 2>/dev/null || true)
              if [ -n "$PW_FILES" ]; then
                local PW_NOTES
                PW_NOTES="最新 passwall 及依赖，更新于 $(date +'%Y-%m-%d %H:%M')"$'\n'"🔑 APK 签名公钥: solarflows-apk-public.pem（下载后放入 /etc/apk/keys/ 即可信任这些包）"
                if gh release view "$PASSWALL_TAG" --repo "$PASSWALL_REPO" &>/dev/null; then
                  echo "📤 [${TARGET}] Passwall Release ${PASSWALL_TAG} 已存在，删除旧 Release 并重建..."
                  gh release delete "$PASSWALL_TAG" --repo "$PASSWALL_REPO" --yes 2>/dev/null || true
                fi
                echo "🚀 [${TARGET}] 创建 Passwall Release ${PASSWALL_REPO}@${PASSWALL_TAG} ..."
                gh release create "$PASSWALL_TAG" --repo "$PASSWALL_REPO" \
                  --title "Passwall Packages (${TARGET})" \
                  --notes "$PW_NOTES" \
                  --latest=false \
                  $(echo "$PW_FILES")
              else
                echo "⚠️  [${TARGET}] 没有找到 passwall 文件，跳过。"
              fi
            fi

            echo "✅ [${TARGET}] 发布流程完成。"
          }

          # 按目标依次发布固件（排除 SDK 构建产物）
          for target_dir in artifacts/*-build-info; do
            case "$(basename "$target_dir")" in *-sdk-*) continue ;; esac
            TARGET_NAME=$(basename "$target_dir" | sed 's/-build-info//')
            publish_target "$TARGET_NAME"
          done

          # ── 发布 SDK 构建的 passwall ──
          for sdk_dir in artifacts/*-sdk-build-info; do
            [ -d "$sdk_dir" ] || continue
            TARGET=$(basename "$sdk_dir" | sed 's/-sdk-build-info//')
            INFO_FILE="$sdk_dir/build-info.json"
            [ -f "$INFO_FILE" ] || continue

            PW_REPO=$(jq -r '.passwall_repo' "$INFO_FILE")
            PW_TAG=$(jq -r '.passwall_tag' "$INFO_FILE")
            APK_SIGNING=$(jq -r '.apk_signing' "$INFO_FILE")
            SDK_DIR="artifacts/${TARGET}-passwall-sdk"
            [ -d "$SDK_DIR" ] || { echo "⏭️ [${TARGET}] SDK 产物不存在"; continue; }

            SDK_FILES=$(find "$SDK_DIR" -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' -o -name '*.pem' \) 2>/dev/null || true)
            [ -n "$SDK_FILES" ] || { echo "⏭️ [${TARGET}] 无 SDK 文件"; continue; }

            echo "📤 [${TARGET}] 上传 SDK passwall 到 ${PW_REPO}@${PW_TAG} ..."
            PW_NOTES="最新 passwall (SDK 构建)，更新于 $(date +'%Y-%m-%d %H:%M')"
            if [ "$APK_SIGNING" = "true" ]; then
              PW_NOTES="${PW_NOTES}"$'\n'"🔑 APK 签名公钥: solarflows-apk-public.pem"
            fi
            if gh release view "$PW_TAG" --repo "$PW_REPO" &>/dev/null; then
              gh release delete "$PW_TAG" --repo "$PW_REPO" --yes 2>/dev/null || true
            fi
            gh release create "$PW_TAG" --repo "$PW_REPO" \
              --title "Passwall Packages (${TARGET})" \
              --notes "$PW_NOTES" --latest=false \
              $(echo "$SDK_FILES")
            echo "✅ [${TARGET}] SDK passwall 发布完成"
          done

          echo "🎉 全部发布流程完成！"
