name: ImmortalWrt Builder

on:
  workflow_dispatch:
    inputs:
      target:
        description: '选择构建目标'
        required: true
        default: 'both'
        type: choice
        options:
          - 'mt798x'
          - 'qualcommax'
          - 'both'
      release:
        description: '是否发布到 Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      use_ccache:
        description: '是否启用 ccache 编译缓存'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      force_rebuild:
        description: '强制重新编译（忽略所有缓存，用于修复工具链损坏）'
        required: false
        default: false
        type: boolean
      free_disk_space:
        description: '清理磁盘空间（编译仅需约30G，Runner默认约89G可用，通常无需开启）'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 3 * * 3,6'  # 每周三、六 UTC 3:00

concurrency:
  group: firmware-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========== 构建矩阵（从 targets.json 读取） ==========
  define-matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          sparse-checkout: openwrt-configs/immortalwrt/targets.json
          path: AutoWorkFlows

      - id: set-matrix
        run: |
          TARGET_FILTER="${{ github.event.inputs.target || 'both' }}"
          JSON_FILE="AutoWorkFlows/openwrt-configs/immortalwrt/targets.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ 配置文件不存在: $JSON_FILE"
            exit 1
          fi
          echo "📋 加载构建目标: $JSON_FILE ($(jq '.targets | length' "$JSON_FILE") 个目标)"
          echo "🎯 过滤条件: $TARGET_FILTER"

          FILTERED=$(jq -c --arg t "$TARGET_FILTER" '
            if $t == "both" then .targets
            else [.targets[] | select(.target == $t)] end
          ' "$JSON_FILE")

          MATRIX=$(echo "$FILTERED" | jq -c 'map(. + {
            packages_branch:   (.packages_branch   // .target),
            release_repo:     (.release_repo     // .repo),
            passwall_tag:     (.passwall_tag     // "passwall-\(.target)"),
            release_tag_prefix: (.release_tag_prefix // "")
          })')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "✅ 矩阵: $MATRIX"

  # ========== 构建任务（矩阵并行） ==========
  build:
    name: Build ${{ matrix.target }}
    needs: define-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      matrix:
        include: ${{ fromJson(needs.define-matrix.outputs.matrix) }}
    steps:
      - name: Checkout AutoWorkflows
        uses: actions/checkout@v6
        with:
          repository: solarflows/AutoWorkFlows
          path: AutoWorkFlows

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo }}
          ref: ${{ matrix.ref }}
          path: openwrt
          fetch-depth: 0

      # ---------- 变化检测 ----------
      - name: Get current commit SHA
        id: current_sha
        run: echo "sha=$(git -C openwrt rev-parse HEAD)" >> $GITHUB_OUTPUT

      # ---------- 计算工具链指纹（仅基于 tools/ 和 toolchain/ 目录的变更）----------
      - name: Compute toolchain fingerprint
        id: toolchain_hash
        run: |
          HASH=$(git -C openwrt log --pretty=tformat:"%h" -n1 tools toolchain 2>/dev/null || echo "unknown")
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "🔧 工具链指纹: $HASH"

      - name: SHA cache
        id: cache_sha
        uses: actions/cache@v5
        with:
          path: .last_sha_${{ matrix.target }}
          key: last-sha-${{ matrix.target }}-${{ runner.os }}

      - name: Check if source changed
        id: check
        run: |
          CURRENT="${{ steps.current_sha.outputs.sha }}"
          LAST_FILE=".last_sha_${{ matrix.target }}"
          if [ -f "$LAST_FILE" ]; then LAST=$(cat "$LAST_FILE"); else LAST=""; fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$CURRENT" != "$LAST" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "🔵 定时触发且源码有更新，继续构建。"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "⏭️ 定时触发但源码无变化，跳过构建。"
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🟢 手动触发或其他事件，强制构建。"
          fi

      - name: Show build environment
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "🖥️ 构建环境:"
          echo "  CPU: $(nproc) 核 | $(lscpu | grep 'Model name' | cut -d: -f2 | xargs)"
          echo "  内存: $(free -h | awk '/^Mem:/ {print $2}') | 磁盘: $(df -h / | awk 'NR==2 {print $4}') 可用"
          echo "  系统: $(uname -r)"

      - name: Free Disk Space
        if: steps.check.outputs.changed == 'true' && github.event.inputs.free_disk_space == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Environment Prepare
        if: steps.check.outputs.changed == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  1. Environment Prepare             ║"
          echo "╚══════════════════════════════════════╝"
          echo "🧹 清理无用软件包..."
          sudo -E apt -y purge firefox 2>/dev/null || true
          echo "📦 更新系统..."
          sudo -E apt update
          sudo -E apt -yqq full-upgrade
          echo "🧹 清理 apt 缓存..."
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          echo "📦 安装编译依赖..."
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"
          echo "✅ 环境准备完成"


      # ---------- 构建缓存（工具链 + ccache）----------
      - name: Toolchain cache
        if: steps.check.outputs.changed == 'true' && github.event.inputs.force_rebuild != 'true'
        id: cache-tc
        uses: actions/cache@v5
        with:
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*

      - name: Toolchain cache (force rebuild)
        if: steps.check.outputs.changed == 'true' && github.event.inputs.force_rebuild == 'true'
        id: cache-tc-rebuild
        uses: actions/cache@v5
        with:
          key: immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}-rebuild-${{ github.run_id }}
          restore-keys: |
            immwrt-toolchain-${{ matrix.target }}-${{ steps.toolchain_hash.outputs.hash }}-rebuild-${{ github.run_id }}-
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/tool*

      - name: Ccache cache
        if: steps.check.outputs.changed == 'true' && github.event.inputs.use_ccache != 'false' && github.event.inputs.force_rebuild != 'true'
        id: cache-cc
        uses: actions/cache@v5
        with:
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-
          path: openwrt/.ccache

      - name: Ccache cache (force rebuild)
        if: steps.check.outputs.changed == 'true' && github.event.inputs.use_ccache != 'false' && github.event.inputs.force_rebuild == 'true'
        id: cache-cc-rebuild
        uses: actions/cache@v5
        with:
          key: immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}-rebuild
          restore-keys: |
            immwrt-ccache-${{ matrix.target }}-${{ github.run_id }}-rebuild-
          path: openwrt/.ccache

      - name: Refresh cache stamps
        if: steps.check.outputs.changed == 'true'
        id: cache-refresh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"

          # ====== 强制重建时预清空旧缓存（用户明确要求）======
          if [ "$FORCE" == "true" ]; then
            echo "🧹 强制重建：清空所有旧缓存..."
            for PREFIX in "last-sha-${{ matrix.target }}-" "immwrt-toolchain-${{ matrix.target }}-" "immwrt-ccache-${{ matrix.target }}-"; do
              CACHE_LIST=$(gh cache list --repo "${{ github.repository }}" --key "$PREFIX" --limit 100 | cut -f 1)
              for CACHE_KEY in $CACHE_LIST; do
                gh cache delete "$CACHE_KEY" --repo "${{ github.repository }}"
              done
            done
            echo "✅ 旧缓存已清空。"
          fi

          # ====== 工具链：检测 staging_dir 是否有 stamp 目录 ======
          TOOLCHAIN_RESTORED="false"
          if [ "$FORCE" != "true" ] && [ -d "openwrt/staging_dir" ] && [ "$(find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | head -1)" ]; then
            find openwrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | while read -r d; do
              find "$d" -type f -exec touch {} +
            done
            mkdir -p openwrt/tmp && echo "1" > openwrt/tmp/.build
            TOOLCHAIN_RESTORED="true"
            echo "✅ 工具链缓存已恢复，stamp 已刷新！"
          else
            echo "⏭️ 工具链缓存未恢复，将全量编译。"
          fi
          echo "toolchain_restored=${TOOLCHAIN_RESTORED}" >> $GITHUB_OUTPUT

          # ====== ccache：检测 .ccache 目录是否有文件 ======
          CCACHE_RESTORED="false"
          if [ "$FORCE" != "true" ] && [ -d "openwrt/.ccache" ] && [ "$(find openwrt/.ccache -type f 2>/dev/null | head -1)" ]; then
            CCACHE_RESTORED="true"
            echo "✅ ccache 已恢复（来自上次构建）"
          fi
          echo "ccache_restored=${CCACHE_RESTORED}" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ---------- 构建 ----------
      - name: Update feeds
        if: steps.check.outputs.changed == 'true'
        id: feeds
        run: |
          set -euo pipefail
          echo "📦 克隆 openwrt-packages ..."
          cd openwrt
          git clone --depth 1 https://github.com/solarflows/openwrt-packages.git package/solarflows -b ${{ matrix.packages_branch }}
          PKG_SHA=$(git -C package/solarflows rev-parse --short HEAD)
          echo "packages_sha=${PKG_SHA}" >> $GITHUB_OUTPUT
          echo "   openwrt-packages: ${PKG_SHA}"

          echo "📦 更新 feeds ..."
          ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "✅ feeds 准备完成"

      - name: Apply Configuration
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  2. Apply Configuration             ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          SEED_DIR="../AutoWorkFlows/openwrt-configs/immortalwrt/${{ matrix.config }}"
          echo "📄 合并种子配置: $SEED_DIR"
          find "$SEED_DIR" -type f -name '*.seed' | sort | while read -r f; do
            echo "  + $(basename "$f")" >&2
            if [ ! -s "$f" ]; then
              echo "    ⚠️ 跳过空文件" >&2
              continue
            fi
            cat "$f"
            [ -z "$(tail -c1 "$f")" ] || echo
            true
          done > .config
          sed -i 's/\r$//; s/\xef\xbb\xbf//g' .config
          echo "✅ 已生成 .config ($(wc -l < .config) 行)"
          echo "📋 ======== 种子配置前 30 行 ========"
          head -30 .config
          echo "📋 ======== 种子配置尾部 10 行 ========"
          tail -10 .config
          echo "🔧 运行 make defconfig (超时 5 分钟)..."
          timeout 300 make defconfig || {
            echo "❌ make defconfig 超时或失败，请检查 .config 语法"
            exit 1
          }
          echo "📋 ======== defconfig 后 .config 前 50 行 ========"
          head -50 .config
          echo "📋 ======== defconfig 后 .config 尾部 20 行 ========"
          tail -20 .config

      - name: Download packages
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  3. Download Packages               ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          echo "📥 下载源码包 (并行 $(nproc) 线程)..."
          make download -j$(nproc)
          echo "📦 清理下载不完整的小文件（<1KB）..."
          find dl -size -1024c -print -exec rm -f {} \; 2>/dev/null || true
          echo "✅ 下载完成"

      - name: Build Firmware
        if: steps.check.outputs.changed == 'true'
        id: build
        run: |
          set -euo pipefail
          echo "╔══════════════════════════════════════╗"
          echo "║  4. Build Firmware                  ║"
          echo "╚══════════════════════════════════════╝"
          START_TIME=$(date +%s)
          cd openwrt
          echo "🔨 开始编译 (并行 $(($(nproc) + 1)) 线程, -k 遇错不停止)..."
          set +o pipefail
          make -j$(($(nproc) + 1)) -k 2>&1 | tee build.log
          MAKE_EXIT=${PIPESTATUS[0]}
          set -o pipefail

          if [ "$MAKE_EXIT" -ne 0 ]; then
            echo "⚠️ 有编译错误（退出码: $MAKE_EXIT），尝试更新 feed 后重试..."
            echo "📥 更新 feeds ..."
            ./scripts/feeds update -a && ./scripts/feeds install -a
            echo "📥 更新 openwrt-packages ..."
            git -C package/solarflows pull origin ${{ matrix.packages_branch }} 2>/dev/null || true
            echo "🔨 单线程重试失败目标..."
            make -j1 V=sc 2>&1 | tee -a build.log || {
              echo "💥 构建彻底失败，请查看 build.log 分析原因。"
              exit 1
            }
          fi
          END_TIME=$(date +%s)
          DURATION_SEC=$((END_TIME - START_TIME))
          DURATION_FMT=$(printf '%dh %dm %ds' $((DURATION_SEC/3600)) $(((DURATION_SEC%3600)/60)) $((DURATION_SEC%60)))
          echo "duration=${DURATION_SEC}" >> $GITHUB_OUTPUT
          echo "duration_fmt=${DURATION_FMT}" >> $GITHUB_OUTPUT
          echo "⏱️ 编译耗时: ${DURATION_FMT}"

      # ---------- 上传构建失败日志 ----------
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-log
          path: openwrt/build.log
          retention-days: 7
          if-no-files-found: ignore

      # ---------- 手动触发失败时启动 tmate 调试会话 ----------
      - name: Tmate debug session
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      # ---------- 保存 SHA 记录 ----------
      - name: Save current SHA for next run
        if: steps.check.outputs.changed == 'true' && success()
        run: |
          echo "${{ steps.current_sha.outputs.sha }}" > .last_sha_${{ matrix.target }}

      # ---------- 清理旧缓存（仅在构建成功后，失败时保留旧缓存作为 fallback）----------
      - name: Cleanup old caches
        if: steps.check.outputs.changed == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TC_EXACT_HIT="${{ steps.cache-tc.outputs.cache-hit }}${{ steps.cache-tc-rebuild.outputs.cache-hit }}"
          echo "🧹 清理旧缓存..."

          # SHA：静态 key，始终删除（允许 post-job 写入新值）
          SHA_LIST=$(gh cache list --repo "${{ github.repository }}" --key "last-sha-${{ matrix.target }}-" --limit 100 | cut -f 1)
          for CACHE_KEY in $SHA_LIST; do
            gh cache delete "$CACHE_KEY" --repo "${{ github.repository }}"
          done

          # 工具链：仅在 exact key 未命中时删除（此时 post-job 会写入新 key）
          if [ "$TC_EXACT_HIT" != "true" ]; then
            TC_LIST=$(gh cache list --repo "${{ github.repository }}" --key "immwrt-toolchain-${{ matrix.target }}-" --limit 100 | cut -f 1)
            for CACHE_KEY in $TC_LIST; do
              gh cache delete "$CACHE_KEY" --repo "${{ github.repository }}"
            done
            echo "✅ 旧工具链缓存已清理。"
          else
            echo "ℹ️ 工具链 exact key 命中，缓存不可变，无需清理。"
          fi

          # ccache：始终删除（run_id 唯一，每次构建均写入新 key）
          CC_LIST=$(gh cache list --repo "${{ github.repository }}" --key "immwrt-ccache-${{ matrix.target }}-" --limit 100 | cut -f 1)
          for CACHE_KEY in $CC_LIST; do
            gh cache delete "$CACHE_KEY" --repo "${{ github.repository }}"
          done
          echo "✅ 旧 ccache 缓存已清理。"
        continue-on-error: true

      # ---------- 打包产物 ----------
      - name: Prepare artifacts
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║  5. Package Artifacts               ║"
          echo "╚══════════════════════════════════════╝"
          cd openwrt
          mkdir -p release/firmware
          # 收集 bin/targets 下所有固件文件（.bin/.itb/.img/.manifest/.buildinfo/sha256sums/profiles.json 等）
          # 排除 packages/ 子目录（含 kmod 包，非固件）
          find bin/targets -type f -not -path "*/packages/*" \
            -exec cp {} release/firmware/ \; 2>/dev/null || true
          echo "📦 固件文件列表："
          ls -la release/firmware/ 2>/dev/null || echo "  (无固件文件)"
          # passwall ipk 和 apk 均支持（mt798x 旧版用 ipk，qualcommax 新版用 apk）
          mkdir -p release/passwall
          find bin/packages -name "*passwall*.ipk" -o -name "*passwall*.apk" -exec cp {} release/passwall/ \; 2>/dev/null || true
          DEPS=(chinadns-ng dns2socks geoview hysteria ipt2socks microsocks naiveproxy shadowsocksr simple-obfs sing-box tcping xray-core)
          for dep in "${DEPS[@]}"; do
            find bin/packages \( -name "*${dep}*.ipk" -o -name "*${dep}*.apk" \) -exec cp {} release/passwall/ \; 2>/dev/null || true
          done
          echo ""
          echo "📦 Passwall 包列表："
          ls -la release/passwall/ 2>/dev/null || echo "  (无 passwall 包)"
          echo ""
          echo "📊 产物汇总："
          echo "  固件: $(find release/firmware -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/firmware 2>/dev/null | cut -f1)"
          echo "  Passwall: $(find release/passwall -type f 2>/dev/null | wc -l) 个文件, $(du -sh release/passwall 2>/dev/null | cut -f1)"
          cd release && tar czf ../${{ matrix.target }}-release.tar.gz .

      # ---------- 构建信息 JSON（独立 artifact） ----------
      - name: Generate build info artifact
        if: steps.check.outputs.changed == 'true'
        run: |
          NOW=$(date +'%Y-%m-%d %H:%M:%S')
          SHA_FULL="${{ steps.current_sha.outputs.sha }}"
          SHA_SHORT=$(echo "$SHA_FULL" | cut -c1-7)

          # 从编译产物 feeds.buildinfo 提取各 feed 版本
          FEEDS_INFO=""
          FEEDS_MD=""
          FW_FEEDS_FILE=$(find openwrt/bin/targets -name "feeds.buildinfo" 2>/dev/null | head -1)
          if [ -f "$FW_FEEDS_FILE" ]; then
            FEEDS_INFO=$(jq -Rs '.' "$FW_FEEDS_FILE")
            FEEDS_MD_JSON=$(awk '{
              n=split($NF,a,"^"); url=a[1]; hash=a[2]
              sub(/\.git$/,"",url)
              printf "| [%s](%s/tree/%s) | `%s` |\n", $2, url, hash, hash
            }' "$FW_FEEDS_FILE" | jq -Rs '.')
          else
            FEEDS_INFO='""'
            FEEDS_MD_JSON='""'
          fi

          cat > build-info.json <<JSONEOF
          {
            "target": "${{ matrix.target }}",
            "config": "${{ matrix.config }}",
            "source_repo": "${{ matrix.repo }}",
            "source_ref": "${{ matrix.ref }}",
            "source_sha": "${SHA_FULL}",
            "source_sha_short": "${SHA_SHORT}",
            "packages_sha": "${{ steps.feeds.outputs.packages_sha }}",
            "feeds_info": ${FEEDS_INFO},
            "feeds_md": ${FEEDS_MD_JSON},
            "duration_sec": "${{ steps.build.outputs.duration }}",
            "duration_fmt": "${{ steps.build.outputs.duration_fmt }}",
            "toolchain_hit": "${{ steps.cache-refresh.outputs.toolchain_restored }}",
            "ccache_hit": "${{ steps.cache-refresh.outputs.ccache_restored }}",
            "release_repo": "${{ matrix.release_repo }}",
            "passwall_tag": "${{ matrix.passwall_tag }}",
            "release_tag_prefix": "${{ matrix.release_tag_prefix }}",
            "timestamp": "${NOW}"
          }
          JSONEOF

      - name: Upload firmware artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-release
          path: openwrt/${{ matrix.target }}-release.tar.gz
          retention-days: 7

      - name: Upload passwall artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-passwall
          path: openwrt/release/passwall
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build info artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-build-info
          path: build-info.json
          retention-days: 7

  # ========== 发布任务 ==========
  publish:
    name: Publish Releases
    needs: build
    if: |
      !cancelled() &&
      needs.build.result != 'skipped' &&
      (github.event.inputs.release != 'false' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: '*'

      - name: Remove failed build logs
        run: rm -rf artifacts/*-build-log 2>/dev/null || true

      - name: Publish all targets
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          # ============================================================
          # 通用发布函数：固件 Release + Passwall 固定 Release
          # ============================================================
          publish_target() {
            local TARGET="$1"

            local INFO_FILE="artifacts/${TARGET}-build-info/build-info.json"
            if [ ! -f "$INFO_FILE" ]; then
              echo "⏭️  [${TARGET}] 未找到构建产物，跳过发布。"
              return 0
            fi

            # -------- 从 build-info.json 读取所有参数 --------
            local TARGET_NAME CONFIG SOURCE_REPO SOURCE_REF SHORT_SHA
            local PKG_SHA FEEDS_MD DURATION_FMT
            local TOOLCHAIN_HIT CCACHE_HIT TIMESTAMP
            local RELEASE_REPO PASSWALL_TAG TAG_PREFIX
            TARGET_NAME=$(jq -r '.target'              "$INFO_FILE")
            CONFIG=$(jq -r '.config'                   "$INFO_FILE")
            SOURCE_REPO=$(jq -r '.source_repo'          "$INFO_FILE")
            SOURCE_REF=$(jq -r '.source_ref'            "$INFO_FILE")
            SHORT_SHA=$(jq -r '.source_sha_short'       "$INFO_FILE")
            PKG_SHA=$(jq -r '.packages_sha'            "$INFO_FILE")
            FEEDS_MD=$(jq -r '.feeds_md'               "$INFO_FILE")
            DURATION_FMT=$(jq -r '.duration_fmt'        "$INFO_FILE")
            TOOLCHAIN_HIT=$(jq -r '.toolchain_hit'      "$INFO_FILE")
            CCACHE_HIT=$(jq -r '.ccache_hit'             "$INFO_FILE")
            TIMESTAMP=$(jq -r '.timestamp'             "$INFO_FILE")
            RELEASE_REPO=$(jq -r '.release_repo'        "$INFO_FILE")
            PASSWALL_TAG=$(jq -r '.passwall_tag'        "$INFO_FILE")
            TAG_PREFIX=$(jq -r '.release_tag_prefix'    "$INFO_FILE")

            # -------- 格式化图标 --------
            TC_HIT_ICON=$([ "$TOOLCHAIN_HIT" = "true" ] && echo "✅" || echo "🔄")
            CC_HIT_ICON=$([ "$CCACHE_HIT" = "true" ] && echo "✅" || echo "🔄")

            # -------- 生成版本 Tag --------
            local DATE_TAG TAG TITLE
            DATE_TAG="v$(date +'%Y%m%d-%H%M')"
            TAG="${TAG_PREFIX}${DATE_TAG}"
            TITLE="${TAG_PREFIX}Build ${DATE_TAG}"
            echo "🏷️  [${TARGET}] 版本: $TAG → $RELEASE_REPO"

            # -------- 解包固件 --------
            local RELEASE_TAR="artifacts/${TARGET}-release/${TARGET}-release.tar.gz"
            if [ -f "$RELEASE_TAR" ]; then
              tar xzf "$RELEASE_TAR" -C "artifacts/${TARGET}-release/"
            fi

            # -------- 发布固件 --------
            local FW_DIR="artifacts/${TARGET}-release/firmware"
            local FW_COUNT
            FW_COUNT=$(find "$FW_DIR" -maxdepth 1 -type f 2>/dev/null | head -1)
            if [ -d "$FW_DIR" ] && [ -n "$FW_COUNT" ]; then
              cat > /tmp/release_body.md <<RELEOF
          ## ${TARGET_NAME} ${TITLE}

          | 项目 | 详情 |
          |------|------|
          | **目标** | ${TARGET_NAME} |
          | **源码** | [${SOURCE_REF}](https://github.com/${SOURCE_REPO}) |
          | **源码提交** | \`${SHORT_SHA}\` |
          | **软件包** | \`${PKG_SHA}\` |
          | **编译耗时** | ${DURATION_FMT} |
          | **构建时间** | ${TIMESTAMP} |

          ### 缓存状态
          | 工具链 | ccache |
          |--------|--------|
          | ${TC_HIT_ICON} ${TOOLCHAIN_HIT} | ${CC_HIT_ICON} ${CCACHE_HIT} |
          RELEOF

              # 追加 feeds 版本表（从 feeds.buildinfo 提取）
              if [ -n "$FEEDS_MD" ]; then
                {
                  echo ""
                  echo "### Feed 版本"
                  echo ""
                  echo "| Feed | 版本 |"
                  echo "|------|------|"
                  echo "$FEEDS_MD"
                } >> /tmp/release_body.md
              fi

              if gh release view "$TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                echo "📤 [${TARGET}] Release $TAG 已存在，更新固件 assets..."
                gh release upload "$TAG" --repo "$RELEASE_REPO" "$FW_DIR"/* --clobber
              else
                echo "🚀 [${TARGET}] 创建 Release $TAG ..."
                gh release create "$TAG" --repo "$RELEASE_REPO" \
                  --title "${TARGET_NAME} ${TITLE}" \
                  --notes-file /tmp/release_body.md \
                  "$FW_DIR"/*
              fi
            else
              echo "⚠️  [${TARGET}] 没有找到固件文件，跳过固件发布。"
            fi

            # -------- 发布 Passwall（固定 Release） --------
            local PW_DIR="artifacts/${TARGET}-passwall"
            if [ -d "$PW_DIR" ]; then
              local PW_FILES
              PW_FILES=$(find "$PW_DIR" -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' \) -type f 2>/dev/null || true)
              if [ -n "$PW_FILES" ]; then
                if gh release view "$PASSWALL_TAG" --repo "$RELEASE_REPO" &>/dev/null; then
                  echo "📤 [${TARGET}] Passwall Release 已存在，更新 assets..."
                  echo "$PW_FILES" | xargs gh release upload "$PASSWALL_TAG" --repo "$RELEASE_REPO" --clobber
                  # 确保 Passwall 不抢占 latest release
                  gh release edit "$PASSWALL_TAG" --repo "$RELEASE_REPO" --latest=false
                else
                  echo "🚀 [${TARGET}] 创建 Passwall Release ..."
                  gh release create "$PASSWALL_TAG" --repo "$RELEASE_REPO" \
                    --title "Passwall Packages (${TARGET})" \
                    --notes "最新 passwall 及依赖，更新于 $(date +'%Y-%m-%d %H:%M')" \
                    --latest=false \
                    $(echo "$PW_FILES")
                fi
              else
                echo "⚠️  [${TARGET}] 没有找到 passwall 文件，跳过。"
              fi
            fi

            echo "✅ [${TARGET}] 发布流程完成。"
          }

          # ============================================================
          # 按目标依次发布（参数全从 build-info.json 读取）
          # ============================================================
          for target_dir in artifacts/*-build-info; do
            TARGET_NAME=$(basename "$target_dir" | sed 's/-build-info//')
            publish_target "$TARGET_NAME"
          done

          echo "🎉 全部发布流程完成！"
